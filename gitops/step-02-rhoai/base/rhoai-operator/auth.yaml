# New in 3.0: Group management moved from OdhDashboardConfig to Auth resource
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html/release_notes/index
apiVersion: services.platform.opendatahub.io/v1alpha1
kind: Auth
metadata:
  name: auth
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "12"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  adminGroups:
    - rhoai-admins
    - system:cluster-admins
  allowedGroups:
    - rhoai-users
    - system:authenticated


# Required for Dashboard to recognize Kueue.
# The actual Kueue operator is the standalone Red Hat Build of Kueue (step-01-gpu-and-prereq).
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/
apiVersion: components.platform.opendatahub.io/v1alpha1
kind: Kueue
metadata:
  name: default-kueue
  annotations:
    argocd.argoproj.io/sync-wave: "11"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  managementState: Unmanaged
  # Queue mapping: LocalQueue "default" (per namespace) -> ClusterQueue "rhoai-main-queue" (global GPU pool)
  # Must match the ClusterQueue created in step-03 and referenced by LocalQueue "default"
  defaultClusterQueueName: rhoai-main-queue
  defaultLocalQueueName: default


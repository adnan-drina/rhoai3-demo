# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.4/html/installing_and_uninstalling_openshift_ai_self-managed/installing-and-deploying-openshift-ai_install
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.4/html/installing_and_uninstalling_openshift_ai_self-managed/installing-the-distributed-workloads-components_install
apiVersion: datasciencecluster.opendatahub.io/v2
kind: DataScienceCluster
metadata:
  name: default-dsc
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  components:
    dashboard:
      managementState: Managed
    workbenches:
      managementState: Managed
    aipipelines:
      managementState: Managed
    kserve:
      managementState: Managed
      modelsAsService:
        managementState: Managed
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    llamastackoperator:
      managementState: Managed
    mlflowoperator:
      managementState: Managed
    trainingoperator:
      managementState: Managed
    ray:
      managementState: Managed
    # RHOAI 3.4 integrates with the Red Hat build of Kueue Operator in Unmanaged mode.
    # Managed mode is the deprecated embedded Kueue distribution and conflicts with the OCP operator.
    kueue:
      managementState: Unmanaged
    trustyai:
      managementState: Managed
      eval:
        lmeval:
          permitOnline: allow
          permitCodeExecution: allow
    feastoperator:
      managementState: Managed

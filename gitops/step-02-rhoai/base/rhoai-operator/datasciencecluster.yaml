# Ref: https://rhpds.github.io/redhat-openshift-ai-3-showroom/modules/02-02-deploy-dsc.html
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html-single/installing_and_uninstalling_openshift_ai_self-managed/index
apiVersion: datasciencecluster.opendatahub.io/v2
kind: DataScienceCluster
metadata:
  name: default-dsc
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  components:
    dashboard:
      managementState: Managed
    workbenches:
      managementState: Managed
    # Renamed in 3.0: datasciencepipelines -> aipipelines
    aipipelines:
      managementState: Managed
    # KServe - Primary model serving platform (RawDeployment mode in 3.0)
    kserve:
      managementState: Managed
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    llamastackoperator:
      managementState: Managed
    # NOTE (RHOAI 3.3): Kubeflow Trainer v2 is Generally Available (GA).
    # distributedinference is NOT a valid DSC v2 component;
    # llm-d is enabled via LeaderWorkerSet + RHCL operators (step-01-gpu-and-prereq)
    trainingoperator:
      managementState: Managed
    ray:
      managementState: Managed
    kueue:
      managementState: Removed
    trustyai:
      managementState: Managed
      eval:
        lmeval:
          permitOnline: allow
          permitCodeExecution: allow
    feastoperator:
      managementState: Managed

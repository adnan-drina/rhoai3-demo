# Ref: https://rhpds.github.io/redhat-openshift-ai-3-showroom/modules/02-02-deploy-dsc.html
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html-single/installing_and_uninstalling_openshift_ai_self-managed/index
apiVersion: datasciencecluster.opendatahub.io/v2
kind: DataScienceCluster
metadata:
  name: default-dsc
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  components:
    dashboard:
      managementState: Managed
    workbenches:
      managementState: Managed
    # Renamed in 3.0: datasciencepipelines -> aipipelines
    aipipelines:
      managementState: Managed
    # KServe - Primary model serving platform (RawDeployment mode in 3.0)
    kserve:
      managementState: Managed
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    llamastackoperator:
      managementState: Managed
    # NOTE (RHOAI 3.3): Kubeflow Trainer v2 is Generally Available (GA).
    # distributedinference is NOT a valid DSC v2 component;
    # llm-d is enabled via LeaderWorkerSet + RHCL operators (step-01-gpu-and-prereq)
    trainingoperator:
      managementState: Managed
    ray:
      managementState: Managed
    # Set to Unmanaged because we use standalone Red Hat Build of Kueue operator
    # (installed in step-01-gpu-and-prereq). Unmanaged tells RHOAI to recognize Kueue exists
    # but not manage its installation.
    # Standardized Queue Strategy:
    # - defaultLocalQueueName: "default" -> Standard name for Hardware Profile portability
    # - defaultClusterQueueName: "rhoai-main-queue" -> Your custom GPU quota pool
    # This enables: LocalQueue "default" (per namespace) -> ClusterQueue "rhoai-main-queue" (global)
    # NOTE (RHOAI 3.3): Embedded Kueue removed. Standalone Red Hat Build of Kueue required.
    kueue:
      managementState: Unmanaged
      defaultLocalQueueName: default
      defaultClusterQueueName: rhoai-main-queue
    trustyai:
      managementState: Managed
    feastoperator:
      managementState: Managed

# Ref: https://rhpds.github.io/redhat-openshift-ai-3-showroom/modules/03-01-odh-dashboard.html
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html-single/managing_resources/index#dashboard-configuration-options_dashboard-config
apiVersion: opendatahub.io/v1alpha
kind: OdhDashboardConfig
metadata:
  name: odh-dashboard-config
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  dashboardConfig:
    disableTracking: false
    disableModelRegistry: false
    disableModelCatalog: false
    disableKServeMetrics: false
    genAiStudio: true
    modelAsService: true
    disableLMEval: false
    disableDistributedWorkloads: false
    # Required for dashboard to recognize external Kueue operator
    disableKueue: false
  hardwareProfileOrder:
    - cpu-small
    - default-profile
    - nvidia-l4-1gpu
    - nvidia-l4-4gpu
  # Prevents GPU waste by automatically stopping idle workbenches
  # and standardizing storage sizes for cost predictability
  notebookController:
    enabled: true
    notebookNamespace: rhods-notebooks
    pvcSize: 40Gi
  # CRITICAL for AWS GPU demos: Prevents "zombie" notebooks from hoarding GPUs
  # After 1 hour of inactivity (no kernel activity), notebooks are stopped
  # Users can restart them instantly, but GPUs are released back to the pool
  notebookSizes:
    - name: Small
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
    - name: Medium
      resources:
        requests:
          cpu: "2"
          memory: 4Gi
        limits:
          cpu: "4"
          memory: 8Gi
    - name: Large
      resources:
        requests:
          cpu: "4"
          memory: 8Gi
        limits:
          cpu: "8"
          memory: 16Gi

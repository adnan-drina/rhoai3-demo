# =============================================================================
# LlamaStackDistribution - RAG Backend (RHOAI 3.3 Production Pattern)
# =============================================================================
# Aligned with RHOAI 3.3 "Example B: Remote Milvus + Inline Embeddings":
#   - All credentials via Secrets (INFERENCE_MODEL, VLLM_URL, PostgreSQL)
#   - ENABLE_SENTENCE_TRANSFORMERS for inline embeddings (no GPU needed)
#   - INFERENCE_MODEL env var (required by rh-dev template)
#   - PostgreSQL for metadata persistence
#   - storage spec for persistent data
#   - userConfig for remote Milvus (env-var-only doesn't support remote Milvus)
#
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html/working_with_llama_stack/llama-stack-adv-examples_rag
# =============================================================================
apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  name: lsd-rag
  namespace: private-ai
  labels:
    app.kubernetes.io/name: llamastack-rag
    app.kubernetes.io/part-of: rag-pipeline
    app.kubernetes.io/component: rag-backend
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    openshift.io/display-name: lsd-rag
spec:
  replicas: 1
  server:
    distribution:
      name: rh-dev
    containerSpec:
      name: llama-stack
      port: 8321
      env:
        # --- Inline embeddings (RHOAI 3.3 recommended for CPU-only) ---
        - name: ENABLE_SENTENCE_TRANSFORMERS
          value: "true"
        # --- Remote LLM configuration (all from Secret per RHOAI 3.3 pattern) ---
        - name: INFERENCE_MODEL
          valueFrom:
            secretKeyRef:
              name: llamastack-vllm-secret
              key: INFERENCE_MODEL
        - name: VLLM_URL
          valueFrom:
            secretKeyRef:
              name: llamastack-vllm-secret
              key: VLLM_URL
        - name: VLLM_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: llamastack-vllm-secret
              key: VLLM_API_TOKEN
        - name: VLLM_TLS_VERIFY
          valueFrom:
            secretKeyRef:
              name: llamastack-vllm-secret
              key: VLLM_TLS_VERIFY
        - name: VLLM_MAX_TOKENS
          valueFrom:
            secretKeyRef:
              name: llamastack-vllm-secret
              key: VLLM_MAX_TOKENS
        # --- PostgreSQL metadata store (all from Secret per RHOAI 3.3 pattern) ---
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres-secret
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres-secret
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres-secret
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres-secret
              key: POSTGRES_PASSWORD
        # --- Remote Milvus (from Secret) ---
        - name: MILVUS_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: llamastack-milvus-secret
              key: MILVUS_ENDPOINT
        - name: MILVUS_TOKEN
          valueFrom:
            secretKeyRef:
              name: llamastack-milvus-secret
              key: MILVUS_TOKEN
        # --- Guardrails (activates when step-09 is deployed) ---
        - name: FMS_ORCHESTRATOR_URL
          value: http://guardrails-orchestrator.private-ai.svc:8080
      resources:
        requests:
          cpu: 250m
          memory: 500Mi
        limits:
          cpu: "4"
          memory: 12Gi
    # Persistent storage for vector data and file cache (RHOAI 3.3 recommended)
    storage:
      size: 5Gi
    # Custom config required for remote Milvus (rh-dev env vars only support inline Milvus)
    userConfig:
      configMapName: llama-stack-rag-config
---
# =============================================================================
# LlamaStack RAG Configuration — v0.4.2.1+rhai0 Schema
# =============================================================================
# userConfig is needed ONLY because we use remote Milvus (remote::milvus).
# The rh-dev template's env-var-only pattern supports inline Milvus (MILVUS_DB_PATH)
# but not remote Milvus endpoints. For inline Milvus or pgvector, remove userConfig
# entirely and use env vars only.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-stack-rag-config
  namespace: private-ai
  labels:
    llamastack.io/distribution: lsd-rag
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: Replace=true
data:
  config.yaml: |
    version: 2
    image_name: custom
    apis:
    - agents
    - datasetio
    - files
    - inference
    - safety
    - scoring
    - tool_runtime
    - vector_io
    providers:
      inference:
      - provider_id: sentence-transformers
        provider_type: inline::sentence-transformers
        config: {}
      - provider_id: vllm-granite-agent
        provider_type: remote::vllm
        config:
          base_url: http://granite-8b-agent-predictor.private-ai.svc.cluster.local:8080/v1
          max_tokens: 4096
          tls_verify: false
      vector_io:
      - provider_id: milvus-shared
        provider_type: remote::milvus
        config:
          uri: http://milvus-standalone.private-ai.svc.cluster.local:19530
          token: ""
          persistence:
            namespace: milvus_vectors
            backend: kv_default
      agents:
      - provider_id: meta-reference
        provider_type: inline::meta-reference
        config:
          persistence:
            agent_state:
              namespace: agents
              backend: kv_default
            responses:
              table_name: agent_responses
              backend: sql_default
      eval: []
      files:
      - provider_id: meta-reference-files
        provider_type: inline::localfs
        config:
          metadata_store:
            table_name: files_metadata
            backend: sql_default
          storage_dir: /opt/app-root/src/.llama/distributions/rh/files
      datasetio:
      - provider_id: huggingface
        provider_type: remote::huggingface
        config:
          kvstore:
            namespace: huggingface_datasetio
            backend: kv_default
      scoring:
      - provider_id: basic
        provider_type: inline::basic
        config: {}
      - provider_id: llm-as-judge
        provider_type: inline::llm-as-judge
        config: {}
      tool_runtime:
      - provider_id: rag-runtime
        provider_type: inline::rag-runtime
        config: {}
      - provider_id: model-context-protocol
        provider_type: remote::model-context-protocol
        config: {}
    registered_resources:
      models:
      - provider_id: sentence-transformers
        model_id: granite-embedding-125m
        provider_model_id: ibm-granite/granite-embedding-125m-english
        model_type: embedding
        metadata:
          embedding_dimension: 768
      - provider_id: vllm-granite-agent
        model_id: granite-8b-agent
        model_type: llm
        metadata: {}
      shields: []
      vector_stores: []
      datasets: []
      scoring_fns: []
      benchmarks: []
      tool_groups:
      - toolgroup_id: builtin::rag
        provider_id: rag-runtime
      - toolgroup_id: mcp::database
        provider_id: model-context-protocol
        mcp_endpoint:
          uri: "http://database-mcp.private-ai.svc:8080/sse"
      - toolgroup_id: mcp::openshift
        provider_id: model-context-protocol
        mcp_endpoint:
          uri: "http://openshift-mcp.private-ai.svc:8000/sse"
      - toolgroup_id: mcp::slack
        provider_id: model-context-protocol
        mcp_endpoint:
          uri: "http://slack-mcp.private-ai.svc:8080/sse"
      connectors: []
    server:
      port: 8321

apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-enable-dsc-mlflowoperator
  namespace: redhat-ods-applications
  labels:
    app.kubernetes.io/name: enable-dsc-mlflowoperator
    app.kubernetes.io/component: platform-configuration
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: job-enable-dsc-mlflowoperator
  labels:
    app.kubernetes.io/name: enable-dsc-mlflowoperator
    app.kubernetes.io/component: platform-configuration
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups:
      - datasciencecluster.opendatahub.io
    resources:
      - datascienceclusters
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: job-enable-dsc-mlflowoperator
  labels:
    app.kubernetes.io/name: enable-dsc-mlflowoperator
    app.kubernetes.io/component: platform-configuration
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: job-enable-dsc-mlflowoperator
subjects:
  - kind: ServiceAccount
    name: job-enable-dsc-mlflowoperator
    namespace: redhat-ods-applications
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-enable-dsc-mlflowoperator
  namespace: redhat-ods-applications
  labels:
    app.kubernetes.io/name: enable-dsc-mlflowoperator
    app.kubernetes.io/component: platform-configuration
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 300
  template:
    spec:
      serviceAccountName: job-enable-dsc-mlflowoperator
      restartPolicy: Never
      containers:
        - name: patch
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              # Enable the MLflow operator, and permit LMEval online access +
              # code execution (needed to download public tokenizers and
              # benchmark datasets from Hugging Face; the job pods are offline
              # by default). This is the supported DSC-level toggle
              # (spec.components.trustyai.eval.lmeval); trustyai itself is
              # already Managed from Stage 240.
              oc patch datasciencecluster default-dsc --type=merge -p \
                '{"spec":{"components":{"mlflowoperator":{"managementState":"Managed"},"trustyai":{"eval":{"lmeval":{"permitOnline":"allow","permitCodeExecution":"allow"}}}}}}'
              oc get datasciencecluster default-dsc \
                -o jsonpath='mlflow={.spec.components.mlflowoperator.managementState} online={.spec.components.trustyai.eval.lmeval.permitOnline}'
              echo

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  # EvalHub records evaluation runs in the product MLflow through the
  # mlflow.kubeflow.org pseudo-resource RBAC (SubjectAccessReview, auth mode
  # kubernetes-namespaced). The mlflow-operator-mlflow-integration aggregate
  # ClusterRole grants experiments/datasets/registeredmodels access; bind the
  # EvalHub job ServiceAccount to it in this tenant namespace.
  name: evalhub-jobs-mlflow-integration
  namespace: model-evaluation
  labels:
    app.kubernetes.io/part-of: evaluation
    app.kubernetes.io/name: evalhub-jobs-mlflow-integration
    app.kubernetes.io/component: evaluation
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
subjects:
  - kind: ServiceAccount
    name: evalhub-jobs
    namespace: model-evaluation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mlflow-operator-mlflow-integration

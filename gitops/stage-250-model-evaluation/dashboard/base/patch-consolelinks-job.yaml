apiVersion: v1
kind: ServiceAccount
metadata:
  name: patch-eval-consolelinks
  namespace: model-evaluation
  labels:
    app.kubernetes.io/part-of: evaluation
    app.kubernetes.io/name: patch-eval-consolelinks
    app.kubernetes.io/component: job
  annotations:
    argocd.argoproj.io/sync-wave: "6"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhoai-demo-patch-eval-consolelinks
  labels:
    app.kubernetes.io/part-of: evaluation
    app.kubernetes.io/name: patch-eval-consolelinks
    app.kubernetes.io/component: rbac
  annotations:
    argocd.argoproj.io/sync-wave: "6"
rules:
  - apiGroups:
      - route.openshift.io
    resources:
      - routes
    verbs:
      - get
      - list
  - apiGroups:
      - console.openshift.io
    resources:
      - consolelinks
    verbs:
      - get
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhoai-demo-patch-eval-consolelinks
  labels:
    app.kubernetes.io/part-of: evaluation
    app.kubernetes.io/name: patch-eval-consolelinks
    app.kubernetes.io/component: rbac
  annotations:
    argocd.argoproj.io/sync-wave: "6"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rhoai-demo-patch-eval-consolelinks
subjects:
  - kind: ServiceAccount
    name: patch-eval-consolelinks
    namespace: model-evaluation
---
apiVersion: batch/v1
kind: Job
metadata:
  name: patch-eval-consolelinks
  namespace: model-evaluation
  labels:
    app.kubernetes.io/part-of: evaluation
    app.kubernetes.io/name: patch-eval-consolelinks
    app.kubernetes.io/component: job
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 8
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: evaluation
        app.kubernetes.io/name: patch-eval-consolelinks
    spec:
      serviceAccountName: patch-eval-consolelinks
      restartPolicy: Never
      containers:
        - name: patch
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              # EvalHub: the operator creates a route named `evalhub` in this
              # namespace; the browsable Swagger UI is at /docs (the route root
              # 404s, it is a REST API).
              evalhub_host=""
              for i in $(seq 1 60); do
                evalhub_host=$(oc get route evalhub -n model-evaluation -o jsonpath='{.spec.host}' 2>/dev/null || true)
                [[ -n "$evalhub_host" ]] && break
                echo "waiting for evalhub route... ($i/60)"; sleep 10
              done
              if [[ -n "$evalhub_host" ]]; then
                oc patch consolelink rhoai-demo-evalhub-link --type=merge \
                  -p "{\"spec\":{\"href\":\"https://${evalhub_host}/docs\"}}"
                echo "rhoai-demo-evalhub-link -> https://${evalhub_host}/docs"
              else
                echo "WARN: no evalhub route; leaving placeholder" >&2
              fi
              # MLflow has no standalone route; it is served on the RHOAI
              # dashboard host at /mlflow. The MLflow CR exposes that
              # dashboard URL directly at .status.url (.status.address.url is
              # the internal Service).
              mlflow_url=""
              for i in $(seq 1 60); do
                mlflow_url=$(oc get mlflow mlflow -o jsonpath='{.status.url}' 2>/dev/null || true)
                [[ "$mlflow_url" == *".apps."* ]] && break
                echo "waiting for mlflow dashboard url... ($i/60)"; sleep 10
              done
              if [[ "$mlflow_url" == *".apps."* ]]; then
                oc patch consolelink rhoai-demo-mlflow-link --type=merge \
                  -p "{\"spec\":{\"href\":\"${mlflow_url}\"}}"
                echo "rhoai-demo-mlflow-link -> ${mlflow_url}"
              else
                echo "WARN: no mlflow dashboard url; leaving placeholder" >&2
              fi

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: evaluation-postgres
  namespace: model-evaluation
  labels:
    app.kubernetes.io/part-of: evaluation
    app.kubernetes.io/name: evaluation-postgres
    app.kubernetes.io/component: database
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  serviceName: evaluation-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: evaluation-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: evaluation
        app.kubernetes.io/name: evaluation-postgres
        app.kubernetes.io/component: database
      annotations:
        app.openshift.io/runtime: postgresql
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-16:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: evaluation-postgres-credentials
          ports:
            - containerPort: 5432
              name: postgresql
              protocol: TCP
          # First-boot initdb on a fresh EBS PVC can take several minutes under
          # load; a startup probe holds off the liveness probe until the
          # server actually accepts connections, so the slow init is not
          # killed mid-flight (observed live 2026-07-05).
          startupProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - pg_isready -U "${POSTGRESQL_USER}" -d "${POSTGRESQL_DATABASE}"
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - pg_isready -U "${POSTGRESQL_USER}" -d "${POSTGRESQL_DATABASE}"
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - pg_isready -U "${POSTGRESQL_USER}" -d "${POSTGRESQL_DATABASE}"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/part-of: evaluation
          app.kubernetes.io/name: evaluation-postgres
          app.kubernetes.io/component: database
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi

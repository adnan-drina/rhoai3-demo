apiVersion: v1
kind: Service
metadata:
  name: evaluation-postgres
  namespace: model-evaluation
  labels:
    app.kubernetes.io/part-of: evaluation
    app.kubernetes.io/name: evaluation-postgres
    app.kubernetes.io/component: database
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  ports:
    - name: postgresql
      port: 5432
      protocol: TCP
      targetPort: 5432
  selector:
    app.kubernetes.io/name: evaluation-postgres

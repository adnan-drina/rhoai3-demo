apiVersion: v1
kind: Namespace
metadata:
  name: model-evaluation
  labels:
    opendatahub.io/dashboard: "true"
    kubernetes.io/metadata.name: model-evaluation
    # The EvalHub operator provisions tenant ServiceAccounts, RoleBindings,
    # and a Service CA ConfigMap in any namespace carrying this label.
    evalhub.trustyai.opendatahub.io/tenant: "true"
    app.kubernetes.io/part-of: evaluation
    app.kubernetes.io/name: model-evaluation
    app.kubernetes.io/component: namespace
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    openshift.io/display-name: "Model Evaluation"
    openshift.io/description: "EvalHub evaluation control plane, LMEval jobs, and MLflow experiment tracking for the governed GenAI models."

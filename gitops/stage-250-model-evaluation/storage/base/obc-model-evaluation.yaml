# Project-scoped S3 bucket for garak-kfp risk-assessment pipeline artifacts.
# NooBaa generates the Secret and ConfigMap named model-evaluation-bucket at
# runtime (keys AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY); the DSPA and the
# garak-kfp submission reference that Secret directly. Generated credentials
# are never committed.
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: model-evaluation-bucket
  namespace: model-evaluation
  labels:
    app.kubernetes.io/part-of: evaluation
    app.kubernetes.io/name: model-evaluation-bucket
    app.kubernetes.io/component: object-storage
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  bucketName: model-evaluation
  storageClassName: openshift-storage.noobaa.io

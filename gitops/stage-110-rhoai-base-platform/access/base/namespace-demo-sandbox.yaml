apiVersion: v1
kind: Namespace
metadata:
  name: demo-sandbox
  labels:
    # Marks the namespace as a Red Hat OpenShift AI data science project so it
    # appears in the dashboard project list.
    opendatahub.io/dashboard: "true"
    kubernetes.io/metadata.name: demo-sandbox
  annotations:
    openshift.io/display-name: "Demo Sandbox"
    openshift.io/description: "Shared project for platform validation and ad-hoc demos."

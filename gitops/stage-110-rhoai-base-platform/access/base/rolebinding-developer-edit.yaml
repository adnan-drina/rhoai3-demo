# Grants the rhoai-developers group Contributor access to demo-sandbox: create and
# edit workbenches, connections, and cluster storage (RHOAI project "Contributor"
# maps to the OpenShift edit ClusterRole). Admin of the project is retained by
# cluster/RHOAI admins.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rhoai-developers-edit
  namespace: demo-sandbox
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: rhoai-developers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit

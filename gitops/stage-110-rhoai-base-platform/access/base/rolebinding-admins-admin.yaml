# Grants the RHOAI admin group (rhods-admins, referenced by the RHOAI auth CR
# adminGroups) project-admin on demo-sandbox so RHOAI administrators such as
# ai-admin can see and manage the project in the dashboard. Without a project
# RoleBinding, the RHOAI dashboard-admin role alone does not grant access to an
# individual data science project namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rhods-admins-admin
  namespace: demo-sandbox
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: rhods-admins
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin

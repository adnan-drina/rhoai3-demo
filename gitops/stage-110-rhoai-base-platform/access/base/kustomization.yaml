apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Platform access + demo tenancy layer for stage-110. Declarative resources only;
# htpasswd users, rhods-admins membership, and the S3 connection secret are created
# imperatively by deploy.sh because they carry or depend on runtime credentials.
resources:
  - namespace-demo-sandbox.yaml
  - group-rhoai-developers.yaml
  - rolebinding-developer-edit.yaml
  - obc-demo-sandbox.yaml

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-registry-rhods-admins
  namespace: rhoai-model-registries
  annotations:
    # The registry operator creates this Role after the ModelRegistry exists.
    argocd.argoproj.io/sync-wave: "7"
  labels:
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/stage: "110"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: registry-user-demo-registry
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: rhods-admins

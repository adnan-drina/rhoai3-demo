apiVersion: datasciencecluster.opendatahub.io/v2
kind: DataScienceCluster
metadata:
  name: default-dsc
spec:
  components:
    # Stage 230 enables the RHOAI-managed MaaS governance layer on top of the
    # Stage 210 KServe model-serving platform. Verified live with:
    # oc explain datasciencecluster.spec.components.kserve.modelsAsService --api-version=datasciencecluster.opendatahub.io/v2
    kserve:
      managementState: Managed
      modelsAsService:
        managementState: Managed
    # Required for the Gen AI Studio / Playground user-facing MaaS path.
    llamastackoperator:
      managementState: Managed

apiVersion: dscinitialization.opendatahub.io/v1
kind: DSCInitialization
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "2"
  name: default-dsci
spec:
  applicationsNamespace: redhat-ods-applications
  monitoring:
    managementState: Managed
    namespace: redhat-ods-monitoring
    alerting: {}
    metrics:
      replicas: 1
      resources:
        cpulimit: 500m
        cpurequest: 100m
        memorylimit: 512Mi
        memoryrequest: 256Mi
      storage:
        size: 5Gi
        retention: 90d
      exporters: {}
    traces:
      sampleRatio: '0.1'
      storage:
        backend: pv
        retention: 2160h
      exporters: {}
  trustedCABundle:
    customCABundle: ''
    managementState: Managed

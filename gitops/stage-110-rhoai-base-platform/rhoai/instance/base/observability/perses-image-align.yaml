# Aligns the RHOAI-generated Perses server image with the Perses image shipped
# by the installed Cluster Observability Operator. RHOAI 3.4.1 can generate a
# Perses CR with an older image digest while COO 1.5 injects newer TLS flags.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-align-perses-image
  namespace: redhat-ods-monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "16"
  labels:
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/stage: "110"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: job-align-perses-image
  annotations:
    argocd.argoproj.io/sync-wave: "16"
  labels:
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/stage: "110"
rules:
  - apiGroups:
      - operators.coreos.com
    resources:
      - subscriptions
      - clusterserviceversions
    verbs:
      - get
      - list
  - apiGroups:
      - perses.dev
    resources:
      - perses
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: job-align-perses-image
  annotations:
    argocd.argoproj.io/sync-wave: "16"
  labels:
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/stage: "110"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: job-align-perses-image
subjects:
  - kind: ServiceAccount
    name: job-align-perses-image
    namespace: redhat-ods-monitoring
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-align-perses-image
  namespace: redhat-ods-monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "17"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
  labels:
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/stage: "110"
spec:
  backoffLimit: 8
  template:
    spec:
      serviceAccountName: job-align-perses-image
      restartPolicy: Never
      containers:
        - name: align
          image: registry.redhat.io/openshift4/ose-cli
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              namespace="openshift-cluster-observability-operator"
              subscription="cluster-observability-operator"

              echo "Waiting for RHOAI Perses CR and COO CSV..."
              for _ in $(seq 1 60); do
                installed_csv="$(oc get subscription "${subscription}" \
                  -n "${namespace}" \
                  -o jsonpath='{.status.installedCSV}' 2>/dev/null || true)"
                if [[ -n "${installed_csv}" ]] && \
                   oc get csv "${installed_csv}" -n "${namespace}" &>/dev/null && \
                   oc get perses data-science-perses -n redhat-ods-monitoring &>/dev/null; then
                  break
                fi
                sleep 10
              done

              if [[ -z "${installed_csv:-}" ]]; then
                echo "Installed Cluster Observability Operator CSV was not found"
                exit 1
              fi

              perses_image="$(oc get csv "${installed_csv}" \
                -n "${namespace}" \
                -o jsonpath='{.spec.relatedImages[?(@.name=="perses")].image}')"

              if [[ -z "${perses_image}" ]]; then
                echo "Could not find relatedImages entry named perses in ${installed_csv}"
                exit 1
              fi

              current_image="$(oc get perses data-science-perses \
                -n redhat-ods-monitoring \
                -o jsonpath='{.spec.image}' 2>/dev/null || true)"

              if [[ "${current_image}" == "${perses_image}" ]]; then
                echo "Perses image already aligned: ${perses_image}"
                exit 0
              fi

              oc patch perses data-science-perses \
                -n redhat-ods-monitoring \
                --type=merge \
                -p "{\"spec\":{\"image\":\"${perses_image}\"}}"

              echo "Perses image aligned to ${perses_image}"


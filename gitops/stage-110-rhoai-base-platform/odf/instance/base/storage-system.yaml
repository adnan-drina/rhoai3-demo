apiVersion: odf.openshift.io/v1alpha1
kind: StorageSystem
metadata:
  annotations:
    # SkipDryRunOnMissingResource is needed because the ODF CRD does not exist
    # until the operator CSV reaches Succeeded.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "2"
  name: ocs-storagecluster-storagesystem
  namespace: openshift-storage
spec:
  # Standalone Multicloud Object Gateway (MCG/NooBaa) deployment.
  # Source: ODF 4.20 AWS guide - deploying standalone MCG.
  # Verify fields with: oc explain storagesystem.odf.openshift.io/v1alpha1
  kind: noobaa.noobaa.io/v1alpha1
  name: noobaa
  namespace: openshift-storage

apiVersion: batch/v1
kind: CronJob
metadata:
  name: gpt-connection-keepalive
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/part-of: rag
    app.kubernetes.io/name: gpt-connection-keepalive
    app.kubernetes.io/component: maas-egress-keepalive
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  # The MaaS gateway pools multiple long-lived TLS connections to
  # api.openai.com and round-robins across them. AWS NAT silently drops
  # idle mappings (~350s) without RST, leaving Envoy with black-holed
  # connections that hang requests for the 60s route timeout (verified
  # live). The ExternalModel CRD exposes no connection-pool tuning, so
  # several concurrent governed completions every minute keep the breadth
  # of the pool warm and prune strays.
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 110
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: rag
            app.kubernetes.io/name: gpt-connection-keepalive
        spec:
          restartPolicy: Never
          containers:
            - name: keepalive
              image: registry.access.redhat.com/ubi9/ubi-minimal:latest
              command:
                - /bin/bash
                - -c
              args:
                - |
                  for i in 1 2 3 4; do
                    curl -sk --max-time 90 -o /dev/null -w "keepalive[$i] status=%{http_code} time=%{time_total}s\n" \
                      -H "Authorization: Bearer ${VLLM_API_TOKEN}" \
                      -H "Content-Type: application/json" \
                      "${VLLM_GPT_URL}/chat/completions" \
                      -d '{"model":"gpt-4o-mini","messages":[{"role":"user","content":"."}],"max_tokens":1}' &
                  done
                  wait || true
              env:
                - name: VLLM_GPT_URL
                  valueFrom:
                    secretKeyRef:
                      name: private-rag-llama-stack-secret
                      key: VLLM_GPT_URL
                - name: VLLM_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: private-rag-llama-stack-secret
                      key: VLLM_API_TOKEN
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi

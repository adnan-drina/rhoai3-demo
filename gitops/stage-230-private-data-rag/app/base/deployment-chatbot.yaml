apiVersion: apps/v1
kind: Deployment
metadata:
  name: private-rag-chatbot
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/name: private-rag-chatbot
    app.kubernetes.io/component: chatbot-ui
    app.kubernetes.io/part-of: rag
  annotations:
    argocd.argoproj.io/sync-wave: "22"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: private-rag-chatbot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: private-rag-chatbot
        app.kubernetes.io/component: chatbot-ui
        app.kubernetes.io/part-of: rag
    spec:
      serviceAccountName: private-rag-chatbot
      containers:
        - name: chatbot
          image: quay.io/rh-ai-quickstart/llamastack-dist-ui:0.2.45
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: private-rag-chatbot-config
          ports:
            - name: http
              containerPort: 8501
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - mountPath: /.streamlit
              name: dot-streamlit
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - emptyDir: {}
          name: dot-streamlit

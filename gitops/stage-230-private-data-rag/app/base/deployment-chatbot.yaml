apiVersion: apps/v1
kind: Deployment
metadata:
  name: private-rag-chatbot
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/name: private-rag-chatbot
    app.kubernetes.io/component: frontend
    kueue.x-k8s.io/queue-name: default
  annotations:
    argocd.argoproj.io/sync-wave: "31"
    app.openshift.io/connects-to: lsd-private-rag
    app.openshift.io/runtime: python
    openshift.io/display-name: Private RAG Chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: private-rag-chatbot
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: private-rag-chatbot
        app.kubernetes.io/component: frontend
        kueue.x-k8s.io/queue-name: default
    spec:
      serviceAccountName: private-rag-chatbot
      containers:
        - name: streamlit
          image: quay.io/rh-ai-quickstart/llamastack-dist-ui:0.2.45
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8501
              protocol: TCP
          env:
            - name: HOME
              value: /tmp
            - name: LLAMA_STACK_ENDPOINT
              value: http://lsd-private-rag-service.enterprise-rag.svc.cluster.local:8321
            - name: LLAMA_STACK_TIMEOUT
              value: "600"
            - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
              value: "false"
            - name: STREAMLIT_SERVER_ENABLE_CORS
              value: "false"
            - name: STREAMLIT_SERVER_HEADLESS
              value: "true"
            - name: RAG_QUESTION_SUGGESTIONS
              valueFrom:
                configMapKeyRef:
                  name: private-rag-chatbot-config
                  key: RAG_QUESTION_SUGGESTIONS
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: streamlit-config
              mountPath: /.streamlit
      volumes:
        - name: streamlit-config
          emptyDir: {}

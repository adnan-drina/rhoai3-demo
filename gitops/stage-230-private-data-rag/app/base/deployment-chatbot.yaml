apiVersion: apps/v1
kind: Deployment
metadata:
  name: private-rag-chatbot
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/name: private-rag-chatbot
    app.kubernetes.io/component: chatbot-ui
    app.kubernetes.io/part-of: rag
  annotations:
    argocd.argoproj.io/sync-wave: "22"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: private-rag-chatbot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: private-rag-chatbot
        app.kubernetes.io/component: chatbot-ui
        app.kubernetes.io/part-of: rag
    spec:
      serviceAccountName: private-rag-chatbot
      containers:
        - name: chatbot
          image: image-registry.openshift-image-registry.svc:5000/enterprise-rag/private-rag-chatbot:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: private-rag-chatbot-config
          ports:
            - name: http
              containerPort: 8501
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

apiVersion: v1
kind: ConfigMap
metadata:
  name: private-rag-chatbot-config
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/name: private-rag-chatbot
    app.kubernetes.io/component: frontend
  annotations:
    argocd.argoproj.io/sync-wave: "30"
data:
  CHATBOT_TITLE: Private RAG Chatbot
  INFERENCE_MODEL: vllm-inference/nemotron-3-nano-30b-a3b
  DEFAULT_VECTOR_STORE: whoami
  RAG_TOP_K: "5"
  RAG_MAX_CONTEXT_CHARS: "16000"
  RAG_MAX_OUTPUT_TOKENS: "512"
  RAG_TEMPERATURE: "0.1"
  ENABLE_AGENT_MODE: "false"
  MCP_ENABLED: "false"
  GUARDRAILS_ENABLED: "false"
  GUARDRAILS_ENDPOINT: ""
  GUARDRAILS_VERIFY_TLS: "false"
  RAG_QUESTION_SUGGESTIONS: |
    {
      "whoami": [
        "Who is Adnan Drina and what is his current role?",
        "What Red Hat and OpenShift AI experience is described in the document?",
        "Which skills or areas of expertise are relevant for enterprise AI demos?"
      ]
    }

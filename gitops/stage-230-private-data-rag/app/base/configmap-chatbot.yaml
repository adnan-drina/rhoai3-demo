apiVersion: v1
kind: ConfigMap
metadata:
  name: private-rag-chatbot-config
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/name: private-rag-chatbot
    app.kubernetes.io/component: chatbot-ui
    app.kubernetes.io/part-of: rag
  annotations:
    argocd.argoproj.io/sync-wave: "21"
data:
  LLAMA_STACK_ENDPOINT: "http://lsd-enterprise-rag-service.enterprise-rag.svc.cluster.local:8321"
  LLAMA_STACK_TIMEOUT: "120"
  INFERENCE_MODEL: "nemotron-3-nano-30b-a3b"
  DEFAULT_VECTOR_STORE: "stage230-rhoai-34-product-docs-kfp"
  RAG_SEARCH_MODE: "hybrid"
  RAG_TOP_K: "6"
  RAG_RERANK_ENABLED: "true"
  RAG_RERANKER_MODEL: "vllm-reranker/qwen3-reranker"
  RAG_MAX_CONTEXT_CHARS: "8000"
  RAG_MAX_OUTPUT_TOKENS: "512"
  RAG_TEMPERATURE: "0.1"
  MCP_ENABLED: "false"
  GUARDRAILS_ENABLED: "false"
  GUARDRAILS_ENDPOINT: ""
  RAG_QUESTION_SUGGESTIONS: "{}"

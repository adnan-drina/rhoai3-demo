---
apiVersion: batch/v1
kind: Job
metadata:
  name: patch-rag-chatbot-consolelink
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/part-of: rag
    app.kubernetes.io/name: patch-rag-chatbot-consolelink
    app.kubernetes.io/component: job
    demo.rhoai.io/stage: "230"
  annotations:
    argocd.argoproj.io/sync-wave: "33"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 8
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: rag
        app.kubernetes.io/name: patch-rag-chatbot-consolelink
        demo.rhoai.io/stage: "230"
    spec:
      serviceAccountName: patch-rag-chatbot-consolelink
      restartPolicy: Never
      containers:
        - name: patch
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              route_host=""
              for i in $(seq 1 60); do
                route_host=$(oc get route private-rag-chatbot -n enterprise-rag -o jsonpath='{.spec.host}' 2>/dev/null || true)
                if [[ -n "${route_host}" ]]; then
                  break
                fi
                echo "Waiting for private-rag-chatbot route... (${i}/60)"
                sleep 10
              done

              if [[ -z "${route_host}" ]]; then
                echo "Timed out waiting for route/private-rag-chatbot"
                exit 1
              fi

              chatbot_url="https://${route_host}"
              oc patch consolelink rhoai-demo-rag-chatbot --type=merge \
                -p "{\"spec\":{\"href\":\"${chatbot_url}\"}}"

              echo "ConsoleLink patched: ${chatbot_url}"

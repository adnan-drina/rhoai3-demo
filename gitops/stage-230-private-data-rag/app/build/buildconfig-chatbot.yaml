apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: private-rag-chatbot
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/name: private-rag-chatbot
    app.kubernetes.io/component: frontend
    kueue.x-k8s.io/queue-name: default
  annotations:
    argocd.argoproj.io/sync-wave: "29"
spec:
  runPolicy: SerialLatestOnly
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: private-rag-chatbot:latest
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  successfulBuildsHistoryLimit: 3
  failedBuildsHistoryLimit: 3

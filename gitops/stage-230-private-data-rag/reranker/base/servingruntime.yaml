apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: qwen3-reranker
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/part-of: rag
    app.kubernetes.io/name: qwen3-reranker
    app.kubernetes.io/component: reranker
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    opendatahub.io/apiProtocol: REST
    opendatahub.io/kserve-runtime: vllm
    opendatahub.io/runtime-version: v0.13.0
    opendatahub.io/serving-runtime-scope: global
    opendatahub.io/template-display-name: vLLM CPU (x86) ServingRuntime for KServe
    opendatahub.io/template-name: vllm-cpu-x86-runtime-template
    openshift.io/display-name: vLLM CPU (x86) ServingRuntime for KServe
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
spec:
  multiModel: false
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhaiis/vllm-cpu-rhel9@sha256:f05e773647dddd37ec6c2215cb14bec87e4ab5a7d37f2e110d16cd92355427d3
      imagePullPolicy: IfNotPresent
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      ports:
        - containerPort: 8080
          protocol: TCP

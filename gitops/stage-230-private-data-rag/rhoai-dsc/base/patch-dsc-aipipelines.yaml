apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-enable-dsc-aipipelines
  namespace: redhat-ods-applications
  labels:
    app.kubernetes.io/name: enable-dsc-aipipelines
    app.kubernetes.io/component: pipeline-server
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: job-enable-dsc-aipipelines
  labels:
    app.kubernetes.io/name: enable-dsc-aipipelines
    app.kubernetes.io/component: pipeline-server
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups:
      - datasciencecluster.opendatahub.io
    resources:
      - datascienceclusters
    verbs:
      - get
      - patch
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: job-enable-dsc-aipipelines
  labels:
    app.kubernetes.io/name: enable-dsc-aipipelines
    app.kubernetes.io/component: pipeline-server
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: job-enable-dsc-aipipelines
subjects:
  - kind: ServiceAccount
    name: job-enable-dsc-aipipelines
    namespace: redhat-ods-applications
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-enable-dsc-aipipelines
  namespace: redhat-ods-applications
  labels:
    app.kubernetes.io/name: enable-dsc-aipipelines
    app.kubernetes.io/component: pipeline-server
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 900
  template:
    spec:
      serviceAccountName: job-enable-dsc-aipipelines
      restartPolicy: Never
      containers:
        - name: patch
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              oc patch datasciencecluster default-dsc --type=merge -p \
                '{"spec":{"components":{"aipipelines":{"managementState":"Managed","argoWorkflowsControllers":{"managementState":"Managed"}}}}}'
              oc get datasciencecluster default-dsc -o jsonpath='{.spec.components.aipipelines.managementState}{" "}{.spec.components.aipipelines.argoWorkflowsControllers.managementState}'
              echo

              for _ in $(seq 1 60); do
                if oc get crd datasciencepipelinesapplications.datasciencepipelinesapplications.opendatahub.io >/dev/null 2>&1; then
                  echo "DataSciencePipelinesApplication CRD is available"
                  exit 0
                fi
                sleep 10
              done

              echo "Timed out waiting for DataSciencePipelinesApplication CRD" >&2
              exit 1

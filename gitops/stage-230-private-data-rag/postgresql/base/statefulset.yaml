apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: private-rag-postgres
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/part-of: rag
    app.kubernetes.io/name: private-rag-postgres
    app.kubernetes.io/component: database
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  serviceName: private-rag-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: private-rag-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: rag
        app.kubernetes.io/name: private-rag-postgres
        app.kubernetes.io/component: database
      annotations:
        app.openshift.io/runtime: postgresql
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-16:latest
          imagePullPolicy: IfNotPresent
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -ec
                  - |
                    for _ in $(seq 1 60); do
                      if pg_isready -U postgres -d "${POSTGRESQL_DATABASE}"; then
                        psql \
                          -U postgres \
                          -d "${POSTGRESQL_DATABASE}" \
                          -v ON_ERROR_STOP=1 \
                          -c "CREATE EXTENSION IF NOT EXISTS vector;"
                        exit 0
                      fi
                      sleep 5
                    done
                    echo "PostgreSQL did not become ready for pgvector initialization" >&2
                    exit 1
          envFrom:
            - secretRef:
                name: private-rag-postgres-credentials
          ports:
            - containerPort: 5432
              name: postgresql
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - pg_isready -U "${POSTGRESQL_USER}" -d "${POSTGRESQL_DATABASE}"
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - pg_isready -U "${POSTGRESQL_USER}" -d "${POSTGRESQL_DATABASE}"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/part-of: rag
          app.kubernetes.io/name: private-rag-postgres
          app.kubernetes.io/component: database
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi

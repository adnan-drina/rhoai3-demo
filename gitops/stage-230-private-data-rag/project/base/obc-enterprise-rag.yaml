# Project-scoped S3 bucket for Stage 230 private RAG source documents,
# pipeline artifacts, and Docling pipeline outputs. The deterministic bucket
# name lets the GitOps-managed DSPA point at the same object store while NooBaa
# still generates the Secret and ConfigMap named enterprise-rag-bucket at
# runtime. Generated credentials are never committed.
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: enterprise-rag-bucket
  namespace: enterprise-rag
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  bucketName: enterprise-rag
  storageClassName: openshift-storage.noobaa.io

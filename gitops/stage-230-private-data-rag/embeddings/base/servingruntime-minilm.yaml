apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: all-minilm-l6-v2
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/part-of: rag
    app.kubernetes.io/name: all-minilm-l6-v2
    app.kubernetes.io/component: embeddings
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    opendatahub.io/apiProtocol: REST
    opendatahub.io/kserve-runtime: vllm
    opendatahub.io/runtime-version: v0.18.0
    opendatahub.io/serving-runtime-scope: global
    opendatahub.io/template-display-name: vLLM CPU (x86) ServingRuntime for KServe
    opendatahub.io/template-name: vllm-cpu-x86-runtime-template
    openshift.io/display-name: vLLM CPU (x86) ServingRuntime for KServe
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
spec:
  multiModel: false
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhaii/vllm-cpu-rhel9@sha256:0ec0f5ff9a5ff263f58db0cfb19e3d7eef24b94c2d8629fe5145f5a8747e28c9
      imagePullPolicy: IfNotPresent
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      ports:
        - containerPort: 8080
          protocol: TCP

apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: granite-embedding-30m
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/part-of: rag
    app.kubernetes.io/name: granite-embedding-30m
    app.kubernetes.io/component: embeddings
    kueue.x-k8s.io/queue-name: lq-cpu-default
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "11"
    openshift.io/display-name: granite-embedding-30m
    opendatahub.io/model-type: embedding
    security.opendatahub.io/enable-auth: "false"
    serving.kserve.io/deploymentMode: Standard
    serving.kserve.io/stop: "false"
spec:
  predictor:
    automountServiceAccountToken: false
    minReplicas: 1
    maxReplicas: 1
    deploymentStrategy:
      type: RollingUpdate
    model:
      runtime: granite-embedding-30m
      modelFormat:
        name: vLLM
      storageUri: hf://ibm-granite/granite-embedding-30m-english
      args:
        - --runner=pooling
        - --convert=embed
        - --dtype=float32
        - --max-model-len=512
        - --max-num-seqs=32
      env:
        - name: VLLM_CPU_KVCACHE_SPACE
          value: "2"
      resources:
        requests:
          cpu: "6"
          memory: 6Gi
        limits:
          cpu: "10"
          memory: 10Gi

apiVersion: v1
kind: ServiceAccount
metadata:
  name: enterprise-rag-workbench
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/part-of: rag
    app.kubernetes.io/name: enterprise-rag-workbench
    app.kubernetes.io/component: workbench
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "14"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: enterprise-rag-workbench
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/part-of: rag
    app.kubernetes.io/name: enterprise-rag-workbench
    app.kubernetes.io/component: workbench
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "14"
    openshift.io/display-name: enterprise-rag-workbench
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  volumeMode: Filesystem
---
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: enterprise-rag-workbench
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/part-of: rag
    app.kubernetes.io/name: enterprise-rag-workbench
    app.kubernetes.io/component: workbench
    kueue.x-k8s.io/queue-name: lq-cpu-default
    opendatahub.io/dashboard: "true"
    opendatahub.io/odh-managed: "true"
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "14"
    notebooks.opendatahub.io/inject-auth: "true"
    notebooks.opendatahub.io/last-image-selection: s2i-generic-data-science-notebook:3.4
    notebooks.opendatahub.io/last-image-version-git-commit-selection: d3137ca
    opendatahub.io/connections: ""
    opendatahub.io/hardware-profile-name: cpu-default
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/image-display-name: "Jupyter | Data Science | CPU | Python 3.12"
    opendatahub.io/user: ai-2dadmin
    opendatahub.io/username: ai-admin
    openshift.io/display-name: "Enterprise RAG Workbench"
    openshift.io/description: "AG News enterprise RAG ingestion, retrieval, reranking, and grounded answer validation."
    notebooks.opendatahub.io/idle-culling-enabled: "true"
    notebooks.opendatahub.io/idle-culling-time: "30m"
spec:
  template:
    spec:
      enableServiceLinks: false
      serviceAccountName: enterprise-rag-workbench
      initContainers:
        - name: bootstrap-stage-230
          image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-generic-data-science-notebook:3.4
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -ec
          args:
            - |
              export HOME=/opt/app-root/src
              workspace=/opt/app-root/src
              source_dir=/tmp/stage230-source
              stage_dir="${source_dir}/stage-230-private-data-rag"

              rm -rf "${source_dir}"
              git clone --depth 1 --filter=blob:none --sparse --single-branch \
                --branch "${GIT_REPO_BRANCH}" "${GIT_REPO_URL}" "${source_dir}"
              git -C "${source_dir}" sparse-checkout set \
                stage-230-private-data-rag/notebooks \
                stage-230-private-data-rag/scripts \
                stage-230-private-data-rag/data

              rm -rf "${workspace}/rhoai3-demo" "${workspace}/.stage230"
              find "${workspace}" -maxdepth 1 -type f \
                \( -name '*ag_news*.ipynb' -o -name 'enterprise-rag-agnews.ipynb' \) \
                -delete

              mkdir -p "${workspace}/.stage230/scripts" "${workspace}/.stage230/data"
              cp "${stage_dir}/notebooks/Ingestion_pipeline_ag_news.ipynb" "${workspace}/"
              cp "${stage_dir}/notebooks/retrieval_pipeline_ag_news.ipynb" "${workspace}/"
              cp "${stage_dir}/notebooks/requirements.txt" "${workspace}/.stage230/requirements.txt"
              cp "${stage_dir}/scripts/agnews_rag_smoke.py" "${workspace}/.stage230/scripts/"
              cp "${stage_dir}/scripts/agnews_rag_acceptance.py" "${workspace}/.stage230/scripts/"
              cp -R "${stage_dir}/data/agnews-sample" "${workspace}/.stage230/data/"

              python -m pip install -r "${workspace}/.stage230/requirements.txt"
          env:
            - name: GIT_REPO_URL
              value: https://github.com/adnan-drina/rhoai3-demo.git
            - name: GIT_REPO_BRANCH
              value: rhoai34-refactoring
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: workbench-storage
              mountPath: /opt/app-root/src
      containers:
        - name: enterprise-rag-workbench
          image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-generic-data-science-notebook:3.4
          imagePullPolicy: Always
          workingDir: /opt/app-root/src
          env:
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=8888
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/enterprise-rag/enterprise-rag-workbench
                --ServerApp.quit_button=False
            - name: JUPYTER_IMAGE
              value: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-generic-data-science-notebook:3.4
            - name: LLAMA_STACK_BASE_URL
              value: http://lsd-enterprise-rag-service.enterprise-rag.svc.cluster.local:8321
            - name: RHOAI_STAGE230_RERANKER_BASE_URL
              value: http://qwen3-reranker-predictor.enterprise-rag.svc.cluster.local:8080
            - name: RHOAI_STAGE230_GENERATION_MODEL
              value: vllm-inference/nemotron-3-nano-30b-a3b
            - name: RHOAI_STAGE230_RERANKER_MODEL
              value: qwen3-reranker
            - name: PIP_CERT
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: REQUESTS_CA_BUNDLE
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: SSL_CERT_FILE
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: PIPELINES_SSL_SA_CERTS
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: KF_PIPELINES_SSL_SA_CERTS
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: GIT_SSL_CAINFO
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 8Gi
          livenessProbe:
            httpGet:
              path: /notebook/enterprise-rag/enterprise-rag-workbench/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /notebook/enterprise-rag/enterprise-rag-workbench/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 12
          volumeMounts:
            - name: workbench-storage
              mountPath: /opt/app-root/src
            - name: shm
              mountPath: /dev/shm
            - name: trusted-ca
              mountPath: /etc/pki/tls/custom-certs
              readOnly: true
            - name: runtime-images
              mountPath: /opt/app-root/pipeline-runtimes/
      volumes:
        - name: workbench-storage
          persistentVolumeClaim:
            claimName: enterprise-rag-workbench
        - name: shm
          emptyDir:
            medium: Memory
        - name: trusted-ca
          configMap:
            name: workbench-trusted-ca-bundle
            optional: true
        - name: runtime-images
          configMap:
            name: pipeline-runtime-images
            optional: true

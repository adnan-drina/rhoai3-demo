apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: private-rag-postgres
  namespace: demo-sandbox
  labels:
    app.kubernetes.io/name: private-rag-postgres
    app.kubernetes.io/component: vector-database
    # StatefulSet queue labels are immutable after Kueue admission. Stage 230
    # runtime controllers use the RHOAI-created default local queue.
    kueue.x-k8s.io/queue-name: default
  annotations:
    argocd.argoproj.io/sync-wave: "11"
spec:
  serviceName: private-rag-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: private-rag-postgres
      app.kubernetes.io/component: vector-database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: private-rag-postgres
        app.kubernetes.io/component: vector-database
        kueue.x-k8s.io/queue-name: default
    spec:
      serviceAccountName: private-rag-postgres
      containers:
        - name: postgres
          image: docker.io/pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: private-rag-postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: private-rag-postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: private-rag-postgres-credentials
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: init
          configMap:
            name: private-rag-postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: private-rag-postgres
          app.kubernetes.io/component: vector-database
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: private-rag-docling
  namespace: demo-sandbox
  labels:
    app.kubernetes.io/name: private-rag-docling
    app.kubernetes.io/component: document-processing
  annotations:
    argocd.argoproj.io/sync-wave: "12"
    openshift.io/display-name: Private RAG Docling
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: private-rag-docling
      app.kubernetes.io/component: document-processing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: private-rag-docling
        app.kubernetes.io/component: document-processing
        kueue.x-k8s.io/queue-name: lq-cpu-default
    spec:
      containers:
        - name: docling
          image: quay.io/docling-project/docling-serve:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5001
              protocol: TCP
          env:
            - name: DOCLING_SERVE_PORT
              value: "5001"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 180
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 6Gi

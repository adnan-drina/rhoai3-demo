apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  name: lsd-private-rag
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/name: lsd-private-rag
    app.kubernetes.io/component: rag-orchestration
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    openshift.io/display-name: Private Data RAG
spec:
  replicas: 1
  network:
    exposeRoute: true
  server:
    distribution:
      name: rh-dev
    containerSpec:
      name: llama-stack
      port: 8321
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 4Gi
      env:
        # OpenShift AI 3.4 requires these variables to enable the inline
        # sentence-transformers embedding provider.
        - name: ENABLE_SENTENCE_TRANSFORMERS
          value: "true"
        - name: EMBEDDING_PROVIDER
          value: sentence-transformers
        - name: ENABLE_PGVECTOR
          value: "true"
        - name: FMS_ORCHESTRATOR_URL
          value: http://localhost

        # Governed Nemotron generation model exposed by Stage 220 MaaS.
        - name: INFERENCE_MODEL
          valueFrom:
            secretKeyRef:
              name: private-rag-llama-stack-secret
              key: INFERENCE_MODEL
        - name: VLLM_URL
          valueFrom:
            secretKeyRef:
              name: private-rag-llama-stack-secret
              key: VLLM_URL
        - name: VLLM_TLS_VERIFY
          valueFrom:
            secretKeyRef:
              name: private-rag-llama-stack-secret
              key: VLLM_TLS_VERIFY
        - name: VLLM_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: private-rag-llama-stack-secret
              key: VLLM_API_TOKEN
        - name: VLLM_MAX_TOKENS
          valueFrom:
            secretKeyRef:
              name: private-rag-llama-stack-secret
              key: VLLM_MAX_TOKENS
        - name: EMBEDDING_MODEL
          valueFrom:
            secretKeyRef:
              name: private-rag-llama-stack-secret
              key: EMBEDDING_MODEL
        - name: EMBEDDING_PROVIDER_MODEL_ID
          valueFrom:
            secretKeyRef:
              name: private-rag-llama-stack-secret
              key: EMBEDDING_PROVIDER_MODEL_ID

        # PostgreSQL is used for Llama Stack metadata persistence and pgvector.
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: private-rag-postgres-credentials
              key: PGVECTOR_HOST
        - name: POSTGRES_PORT
          valueFrom:
            secretKeyRef:
              name: private-rag-postgres-credentials
              key: PGVECTOR_PORT
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: private-rag-postgres-credentials
              key: PGVECTOR_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: private-rag-postgres-credentials
              key: PGVECTOR_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: private-rag-postgres-credentials
              key: PGVECTOR_PASSWORD

        # Durable pgvector store for vector search.
        - name: PGVECTOR_HOST
          valueFrom:
            secretKeyRef:
              name: private-rag-postgres-credentials
              key: PGVECTOR_HOST
        - name: PGVECTOR_PORT
          valueFrom:
            secretKeyRef:
              name: private-rag-postgres-credentials
              key: PGVECTOR_PORT
        - name: PGVECTOR_DB
          valueFrom:
            secretKeyRef:
              name: private-rag-postgres-credentials
              key: PGVECTOR_DB
        - name: PGVECTOR_USER
          valueFrom:
            secretKeyRef:
              name: private-rag-postgres-credentials
              key: PGVECTOR_USER
        - name: PGVECTOR_PASSWORD
          valueFrom:
            secretKeyRef:
              name: private-rag-postgres-credentials
              key: PGVECTOR_PASSWORD

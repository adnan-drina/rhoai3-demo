apiVersion: v1
kind: ConfigMap
metadata:
  name: lsd-enterprise-rag-config
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/part-of: rag
    app.kubernetes.io/name: lsd-enterprise-rag
    app.kubernetes.io/component: orchestrator
  annotations:
    argocd.argoproj.io/sync-wave: "11"
data:
  config.yaml: |
    version: 2
    image_name: rh

    apis:
      - batches
      - datasetio
      - eval
      - inference
      - responses
      - safety
      - scoring
      - tool_runtime
      - vector_io
      - files

    providers:
      batches:
        - provider_id: reference
          provider_type: inline::reference
          config:
            kvstore:
              backend: kv_default
              namespace: batches
      datasetio:
        - provider_id: huggingface
          provider_type: remote::huggingface
          config:
            kvstore:
              backend: kv_default
              namespace: datasetio::huggingface
        - provider_id: localfs
          provider_type: inline::localfs
          config:
            kvstore:
              backend: kv_default
              namespace: datasetio::localfs
      eval:
        - provider_id: trustyai_lmeval
          provider_type: remote::trustyai_lmeval
          module: llama_stack_provider_lmeval==0.4.2
          config:
            base_url: ${env.VLLM_URL}
            use_k8s: true
      files:
        - provider_id: meta-reference-files
          provider_type: inline::localfs
          config:
            metadata_store:
              backend: sql_default
              table_name: files_metadata
            storage_dir: /opt/app-root/src/.llama/distributions/rh/files
      inference:
        - provider_id: vllm-inference
          provider_type: remote::vllm
          config:
            base_url: ${env.VLLM_URL}
            api_token: ${env.VLLM_API_TOKEN:=}
            max_tokens: ${env.VLLM_MAX_TOKENS:=4096}
            tls_verify: ${env.VLLM_TLS_VERIFY:=false}
            drop_params: true
        - provider_id: vllm-reranker
          provider_type: remote::vllm
          config:
            base_url: ${env.VLLM_RERANKER_URL}
            tls_verify: ${env.VLLM_RERANKER_TLS_VERIFY:=false}
        # max_tokens must be explicitly 0: the adapter injects its config
        # default (4096 even when omitted) whenever a request only carries
        # max_completion_tokens, and the OpenAI backend rejects requests
        # with both parameters set.
        - provider_id: vllm-gpt
          provider_type: remote::vllm
          config:
            base_url: ${env.VLLM_GPT_URL}
            api_token: ${env.VLLM_API_TOKEN:=}
            max_tokens: 0
            tls_verify: ${env.VLLM_TLS_VERIFY:=false}
            drop_params: true
        - provider_id: vllm-granite
          provider_type: remote::vllm
          config:
            base_url: ${env.VLLM_GRANITE_EMBEDDING_URL}
            tls_verify: false
        - provider_id: vllm-minilm
          provider_type: remote::vllm
          config:
            base_url: ${env.VLLM_MINILM_EMBEDDING_URL}
            tls_verify: false
        - provider_id: sentence-transformers
          provider_type: inline::sentence-transformers
          config: {}
      # The Responses API backs chatbot agent mode (including MCP tool
      # calling); persistence reuses the Stage 230 Postgres backends.
      responses:
        - provider_id: builtin
          provider_type: inline::builtin
          config:
            persistence:
              agent_state:
                namespace: agents
                backend: kv_default
              responses:
                table_name: responses
                backend: sql_default
                max_write_queue_size: 10000
                num_writers: 4
      safety:
        - provider_id: trustyai_fms
          provider_type: remote::trustyai_fms
          module: llama_stack_provider_trustyai_fms==0.3.2
          config:
            shields: {}
        # Stage 240 NeMo Guardrails service (TrustyAI-managed, ai-safety
        # namespace). The provider posts shield checks to
        # /v1/guardrail/checks with the config_id of the NeMo configuration
        # defined in the stage-240 nemo-guardrails-config ConfigMap.
        - provider_id: nemo-guardrails
          provider_type: remote::nvidia
          config:
            guardrails_service_url: ${env.GUARDRAILS_SERVICE_URL:=http://nemo-guardrails-internal.ai-safety.svc.cluster.local:8000}
            config_id: demo-safety
      scoring:
        - provider_id: basic
          provider_type: inline::basic
          config: {}
        - provider_id: llm-as-judge
          provider_type: inline::llm-as-judge
          config: {}
      tool_runtime:
        - provider_id: brave-search
          provider_type: remote::brave-search
          config:
            api_key: ${env.BRAVE_SEARCH_API_KEY:=}
            max_results: 3
        - provider_id: tavily-search
          provider_type: remote::tavily-search
          config:
            api_key: ${env.TAVILY_SEARCH_API_KEY:=}
            max_results: 3
        - provider_id: file-search
          provider_type: inline::file-search
          config: {}
        - provider_id: model-context-protocol
          provider_type: remote::model-context-protocol
          config: {}
      vector_io:
        - provider_id: pgvector
          provider_type: remote::pgvector
          config:
            host: ${env.PGVECTOR_HOST}
            port: ${env.PGVECTOR_PORT}
            db: ${env.PGVECTOR_DB}
            user: ${env.PGVECTOR_USER}
            password: ${env.PGVECTOR_PASSWORD}
            distance_metric: COSINE
            vector_index:
              type: HNSW
              m: 16
              ef_construction: 64
              ef_search: 40
            persistence:
              backend: kv_default
              namespace: vector_io::pgvector
        - provider_id: milvus
          provider_type: remote::milvus
          config:
            uri: ${env.MILVUS_URL}
            token: ${env.MILVUS_TOKEN}
            consistency_level: ${env.MILVUS_CONSISTENCY_LEVEL:=Strong}
            persistence:
              backend: kv_default
              namespace: vector_io::milvus

    # Stage 220's read-only OpenShift MCP server (rhoai-mcp namespace).
    # llama-stack 0.7.x replaced MCP toolgroups with top-level connectors
    # (StackConfig.connectors, not registered_resources); the Responses API
    # calls the URL from the Llama Stack pod, so the in-cluster Service URI
    # is the correct reachability path.
    connectors:
      - connector_id: openshift
        connector_type: mcp
        url: http://openshift-mcp.rhoai-mcp.svc.cluster.local:8080/mcp
        server_label: openshift

    registered_resources:
      benchmarks: []
      datasets: []
      models:
        # The MaaS external-model proxy exposes chat completions but not
        # /v1/models, so the governed GPT model cannot be auto-discovered
        # and is registered explicitly.
        - model_id: vllm-gpt/gpt-4o-mini
          provider_id: vllm-gpt
          provider_model_id: gpt-4o-mini
          model_type: llm
        - model_id: sentence-transformers/BAAI/bge-m3
          provider_id: sentence-transformers
          provider_model_id: BAAI/bge-m3
          model_type: embedding
          metadata:
            embedding_dimension: 1024
        - model_id: vllm-granite/granite-embedding-30m
          provider_id: vllm-granite
          provider_model_id: granite-embedding-30m
          model_type: embedding
          metadata:
            embedding_dimension: 384
        - model_id: vllm-minilm/all-minilm-l6-v2
          provider_id: vllm-minilm
          provider_model_id: all-minilm-l6-v2
          model_type: embedding
          metadata:
            embedding_dimension: 384
      scoring_fns: []
      # Stage 240 registers the NeMo Guardrails demo-safety configuration as
      # a shield; the chatbot guardrail selectors list it for input and
      # output checks. The shield_id must be the governed model name: the
      # remote::nvidia provider sends shield_id as the request "model", and
      # the NeMo server forwards it to MaaS, which authorizes per model.
      shields:
        - shield_id: nemotron-3-nano-30b-a3b
          provider_id: nemo-guardrails
          provider_shield_id: demo-safety
      tool_groups: []
      vector_stores: []

    server:
      port: 8321
      workers: 1

    storage:
      backends:
        kv_default:
          type: kv_postgres
          host: ${env.POSTGRES_HOST}
          port: ${env.POSTGRES_PORT}
          db: ${env.POSTGRES_DB}
          user: ${env.POSTGRES_USER}
          password: ${env.POSTGRES_PASSWORD}
          table_name: llamastack_kvstore
        sql_default:
          type: sql_postgres
          host: ${env.POSTGRES_HOST}
          port: ${env.POSTGRES_PORT}
          db: ${env.POSTGRES_DB}
          user: ${env.POSTGRES_USER}
          password: ${env.POSTGRES_PASSWORD}
      stores:
        conversations:
          backend: sql_default
          table_name: openai_conversations
        inference:
          backend: sql_default
          max_write_queue_size: 10000
          num_writers: 4
          table_name: inference_store
        metadata:
          backend: kv_default
          namespace: registry
        prompts:
          backend: kv_default
          namespace: prompts

    vector_stores:
      annotation_prompt_params:
        annotation_instruction_template: "Do not emit opaque file-id citation markers in demo answers."
        chunk_annotation_template: |
          [{index}] file_search result from {file_id}

          {metadata_text}

          {chunk_text}
        enable_annotations: true
      chunk_retrieval_params:
        chunk_multiplier: 5
        default_reranker_strategy: rrf
        max_tokens_in_context: 4000
        rrf_impact_factor: 60.0
        weighted_search_alpha: 0.5
      context_prompt_params:
        chunk_annotation_template: |
          Result {index}

          Content: {chunk.content}

          Metadata: {metadata}
        context_template: |
          The above results were retrieved to help answer the user's query: "{query}". Use them as supporting information only in answering this query. {annotation_instruction}
      file_batch_params:
        cleanup_interval_seconds: 86400
        file_batch_chunk_size: 10
        max_concurrent_files_per_batch: 3
      file_ingestion_params:
        default_chunk_overlap_tokens: 128
        default_chunk_size_tokens: 512
      file_search_params:
        footer_template: |
          END of knowledge_search tool results.
        header_template: |
          file_search knowledge_search tool found {num_chunks} chunks:

          BEGIN of knowledge_search tool results.

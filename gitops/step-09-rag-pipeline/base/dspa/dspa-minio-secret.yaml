# DSPA MinIO Credentials
# DSPA expects field names accesskey/secretkey, not the AWS_ACCESS_KEY_ID convention
# used by the minio-connection data-connection secret.
#
# ⚠️ DEMO VALUES ONLY - Replace for production use
# These must match the RHOAI service account credentials from step-03.
apiVersion: v1
kind: Secret
metadata:
  name: dspa-minio-credentials
  namespace: private-ai
  labels:
    app.kubernetes.io/part-of: rag-pipeline
    app.kubernetes.io/component: pipeline-server
  annotations:
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
stringData:
  accesskey: rhoai-access-key
  secretkey: rhoai-secret-key-12345

apiVersion: v1
kind: Service
metadata:
  name: milvus-standalone
  namespace: private-ai
  labels:
    app: milvus
    app.kubernetes.io/name: milvus
    app.kubernetes.io/component: vector-database
    app.kubernetes.io/part-of: rag-pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: ClusterIP
  selector:
    app: milvus
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
      protocol: TCP
    - name: metrics
      port: 9091
      targetPort: 9091
      protocol: TCP

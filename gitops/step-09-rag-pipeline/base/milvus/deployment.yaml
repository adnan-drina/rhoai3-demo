# Milvus Standalone with Embedded etcd
# Persistent vector database for RAG document storage.
# Uses embedded etcd (ETCD_USE_EMBED=true) to avoid a separate etcd deployment.
#
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html/working_with_llama_stack/deploying-a-rag-stack-in-a-project_rag
# Ref: https://milvus.io/docs/install_standalone-docker.md
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-standalone
  namespace: private-ai
  labels:
    app: milvus
    app.kubernetes.io/name: milvus
    app.kubernetes.io/component: vector-database
    app.kubernetes.io/part-of: rag-pipeline
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    openshift.io/display-name: "Milvus Vector Database"
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
        app.kubernetes.io/name: milvus
        app.kubernetes.io/component: vector-database
        app.kubernetes.io/part-of: rag-pipeline
    spec:
      containers:
        - name: milvus
          image: milvusdb/milvus:v2.4.0
          command:
            - milvus
            - run
            - standalone
          ports:
            - containerPort: 19530
              name: grpc
              protocol: TCP
            - containerPort: 9091
              name: metrics
              protocol: TCP
          env:
            - name: ETCD_USE_EMBED
              value: "true"
            - name: ETCD_DATA_DIR
              value: /var/lib/milvus/etcd
            - name: COMMON_STORAGETYPE
              value: local
          volumeMounts:
            - name: milvus-data
              mountPath: /var/lib/milvus
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: milvus-data
          persistentVolumeClaim:
            claimName: milvus-pvc

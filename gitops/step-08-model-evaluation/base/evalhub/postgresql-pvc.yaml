apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: evalhub-postgres-data
  namespace: evalhub-system
  labels:
    app.kubernetes.io/name: evalhub-postgres
    app.kubernetes.io/instance: evalhub-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: rag-evaluation
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: evalhub-postgres
  namespace: evalhub-system
  labels:
    app: evalhub-postgres
    app.kubernetes.io/name: evalhub-postgres
    app.kubernetes.io/instance: evalhub-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: rag-evaluation
    app.kubernetes.io/managed-by: argocd
    app.openshift.io/runtime: postgresql
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evalhub-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: evalhub-postgres
        app.kubernetes.io/name: evalhub-postgres
        app.kubernetes.io/instance: evalhub-postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: rag-evaluation
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-16:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5432
              name: postgresql
              protocol: TCP
          env:
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: evalhub-db-credentials
                  key: database-name
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: evalhub-db-credentials
                  key: database-user
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: evalhub-db-credentials
                  key: database-password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRESQL_USER" -d "$POSTGRESQL_DATABASE"
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRESQL_USER" -d "$POSTGRESQL_DATABASE"
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: evalhub-postgres-data

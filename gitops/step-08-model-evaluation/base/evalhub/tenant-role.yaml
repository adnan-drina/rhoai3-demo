apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: evalhub-evaluator
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/name: evalhub-evaluator
    app.kubernetes.io/instance: enterprise-rag
    app.kubernetes.io/component: model-evaluation
    app.kubernetes.io/part-of: rag-evaluation
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups:
      - trustyai.opendatahub.io
    resources:
      - evaluations
      - collections
      - providers
    verbs:
      - get
      - list
      - create
      - update
      - delete
  - apiGroups:
      - mlflow.kubeflow.org
    resources:
      - experiments
    verbs:
      - create
      - get

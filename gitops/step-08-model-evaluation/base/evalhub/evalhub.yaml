apiVersion: trustyai.opendatahub.io/v1alpha1
kind: EvalHub
metadata:
  name: evalhub
  namespace: evalhub-system
  labels:
    app.kubernetes.io/name: evalhub
    app.kubernetes.io/instance: evalhub
    app.kubernetes.io/component: model-evaluation
    app.kubernetes.io/part-of: rag-evaluation
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  database:
    type: postgresql
    secret: evalhub-db-credentials
    maxOpenConns: 10
    maxIdleConns: 5
  providers:
    - lm-evaluation-harness
    - garak
    - guidellm
    - lighteval
    - rhoai-rag-scenarios
  collections:
    - safety-and-fairness-v1
    - rhoai-rag-pre-post-v1
  env:
    - name: MLFLOW_TRACKING_URI
      value: https://mlflow.redhat-ods-applications.svc:8443
    - name: MLFLOW_WORKSPACE
      value: enterprise-rag
    - name: MLFLOW_INSECURE_SKIP_VERIFY
      value: "true"

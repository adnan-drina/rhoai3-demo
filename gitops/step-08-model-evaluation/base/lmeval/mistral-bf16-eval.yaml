# LMEvalJob template for mistral-3-bf16
# Evaluates reasoning, logic, and general knowledge via standard benchmarks.
# Apply on demand: oc apply -f mistral-bf16-eval.yaml -n private-ai
# Results visible in Dashboard: Develop & train > Evaluations
apiVersion: trustyai.opendatahub.io/v1alpha1
kind: LMEvalJob
metadata:
  name: mistral-3-bf16-eval
  namespace: private-ai
  labels:
    app.kubernetes.io/name: mistral-bf16-eval
    app.kubernetes.io/component: model-evaluation
    app.kubernetes.io/part-of: rag-evaluation
spec:
  model: local-completions
  modelArgs:
    - name: model
      value: mistral-3-bf16
    - name: base_url
      value: http://mistral-3-bf16-predictor.private-ai.svc.cluster.local:8080/v1/completions
    - name: num_concurrent
      value: "1"
    - name: max_retries
      value: "3"
    - name: tokenized_requests
      value: "false"
    - name: tokenizer
      value: mistralai/Mistral-Small-24B-Instruct-2501
  taskList:
    taskNames:
      - hellaswag
      - arc_challenge
      - winogrande
      - boolq
  # Default limit for demo — fast runs (~10 min). Remove or increase for full benchmarks.
  limit: "50"
  logSamples: true
  batchSize: "1"
  allowOnline: true
  allowCodeExecution: true
  pod:
    container:
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
  outputs:
    pvcManaged:
      size: 2Gi

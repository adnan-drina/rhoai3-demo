name: "Whoami (CV) — Pre-RAG Baseline"
description: "Baseline WITHOUT document retrieval. The LLM hallucinates — it thinks Adnan Drina is a Bosnian football coach."
vector_db_id: null
model_id: granite-8b-agent
mode: pre-rag

scoring_params:
  "llm-as-judge::base":
    type: llm_as_judge
    judge_model: granite-8b-agent
    prompt_template: scoring-templates/judge_prompt.txt
    judge_score_regexes:
      - "Answer: (A|B|C|D|E)"
  "basic::subset_of": null

tests:
  - prompt: "Who is Adnan Drina?"
    expected_result: "Adnan Drina is a Principal Solution Architect at Red Hat, specializing in application development, artificial intelligence, and developer experience. He is known for transforming ideas into practical software architectures that aid organizations in adopting open, scalable AI/ML platforms and modern cloud-native development workflows."
    expected_tools: []

  - prompt: "What is Adnan Drina's current employment status?"
    expected_result: "Adnan Drina is currently employed as a Principal Solution Architect at Red Hat."
    expected_tools: []

  - prompt: "What is Adnan Drina's educational background?"
    expected_result: "Adnan Drina attended the University of Sarajevo."
    expected_tools: []

  - prompt: "Where is Adnan Drina based?"
    expected_result: "Adnan Drina is based in the Netherlands."
    expected_tools: []

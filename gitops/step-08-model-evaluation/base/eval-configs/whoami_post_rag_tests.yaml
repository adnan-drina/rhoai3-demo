name: "Whoami (CV) — Post-RAG Evaluation"
description: "Evaluation WITH document retrieval. Expected answers from actual CV content."
vector_db_id: whoami
model_id: granite-8b-agent
mode: post-rag

scoring_params:
  "llm-as-judge::base":
    type: llm_as_judge
    judge_model: granite-8b-agent
    prompt_template: scoring-templates/judge_prompt.txt
    judge_score_regexes:
      - "Answer: (A|B|C|D|E)"
  "basic::subset_of": null
  "basic::tool_choice": null

tests:
  - prompt: "What is Adnan Drina's current job title and company?"
    expected_result: "Principal Solution Architect at Red Hat, focused on AI, Application Development, and Developer Experience."
    expected_tools:
      - builtin::rag/knowledge_search

  - prompt: "What are Adnan Drina's main areas of expertise?"
    expected_result: "AI and ML platform adoption, application development strategy and solution architecture, developer experience and workflow modernization, OpenShift and Kubernetes platforms, cloud-native architectures and GitOps."
    expected_tools:
      - builtin::rag/knowledge_search

  - prompt: "Where is Adnan Drina based?"
    expected_result: "Netherlands."
    expected_tools:
      - builtin::rag/knowledge_search

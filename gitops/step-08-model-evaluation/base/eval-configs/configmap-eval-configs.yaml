apiVersion: v1
kind: ConfigMap
metadata:
  name: eval-configs
  namespace: private-ai
  labels:
    app.kubernetes.io/name: rag-evaluation
    app.kubernetes.io/component: eval-configs
    app.kubernetes.io/part-of: rag-evaluation
  annotations:
    argocd.argoproj.io/sync-wave: "8"
data:
  judge_prompt.txt: |
    You are an evaluation judge comparing a GENERATED RESPONSE against an EXPECTED RESPONSE.

    Question: {input_query}
    Expected Response: {expected_answer}
    Generated Response: {generated_answer}

    INSTRUCTIONS:
    - Compare ONLY the Generated Response against the Expected Response.
    - Do NOT introduce information not present in either response.
    - Focus on factual alignment, not writing style.

    Select the BEST match (A is best, E is worst):
    (A) The Generated Response contains the SAME key facts as the Expected Response — full alignment.
    (B) The Generated Response is a SUPERSET — it covers all expected points plus additional correct detail.
    (C) The Generated Response is a SUBSET — it covers some but not all expected points.
    (D) The responses differ but the differences do NOT affect factual accuracy.
    (E) The Generated Response DISAGREES with or CONTRADICTS the Expected Response.

    You MUST respond with exactly one letter in parentheses followed by a brief explanation.

    Answer:

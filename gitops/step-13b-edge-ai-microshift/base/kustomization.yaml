apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Tekton pipeline for building ModelCar OCI images and promoting
# models to the edge fleet via GitOps. Runs in enterprise-mlops namespace
# alongside the KFP training pipeline.
#
# Release secrets (quay-push-credentials, github-push-credentials) are
# external run prerequisites and are not stored in Git.

resources:
  - build-modelcar.yaml
  - update-gitops.yaml
  - pipeline.yaml

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Tekton pipeline for building ModelCar OCI images and promoting
# models to the edge fleet via GitOps. Runs in private-ai namespace
# alongside the KFP training pipeline.
#
# Secrets (quay-push-credentials, github-push-credentials) are
# created by deploy.sh — not stored in Git.

resources:
  - build-modelcar.yaml
  - update-gitops.yaml
  - pipeline.yaml

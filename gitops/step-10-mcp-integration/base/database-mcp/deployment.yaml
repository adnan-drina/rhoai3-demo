apiVersion: apps/v1
kind: Deployment
metadata:
  name: database-mcp
  namespace: private-ai
  labels:
    app: database-mcp
    app.kubernetes.io/name: database-mcp
    app.kubernetes.io/part-of: mcp-integration
    app.kubernetes.io/component: mcp-server
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database-mcp
  template:
    metadata:
      labels:
        app: database-mcp
        app.kubernetes.io/part-of: mcp-integration
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: database-mcp
          image: quay.io/mcp-servers/edb-postgres-mcp:10-03-2025
          args:
            - --transport=sse
            - --sse-host=0.0.0.0
            - --sse-port=8080
            - --access-mode=unrestricted
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: DATABASE_URI
              value: "postgresql://$(PGUSER):$(PGPASSWORD)@postgresql.private-ai.svc.cluster.local:5432/acme_equipment"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRESQL_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRESQL_PASSWORD
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

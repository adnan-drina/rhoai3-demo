# The MCP server needs to list pods, get logs, and read events.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshift-mcp-view
  namespace: acme-corp
  labels:
    app.kubernetes.io/name: openshift-mcp
    app.kubernetes.io/part-of: mcp-integration
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: openshift-mcp
    namespace: private-ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcp-pod-reader
  namespace: acme-corp
  labels:
    app.kubernetes.io/name: openshift-mcp
    app.kubernetes.io/part-of: mcp-integration
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-pod-reader
  namespace: acme-corp
  labels:
    app.kubernetes.io/name: openshift-mcp
    app.kubernetes.io/part-of: mcp-integration
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mcp-pod-reader
subjects:
  - kind: ServiceAccount
    name: openshift-mcp
    namespace: private-ai

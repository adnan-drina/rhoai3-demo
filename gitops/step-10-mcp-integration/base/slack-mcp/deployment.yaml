apiVersion: apps/v1
kind: Deployment
metadata:
  name: slack-mcp
  namespace: private-ai
  labels:
    app: slack-mcp
    app.kubernetes.io/name: slack-mcp
    app.kubernetes.io/part-of: mcp-integration
    app.kubernetes.io/component: mcp-server
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slack-mcp
  template:
    metadata:
      labels:
        app: slack-mcp
        app.kubernetes.io/part-of: mcp-integration
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: slack-mcp
          image: quay.io/mcp-servers/slack-mcp-server:10-03-2025
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack-mcp-credentials
                  key: SLACK_BOT_TOKEN
            - name: SLACK_TEAM_ID
              valueFrom:
                secretKeyRef:
                  name: slack-mcp-credentials
                  key: SLACK_TEAM_ID
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

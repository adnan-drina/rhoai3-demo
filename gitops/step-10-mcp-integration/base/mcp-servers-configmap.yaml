# The RHOAI Dashboard discovers MCP servers from this ConfigMap.
# Each value is a JSON object with: url, description, and optionally transport.
# The gen-ai backend defaults to "streamable-http" transport (POST to URL).
# Servers that only support SSE transport (GET /sse + POST /messages) MUST
# set "transport": "sse" or the Dashboard will show "Error" status.
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html/experimenting_with_models_in_the_gen_ai_playground/playground-prerequisites_rhoai-user#configuring-model-context-protocol-servers_rhoai-user
apiVersion: v1
kind: ConfigMap
metadata:
  name: gen-ai-aa-mcp-servers
  namespace: redhat-ods-applications
  labels:
    app.kubernetes.io/part-of: private-ai-platform
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  # deploy.sh overwrites these with cluster-specific route URLs at deploy time.
  # ArgoCD ignoreDifferences on /data prevents selfHeal from reverting.
data:
  Database-MCP: |
    {
      "url": "http://database-mcp.private-ai.svc:8080/sse",
      "transport": "sse",
      "description": "Query the ACME corporate PostgreSQL database (EDB Postgres MCP). Provides SQL access to equipment records, service history, calibration data, and pod-equipment mappings."
    }
  OpenShift-MCP: |
    {
      "url": "http://openshift-mcp.private-ai.svc:8000/mcp",
      "description": "Interact with the OpenShift cluster (Kubernetes MCP Server). Query pod status, logs, events, deployments, and cluster resources. Read-only mode."
    }
  Slack-MCP: |
    {
      "url": "http://slack-mcp.private-ai.svc:8080/sse",
      "transport": "sse",
      "description": "Post messages and notifications to Slack channels (Slack MCP Server). Send equipment alerts and updates to the #all-acme-mcp-demo channel."
    }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: openshift-mcp
  namespace: private-ai
  labels:
    app: openshift-mcp
    app.kubernetes.io/name: openshift-mcp
    app.kubernetes.io/part-of: mcp-integration
    app.kubernetes.io/component: mcp-server
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"openshift-mcp:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"openshift-mcp\")].image"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openshift-mcp
  template:
    metadata:
      labels:
        app: openshift-mcp
        app.kubernetes.io/part-of: mcp-integration
    spec:
      serviceAccountName: openshift-mcp
      securityContext:
        runAsNonRoot: true
      containers:
        - name: openshift-mcp
          image: image-registry.openshift-image-registry.svc:5000/private-ai/openshift-mcp:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: openshift-mcp-config
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

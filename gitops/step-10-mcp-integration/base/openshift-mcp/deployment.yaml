apiVersion: apps/v1
kind: Deployment
metadata:
  name: openshift-mcp
  namespace: private-ai
  labels:
    app: openshift-mcp
    app.kubernetes.io/name: openshift-mcp
    app.kubernetes.io/part-of: mcp-integration
    app.kubernetes.io/component: mcp-server
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openshift-mcp
  template:
    metadata:
      labels:
        app: openshift-mcp
        app.kubernetes.io/part-of: mcp-integration
    spec:
      serviceAccountName: openshift-mcp
      securityContext:
        runAsNonRoot: true
      containers:
        - name: openshift-mcp
          image: quay.io/mcp-servers/kubernetes-mcp-server:2025-11-24
          args:
            - --transport=sse
            - --sse-port=8000
            - --read-only
          ports:
            - containerPort: 8000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30

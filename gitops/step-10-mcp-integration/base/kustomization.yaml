apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Step 10: MCP Integration — All prebuilt images from Red Hat Ecosystem Catalog
# No on-cluster builds required. All 3 MCP servers use trusted quay.io/mcp-servers/ images:
#   1. database-mcp  (quay.io/mcp-servers/edb-postgres-mcp — generic SQL access)
#   2. openshift-mcp (quay.io/mcp-servers/kubernetes-mcp-server — read-only cluster)
#   3. slack-mcp     (quay.io/mcp-servers/slack-mcp-server — Slack API integration)
# Supporting resources: PostgreSQL (RHEL9), acme-corp demo namespace, MCP ConfigMap

resources:
  - mcp-servers-configmap.yaml
  - acme-corp/
  - postgresql/
  - database-mcp/
  - openshift-mcp/
  - slack-mcp/

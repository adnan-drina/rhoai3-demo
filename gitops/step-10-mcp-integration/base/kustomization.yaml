apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Step 10: MCP Integration
# Deploys the Model Context Protocol infrastructure:
#   0. MCP server discovery ConfigMap (gen-ai-aa-mcp-servers in redhat-ods-applications)
#      — RHOAI Dashboard Playground uses this to discover available MCP servers in the UI
#   1. PostgreSQL (ACME equipment database)
#   2. BuildConfigs for 3 MCP server images
#   3. database-mcp (equipment queries via PostgreSQL)
#   4. openshift-mcp (cluster inspection via K8s API)
#   5. slack-mcp (team notifications in demo mode)

resources:
  - mcp-servers-configmap.yaml
  - acme-corp/
  - postgresql/
  - mcp-builds/
  - database-mcp/
  - openshift-mcp/
  - slack-mcp/

      ('LITHO-001', '2025-08-15', 'Corrective Maintenance', 'TECH-012',
       'Focus sensor adjustment. Returned to nominal performance.', '{}', 2.5, 1500.00),
      ('L-900-07', '2024-10-01', 'Preventive Maintenance', 'TECH-007',

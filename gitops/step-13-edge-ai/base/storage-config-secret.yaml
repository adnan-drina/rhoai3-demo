# DEMO VALUES ONLY
# KServe storage-initializer credentials for the edge namespace.
# Points to the same MinIO as the central private-ai namespace.
# In production edge, this would point to a local S3 or a synced model cache.
apiVersion: v1
kind: Secret
metadata:
  name: storage-config
  namespace: edge-ai-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  minio-connection: |
    {
      "type": "s3",
      "access_key_id": "rhoai-access-key",
      "secret_access_key": "rhoai-secret-key-12345",
      "endpoint_url": "http://minio.minio-storage.svc:9000",
      "bucket": "rhoai-storage",
      "region": "us-east-1"
    }

# Demo Notebooks ConfigMap
# Contains sample notebooks for GPU-as-a-Service demonstration
apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-demo-notebooks
  namespace: private-ai
  labels:
    app: gpu-demo
data:
  # GPU Test Script - Run this to verify GPU access
  gpu-test.py: |
    #!/usr/bin/env python3
    """
    GPU-as-a-Service Demo - GPU Verification Script
    Run this to verify your workbench has GPU access.
    """
    import torch
    import time
    import os

    def check_gpu():
        print("=" * 60)
        print("🚀 GPU-as-a-Service Demo")
        print("=" * 60)
        
        if torch.cuda.is_available():
            gpu_name = torch.cuda.get_device_name(0)
            gpu_memory = torch.cuda.get_device_properties(0).total_memory / 1e9
            print(f"✅ GPU Available: {gpu_name}")
            print(f"✅ GPU Memory: {gpu_memory:.2f} GB")
            print(f"✅ CUDA Version: {torch.version.cuda}")
            
            # Simple GPU computation to show it's working
            print("\n🔄 Running GPU matrix multiplication...")
            x = torch.randn(5000, 5000, device='cuda')
            
            start = time.time()
            for i in range(5):
                y = torch.matmul(x, x)
                torch.cuda.synchronize()
                print(f"   Iteration {i+1}/5 complete")
            elapsed = time.time() - start
            
            print(f"\n✅ GPU computation completed in {elapsed:.2f}s")
            print(f"   Memory allocated: {torch.cuda.memory_allocated(0)/1e9:.2f} GB")
        else:
            print("❌ No GPU available - check your Hardware Profile selection")
        
        print("=" * 60)

    if __name__ == "__main__":
        check_gpu()

  # Jupyter Notebook for interactive demo
  gpu-demo.ipynb: |

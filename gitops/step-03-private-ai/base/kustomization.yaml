apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Step 03: Private AI — GPU as a Service
# S3 storage via MinIO, user authentication/RBAC, and GPU scheduling
# via direct nodeSelector/tolerations on InferenceService manifests.

resources:
  - minio/
  - auth/htpasswd-secret.yaml
  - auth/oauth.yaml
  - namespace.yaml
  - data-connection.yaml
  - storage-config-secret.yaml
  - rbac/project-admin.yaml
  - rbac/project-editor.yaml

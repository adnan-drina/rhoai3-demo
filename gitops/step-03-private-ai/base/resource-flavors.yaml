# IMPORTANT (RHOAI 3.3 / Kueue 1.2 / Pod integration):
# tolerations are intentionally omitted. With the Pod integration, Kueue
# injects tolerations from the ResourceFlavor when unsuspending. If the
# pod already has a toleration with the same key+effect but different
# operator (e.g. Equal vs Exists), Kubernetes rejects: "existing
# toleration can not be modified". InferenceService manifests (step-05)
# define tolerations directly. nodeLabels are kept for flavor matching
# (Kueue merges them into nodeSelector via MutablePodSchedulingDirectives).
---
# NVIDIA L4 1GPU Flavor (g6.4xlarge)
# 16 vCPU, 64GB RAM, 1x NVIDIA L4 (24GB VRAM)
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: nvidia-l4-1gpu
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  nodeLabels:
    node.kubernetes.io/instance-type: g6.4xlarge
    node-role.kubernetes.io/gpu: ""
  nodeTaints:
    - key: nvidia.com/gpu
      value: "true"
      effect: NoSchedule
---
# NVIDIA L4 4GPU Flavor (g6.12xlarge)
# 48 vCPU, 192GB RAM, 4x NVIDIA L4 (96GB total VRAM)
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: nvidia-l4-4gpu
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  nodeLabels:
    node.kubernetes.io/instance-type: g6.12xlarge
    node-role.kubernetes.io/gpu: ""
  nodeTaints:
    - key: nvidia.com/gpu
      value: "true"
      effect: NoSchedule

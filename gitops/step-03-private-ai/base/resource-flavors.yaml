# IMPORTANT (RHOAI 3.3 / Kueue 1.2): Workloads managed by Kueue must NOT
# define their own GPU tolerations. Kueue injects tolerations from the
# ResourceFlavor when unsuspending pods. If the pod already has tolerations,
# Kubernetes rejects the modification: "existing toleration can not be modified"
# NOTE: This only applies when the namespace has kueue.openshift.io/managed.
# Currently private-ai does NOT have that label, so these tolerations are
# informational (used for Deployment integration when/if namespace is managed).
---
# NVIDIA L4 1GPU Flavor (g6.4xlarge)
# 16 vCPU, 64GB RAM, 1x NVIDIA L4 (24GB VRAM)
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: nvidia-l4-1gpu
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  nodeLabels:
    node.kubernetes.io/instance-type: g6.4xlarge
    node-role.kubernetes.io/gpu: ""
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  nodeTaints:
    - key: nvidia.com/gpu
      value: "true"
      effect: NoSchedule
---
# NVIDIA L4 4GPU Flavor (g6.12xlarge)
# 48 vCPU, 192GB RAM, 4x NVIDIA L4 (96GB total VRAM)
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: nvidia-l4-4gpu
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  nodeLabels:
    node.kubernetes.io/instance-type: g6.12xlarge
    node-role.kubernetes.io/gpu: ""
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  nodeTaints:
    - key: nvidia.com/gpu
      value: "true"
      effect: NoSchedule

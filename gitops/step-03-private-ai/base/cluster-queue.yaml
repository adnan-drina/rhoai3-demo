# ClusterQueue - Cluster-wide GPU quota pool
# Defines total GPU/CPU/Memory available for RHOAI workloads
#
# Quota Strategy (GPU-as-a-Service Demo):
#   - 1x g6.4xlarge (1 GPU) = 1 GPU for granite-8b-agent (RAG, MCP, Guardrails)
#   - 1x g6.12xlarge (4 GPUs) = 4 GPUs for mistral-3-bf16 (full precision)
#   - Total: 5 GPUs available for the private-ai project
#   - Fits within 64 GPU vCPU sandbox limit (16 + 48 = 64)
#
# IMPORTANT: default-flavor MUST be first so CPU-only pods (LlamaStack, Grafana)
# get scheduled on worker nodes, not GPU nodes.
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: rhoai-main-queue
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  namespaceSelector: {}
  
  preemption:
    reclaimWithinCohort: Any
    withinClusterQueue: LowerPriority
  
  flavorFungibility:
    whenCanBorrow: Borrow
    whenCanPreempt: TryNextFlavor
  
  resourceGroups:
    - coveredResources: ["nvidia.com/gpu", "cpu", "memory"]
      flavors:
        # CPU-only flavor (worker nodes) — MUST be first for LlamaStack, Grafana, etc.
        - name: default-flavor
          resources:
            - name: "nvidia.com/gpu"
              nominalQuota: 0
            - name: "cpu"
              nominalQuota: "57"
            - name: "memory"
              nominalQuota: "234Gi"
        # 1-GPU flavor (1x g6.4xlarge node)
        - name: nvidia-l4-1gpu
          resources:
            - name: "nvidia.com/gpu"
              nominalQuota: 1       # 1 GPU from 1x g6.4xlarge
            - name: "cpu"
              nominalQuota: "16"    # 16 vCPU
            - name: "memory"
              nominalQuota: "64Gi"  # 64GB RAM
        # 4-GPU flavor (1x g6.12xlarge node)
        - name: nvidia-l4-4gpu
          resources:
            - name: "nvidia.com/gpu"
              nominalQuota: 4       # 4 GPUs from g6.12xlarge
            - name: "cpu"
              nominalQuota: "48"    # 48 vCPU
            - name: "memory"
              nominalQuota: "192Gi" # 192GB RAM

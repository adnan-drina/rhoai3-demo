# ClusterQueue - Cluster-wide GPU quota pool
# Defines total GPU/CPU/Memory available for RHOAI workloads
#
# Quota Strategy (GPU-as-a-Service Demo):
#   - 3x g6.4xlarge (1 GPU each) = 3 GPUs for single-GPU inference (vLLM INT4 + llm-d)
#   - 1x g6.12xlarge (4 GPUs) = 4 GPUs for tensor-parallel models (vLLM BF16)
#   - Total: 7 GPUs available for the private-ai project
#
# IMPORTANT: Both flavors must be in the SAME resourceGroup so Kueue can
# try both flavors when matching workloads. A 4-GPU request should only
# match nvidia-l4-4gpu, not fail against nvidia-l4-1gpu first.
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: rhoai-main-queue
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  # Allow any namespace with a LocalQueue to use this pool
  namespaceSelector: {}
  
  # Preemption policy - what happens when quota is exceeded
  preemption:
    reclaimWithinCohort: Any
    withinClusterQueue: LowerPriority
  
  # Flavor fungibility - try next flavor if first doesn't fit
  flavorFungibility:
    whenCanBorrow: Borrow
    whenCanPreempt: TryNextFlavor
  
  # Resource groups for heterogeneous workloads:
  # - default-flavor FIRST for CPU-only pods (LlamaStack, Grafana, etc.)
  # - GPU flavors for model inference pods
  # Kueue tries flavors in order; a pod requesting 0 GPUs gets default-flavor
  resourceGroups:
    - coveredResources: ["nvidia.com/gpu", "cpu", "memory"]
      flavors:
        # CPU-only flavor (worker nodes) - for non-GPU workloads like LlamaStack
        - name: default-flavor
          resources:
            - name: "nvidia.com/gpu"
              nominalQuota: 0
            - name: "cpu"
              nominalQuota: "57"
            - name: "memory"
              nominalQuota: "234Gi"
        # 1-GPU flavor (g6.4xlarge nodes)
        - name: nvidia-l4-1gpu
          resources:
            - name: "nvidia.com/gpu"
              nominalQuota: 3
            - name: "cpu"
              nominalQuota: "48"
            - name: "memory"
              nominalQuota: "192Gi"
        # 4-GPU flavor (g6.12xlarge nodes)
        - name: nvidia-l4-4gpu
          resources:
            - name: "nvidia.com/gpu"
              nominalQuota: 4
            - name: "cpu"
              nominalQuota: "48"
            - name: "memory"
              nominalQuota: "192Gi"


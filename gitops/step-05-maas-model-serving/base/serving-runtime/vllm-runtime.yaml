# Uses the image from the RHOAI 3.4 platform-provided LLMInferenceServiceConfig.
# Image: vLLM v0.18.0 (RHOAI 3.4)
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.4/html/deploying_models/
# To verify alignment with the platform default:
#   oc get llminferenceserviceconfig v3-4-0-kserve-config-llm-template \
#     -n redhat-ods-applications -o jsonpath='{.spec.template.containers[0].image}'
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
  namespace: maas
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/runtime-version: v0.18.0
    opendatahub.io/serving-runtime-scope: namespace
    opendatahub.io/template-display-name: "vLLM NVIDIA GPU ServingRuntime for KServe"
    opendatahub.io/template-name: vllm-cuda-runtime
    openshift.io/display-name: "vLLM NVIDIA GPU ServingRuntime for KServe"
spec:
  annotations:
    opendatahub.io/kserve-runtime: vllm
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  multiModel: false
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  containers:
    - name: kserve-container
      # RHOAI 3.4 default vLLM image (v0.18.0)
      image: registry.redhat.io/rhaii/vllm-cuda-rhel9@sha256:ad06abf3bb5235ebb5b2df84cd1b9fd09e823f0ff2eebfc82bb4590275ccfe0b
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      ports:
        - containerPort: 8080
          protocol: TCP
      volumeMounts:
        - mountPath: /dev/shm
          name: shm
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 8Gi

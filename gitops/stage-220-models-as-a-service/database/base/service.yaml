apiVersion: v1
kind: Service
metadata:
  name: maas-postgres
  namespace: models-as-a-service-db
  labels:
    app.kubernetes.io/name: maas-postgres
    app.kubernetes.io/component: database
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  ports:
    - name: postgresql
      port: 5432
      protocol: TCP
      targetPort: postgresql
  selector:
    app.kubernetes.io/name: maas-postgres

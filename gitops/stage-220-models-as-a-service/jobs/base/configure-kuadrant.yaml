apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-configure-kuadrant
  namespace: kuadrant-system
  labels:
    app.kubernetes.io/name: configure-kuadrant
    app.kubernetes.io/component: api-gateway-governance
  annotations:
    argocd.argoproj.io/sync-wave: "13"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: job-configure-kuadrant
  labels:
    app.kubernetes.io/name: configure-kuadrant
    app.kubernetes.io/component: api-gateway-governance
  annotations:
    argocd.argoproj.io/sync-wave: "13"
rules:
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: job-configure-kuadrant
  labels:
    app.kubernetes.io/name: configure-kuadrant
    app.kubernetes.io/component: api-gateway-governance
  annotations:
    argocd.argoproj.io/sync-wave: "13"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: job-configure-kuadrant
subjects:
  - kind: ServiceAccount
    name: job-configure-kuadrant
    namespace: kuadrant-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-configure-kuadrant
  namespace: kuadrant-system
  labels:
    app.kubernetes.io/name: configure-kuadrant
    app.kubernetes.io/component: api-gateway-governance
  annotations:
    argocd.argoproj.io/sync-wave: "14"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 900
  template:
    spec:
      serviceAccountName: job-configure-kuadrant
      restartPolicy: Never
      containers:
        - name: configure
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              for i in $(seq 1 60); do
                if oc get deployment authorino -n kuadrant-system >/dev/null 2>&1; then
                  break
                fi
                echo "Waiting for Authorino deployment... ($i/60)"
                sleep 10
              done

              oc -n kuadrant-system set env deployment/authorino \
                SSL_CERT_FILE=/etc/ssl/certs/openshift-service-ca/service-ca-bundle.crt \
                REQUESTS_CA_BUNDLE=/etc/ssl/certs/openshift-service-ca/service-ca-bundle.crt

              echo "Authorino service CA trust configuration is present."

apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSSubscription
metadata:
  name: enterprise-rag-autorag
  namespace: models-as-a-service
  labels:
    app.kubernetes.io/name: enterprise-rag-autorag
    app.kubernetes.io/component: maas-subscription
    demo.rhoai.io/provider: governed-models
  annotations:
    argocd.argoproj.io/sync-wave: "18"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  # Dedicated subscription for Stage 230 AutoRAG optimization runs. An
  # optimization run evaluates many RAG patterns in a burst (per pattern:
  # benchmark questions x retrieved context), which exhausts the interactive
  # rhoai-developers-gpt-4o-mini token budgets and surfaces as silent 429
  # pattern failures on the AutoRAG leaderboard. Governance stays enforced;
  # the quota is sized for the optimization workload.
  owner:
    groups:
      - name: rhoai-developers
      - name: rhods-admins
    users:
      - kube:admin
  modelRefs:
    - name: nemotron-3-nano-30b-a3b
      namespace: models-as-a-service
      tokenRateLimits:
        - limit: 2000000
          window: 1h
    - name: gpt-4o-mini
      namespace: models-as-a-service
      tokenRateLimits:
        - limit: 1000000
          window: 1h
  priority: 100
  tokenMetadata:
    organizationId: rhoai3-demo
    costCenter: ai-platform
    labels:
      environment: demo
      provider: governed-models
      modelSet: autorag-optimization

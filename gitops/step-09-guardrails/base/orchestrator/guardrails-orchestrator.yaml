# The TrustyAI operator creates a Deployment, Service, and Route from this CR.
# Verification:
#   oc get guardrailsorchestrator -n private-ai
#   oc get pods -l app=guardrails-orchestrator -n private-ai
apiVersion: trustyai.opendatahub.io/v1alpha1
kind: GuardrailsOrchestrator
metadata:
  name: guardrails-orchestrator
  namespace: private-ai
  labels:
    app.kubernetes.io/part-of: guardrails
    app.kubernetes.io/component: orchestrator
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  orchestratorConfig: guardrails-orchestrator-config
  guardrailsGatewayConfig: guardrails-gateway-config
  enableBuiltInDetectors: true
  enableGuardrailsGateway: true
  replicas: 1

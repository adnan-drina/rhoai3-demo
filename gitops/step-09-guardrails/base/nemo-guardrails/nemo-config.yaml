apiVersion: v1
kind: ConfigMap
metadata:
  name: nemo-guardrails-config
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/part-of: guardrails
    app.kubernetes.io/component: safety
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  config.yaml: |
    models:
      - type: main
        engine: openai
        parameters:
          openai_api_base: "http://granite-8b-agent-predictor.maas.svc.cluster.local:8080/v1"
          model_name: "granite-8b-agent"
    rails:
      config:
        sensitive_data_detection:
          input:
            entities:
              - EMAIL_ADDRESS
              - PHONE_NUMBER
              - CREDIT_CARD
          output:
            entities:
              - EMAIL_ADDRESS
              - PHONE_NUMBER
              - PERSON
      input:
        flows:
          - detect sensitive data on input
          - check acme message length
          - check acme forbidden content
      output:
        flows:
          - detect sensitive data on output
  rails.co: |
    define flow check acme message length
      $length_result = execute check_acme_message_length
      if $length_result == "blocked_too_long"
        bot inform message too long
        stop

    define bot inform message too long
      "Please keep your message under 100 words for better assistance."

    define flow check acme forbidden content
      $forbidden_result = execute check_acme_forbidden_content
      if $forbidden_result != "allowed"
        bot inform forbidden content
        stop

    define bot inform forbidden content
      "I can't help with that type of request. Please ask something else."
  actions.py: |
    import re
    from typing import Optional

    from nemoguardrails.actions import action

    @action(is_system_action=True)
    async def check_acme_message_length(context: Optional[dict] = None) -> str:
        user_message = (context or {}).get("user_message", "")
        return "blocked_too_long" if len(user_message.split()) > 100 else "allowed"

    @action(is_system_action=True)
    async def check_acme_forbidden_content(context: Optional[dict] = None) -> str:
        user_message = (context or {}).get("user_message", "").lower()
        patterns = [
            r"\bignore\s+all\s+previous\s+instructions\b",
            r"\breveal\s+(your\s+)?system\s+prompt\b",
            r"\bjailbreak\b",
            r"\bhate\s+you\b",
            r"\bstupid\s+bot\b",
            r"\bpassword\b",
            r"\bexploit\b",
        ]
        for pattern in patterns:
            if re.search(pattern, user_message):
                return "blocked_policy"
        return "allowed"

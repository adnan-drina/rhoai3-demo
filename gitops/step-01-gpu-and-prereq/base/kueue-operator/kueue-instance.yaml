# Creates the core Kueue CRDs (ClusterQueue, LocalQueue, ResourceFlavor)
# Ref: Red Hat Build of Kueue 1.2 documentation
apiVersion: kueue.openshift.io/v1
kind: Kueue
metadata:
  name: cluster  # Singleton - name must be 'cluster'
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  config:
    integrations:
      frameworks:
        - BatchJob           # Standard Kubernetes Jobs
        # Deployment is intentionally excluded — it SchedulingGates ALL
        # Deployments in kueue-managed namespaces, breaking non-GPU pods
        # (chatbot, Docling, DSPA, MCP servers). Pod integration below
        # handles GPU workloads via kueue.x-k8s.io/queue-name label.
        - RayJob             # Ray distributed jobs
        - RayCluster         # Ray clusters
        - PyTorchJob         # PyTorch Training Operator
        - Pod                # GPU predictor pods + Workbenches (via queue label)
        - LeaderWorkerSet    # llm-d distributed inference

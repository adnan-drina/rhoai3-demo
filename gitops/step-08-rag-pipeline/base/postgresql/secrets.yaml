# Secrets for LlamaStack RAG stack (RHOAI 3.3 production pattern)
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html/working_with_llama_stack/
apiVersion: v1
kind: Secret
metadata:
  name: llamastack-postgres-secret
  namespace: private-ai
  labels:
    app.kubernetes.io/part-of: rag-pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  POSTGRES_PASSWORD: "llamastack-demo-pwd"
---
apiVersion: v1
kind: Secret
metadata:
  name: llamastack-milvus-secret
  namespace: private-ai
  labels:
    app.kubernetes.io/part-of: rag-pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  MILVUS_ENDPOINT: "tcp://milvus-standalone.private-ai.svc.cluster.local:19530"
  MILVUS_TOKEN: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: llamastack-vllm-secret
  namespace: private-ai
  labels:
    app.kubernetes.io/part-of: rag-pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  VLLM_API_TOKEN: "fake"
  VLLM_URL: "http://granite-8b-agent-predictor.private-ai.svc.cluster.local:8080/v1"

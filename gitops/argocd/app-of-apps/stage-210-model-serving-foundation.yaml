apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stage-210-model-serving-foundation
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/stage: "210"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/manifest-generate-paths: gitops/stage-210-model-serving-foundation
spec:
  project: rhoai-demo
  source:
    # repoURL and targetRevision are set by deploy.sh from .env (GIT_REPO_URL, GIT_REPO_BRANCH)
    repoURL: https://github.com/adnan-drina/rhoai3-demo.git
    targetRevision: main
    path: gitops/stage-210-model-serving-foundation
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    # The Kubernetes service-account-token controller populates generated token
    # data after the Secret is created. The token value must never live in Git.
    - group: ""
      kind: Secret
      name: grafana-auth-secret
      namespace: rhoai-demo-grafana
      jsonPointers:
        - /data
        - /metadata/annotations/kubernetes.io~1service-account.uid

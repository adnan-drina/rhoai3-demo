apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: step-11-face-recognition
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/step: "11"
  annotations:
    argocd.argoproj.io/sync-wave: "110"
    argocd.argoproj.io/manifest-generate-paths: gitops/step-11-face-recognition
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rhoai-demo
  source:
    repoURL: https://github.com/adnan-drina/rhoai3-demo.git
    targetRevision: main
    path: gitops/step-11-face-recognition/base
  destination:
    server: https://kubernetes.default.svc
    namespace: private-ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideDiff=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: serving.kserve.io
      kind: InferenceService
      jsonPointers:
        - /status
        - /spec/predictor/model/runtime
    # Notebook: RHOAI controller injects kube-rbac-proxy sidecar, volumes, labels, annotations
    - group: kubeflow.org
      kind: Notebook
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
        - /status
        - /spec/template
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec

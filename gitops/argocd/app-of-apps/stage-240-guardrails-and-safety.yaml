apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stage-240-guardrails-and-safety
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/stage: "240"
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/manifest-generate-paths: gitops/stage-240-guardrails-and-safety
spec:
  project: rhoai-demo
  source:
    # repoURL and targetRevision are set by deploy.sh from .env (GIT_REPO_URL, GIT_REPO_BRANCH)
    repoURL: https://github.com/adnan-drina/rhoai3-demo.git
    targetRevision: main
    path: gitops/stage-240-guardrails-and-safety
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 20
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  ignoreDifferences:
    # The NeMo model API token is minted against the MaaS gateway by
    # stage-240 deploy.sh and never committed to Git.
    - group: ""
      kind: Secret
      name: nemo-guardrails-api-token
      namespace: ai-safety
      jsonPointers:
        - /data
    # The Jaeger UI route hostname is cluster-specific and created by the
    # Tempo Operator; the patch-jaeger-consolelink sync Job injects it after
    # the route exists (stage-210 Grafana ConsoleLink pattern).
    - group: console.openshift.io
      kind: ConsoleLink
      name: rhoai-demo-guardrails-jaeger-link
      jsonPointers:
        - /spec/href

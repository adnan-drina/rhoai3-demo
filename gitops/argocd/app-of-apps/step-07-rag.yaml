apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: step-07-rag
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/step: "07"
  annotations:
    argocd.argoproj.io/sync-wave: "70"
    argocd.argoproj.io/manifest-generate-paths: gitops/step-07-rag
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rhoai-demo
  source:
    repoURL: https://github.com/adnan-drina/rhoai3-demo.git
    targetRevision: main
    path: gitops/step-07-rag/base
  destination:
    server: https://kubernetes.default.svc
    namespace: private-ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideDiff=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # LlamaStack CRD schema omits .spec.template.metadata, causing ArgoCD
  # ComparisonError during structured merge diff. Ignoring entire /spec is
  # required because the error occurs BEFORE ignoreDifferences filtering.
  # The LSD is reconciled by the LlamaStack operator; GitOps source of
  # truth is maintained via the llamastack-rag.yaml manifest in git.
  ignoreDifferences:
    - group: llamastack.io
      kind: LlamaStackDistribution
      jsonPointers:
        - /status
        - /spec
    - group: datasciencepipelinesapplications.opendatahub.io
      kind: DataSciencePipelinesApplication
      jsonPointers:
        - /status
    # Notebook: RHOAI controller injects kube-rbac-proxy sidecar, volumes, labels, annotations
    - group: kubeflow.org
      kind: Notebook
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
        - /status
        - /spec/template
    # PVC spec is immutable after creation; cluster may add storageClassName, volumeName
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec
    # Route: OpenShift router controller adds host, status.ingress, and other fields
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /spec/host
        - /status

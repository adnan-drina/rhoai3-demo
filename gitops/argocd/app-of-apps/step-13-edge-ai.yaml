apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: step-13-edge-ai
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/step: "13"
  annotations:
    argocd.argoproj.io/sync-wave: "130"
    argocd.argoproj.io/manifest-generate-paths: gitops/step-13-edge-ai
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rhoai-demo
  source:
    repoURL: https://github.com/adnan-drina/rhoai3-demo.git
    targetRevision: main
    path: gitops/step-13-edge-ai/base
  destination:
    server: https://kubernetes.default.svc
    namespace: edge-ai-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideDiff=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: serving.kserve.io
      kind: InferenceService
      jsonPointers:
        - /status
        - /spec/predictor/model/runtime
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec

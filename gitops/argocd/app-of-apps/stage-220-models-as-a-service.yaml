apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stage-220-models-as-a-service
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/stage: "220"
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/manifest-generate-paths: gitops/stage-220-models-as-a-service
spec:
  project: rhoai-demo
  source:
    # repoURL and targetRevision are set by deploy.sh from .env (GIT_REPO_URL, GIT_REPO_BRANCH)
    repoURL: https://github.com/adnan-drina/rhoai3-demo.git
    targetRevision: main
    path: gitops/stage-220-models-as-a-service
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 20
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: maas-postgres-credentials
      namespace: models-as-a-service-db
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: maas-db-config
      namespace: redhat-ods-applications
      jsonPointers:
        - /data

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: step-13b-edge-ai-microshift
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/step: "13b"
  annotations:
    argocd.argoproj.io/sync-wave: "131"
    argocd.argoproj.io/manifest-generate-paths: gitops/step-13b-edge-ai-microshift
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rhoai-demo
  source:
    repoURL: https://github.com/adnan-drina/rhoai3-demo.git
    targetRevision: rhoai34-refactoring
    path: gitops/step-13b-edge-ai-microshift/base
  destination:
    server: https://kubernetes.default.svc
    namespace: enterprise-mlops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideDiff=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stage-110-rhoai-base-platform
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/stage: "110"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/manifest-generate-paths: gitops/stage-110-rhoai-base-platform
spec:
  project: rhoai-demo
  source:
    # repoURL and targetRevision are set by deploy.sh from .env (GIT_REPO_URL, GIT_REPO_BRANCH)
    repoURL: https://github.com/adnan-drina/rhoai3-demo.git
    targetRevision: main
    path: gitops/stage-110-rhoai-base-platform
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    # Stage 110 creates the shared DSC. Later stages enable these component
    # fields with GitOps hook jobs so the base platform can validate cleanly
    # before GPU, model serving, and MaaS stages are deployed.
    - group: datasciencecluster.opendatahub.io
      kind: DataScienceCluster
      name: default-dsc
      jsonPointers:
        - /spec/components/kueue
        - /spec/components/kserve
        - /spec/components/llamastackoperator
        - /spec/components/aipipelines
        - /spec/components/trustyai
        - /spec/components/mlflowoperator

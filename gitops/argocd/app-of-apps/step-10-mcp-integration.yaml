apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: step-10-mcp-integration
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/step: "10"
  annotations:
    argocd.argoproj.io/sync-wave: "100"
    argocd.argoproj.io/manifest-generate-paths: gitops/step-10-mcp-integration
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rhoai-demo
  source:
    repoURL: https://github.com/adnan-drina/rhoai3-demo.git
    targetRevision: main
    path: gitops/step-10-mcp-integration/base
  destination:
    server: https://kubernetes.default.svc
    namespace: private-ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideDiff=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/containers/0/env
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec
    # deploy.sh patches ConfigMap data with cluster-specific route URLs
    - group: ""
      kind: ConfigMap
      name: gen-ai-aa-mcp-servers
      jsonPointers:
        - /data

# =============================================================================
# LlamaStackDistribution - GenAI Playground Backend
# =============================================================================
# RHOAI 3.3 production pattern: NO custom config.yaml
# Let the rh-dev distribution template handle all provider wiring.
# All configuration via environment variables only.
#
# ROOT CAUSE of previous RAG failure: our custom config.yaml with
# image_name:custom bypassed the rh-dev template that wires
# file_search → vector_io → embedding in the Responses API.
#
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html/working_with_llama_stack/
# =============================================================================
apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  name: lsd-genai-playground
  namespace: private-ai
  labels:
    opendatahub.io/dashboard: "true"
    app.kubernetes.io/name: llamastack
    app.kubernetes.io/part-of: private-ai-platform
    app.kubernetes.io/component: playground-backend
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    openshift.io/display-name: lsd-genai-playground
spec:
  replicas: 1
  server:
    distribution:
      name: rh-dev
    containerSpec:
      name: llama-stack
      port: 8321
      env:
        # PostgreSQL metadata (RHOAI 3.3 production requirement)
        - name: POSTGRES_HOST
          value: llamastack-postgres.private-ai.svc.cluster.local
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: llamastack
        - name: POSTGRES_USER
          value: llamastack
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres-secret
              key: POSTGRES_PASSWORD
        # Inference model (granite-8b-agent with tool-calling)
        - name: INFERENCE_MODEL
          value: granite-8b-agent
        - name: VLLM_URL
          value: "http://granite-8b-agent-predictor.private-ai.svc.cluster.local:8080/v1"
        - name: VLLM_API_TOKEN
          value: "fake"
        - name: VLLM_TLS_VERIFY
          value: "false"
        - name: VLLM_MAX_TOKENS
          value: "4096"
        # Inline embeddings (sentence-transformers, no GPU needed)
        # Both env vars required per RHOAI 3.3 docs
        - name: ENABLE_SENTENCE_TRANSFORMERS
          value: "true"
        - name: EMBEDDING_PROVIDER
          value: "sentence-transformers"
        # Guardrails (activates when step-10 is deployed)
        - name: FMS_ORCHESTRATOR_URL
          value: http://guardrails-orchestrator.private-ai.svc:8080
      resources:
        requests:
          cpu: 250m
          memory: 500Mi
        limits:
          cpu: "2"
          memory: 12Gi

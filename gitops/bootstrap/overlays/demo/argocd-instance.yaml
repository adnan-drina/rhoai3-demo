apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: openshift-gitops
  namespace: openshift-gitops
spec:
  # Project constraint: all demo Applications must use annotation-based resource tracking.
  # Source: AGENTS.md — resourceTrackingMethod MUST be annotation.
  resourceTrackingMethod: annotation
  rbac:
    policy: |
      g, system:cluster-admins, role:admin
      g, cluster-admins, role:admin
    scopes: '[groups]'
  server:
    route:
      enabled: true
  sso:
    dex:
      openShiftOAuth: true
    provider: dex

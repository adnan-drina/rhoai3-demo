# Built from steps/step-07-rag/chatbot/ via OpenShift BuildConfig
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: rag-chatbot
  namespace: enterprise-rag
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: rag-chatbot
  namespace: enterprise-rag
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  source:
    type: Git
    git:
      uri: https://github.com/adnan-drina/rhoai3-demo.git
      ref: main
    contextDir: steps/step-07-rag/chatbot
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: rag-chatbot:latest
  triggers:
    - type: ConfigChange
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-chatbot
  namespace: enterprise-rag
  labels:
    app: rag-chatbot
    app.kubernetes.io/part-of: rag
    app.kubernetes.io/component: chatbot-ui
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-chatbot
  template:
    metadata:
      labels:
        app: rag-chatbot
        app.kubernetes.io/part-of: llama-stack
    spec:
      containers:
        - name: chatbot
          image: image-registry.openshift-image-registry.svc:5000/enterprise-rag/rag-chatbot:latest
          ports:
            - containerPort: 8501
              name: http
          env:
            - name: LLAMA_STACK_URL
              value: "http://lsd-rag-service.enterprise-rag.svc.cluster.local:8321"
            - name: INFERENCE_MODEL
              value: "vllm-inference/granite-8b-agent"
            - name: NEMO_GUARDRAILS_URL
              value: "https://nemo-guardrails.enterprise-rag.svc.cluster.local"
            - name: NEMO_GUARDRAILS_MODEL
              value: "granite-8b-agent"
            - name: RAG_QUESTION_SUGGESTIONS
              value: >-
                {
                  "whoami": [
                    {
                      "use_case": "Identity grounding",
                      "mode": "Direct",
                      "question": "Who is Adnan Drina and what is his current role?",
                      "expected": "Principal Solution Architect|Red Hat"
                    },
                    {
                      "use_case": "Expertise discovery",
                      "mode": "Direct",
                      "question": "What are Adnan Drina key areas of expertise?",
                      "expected": "OpenShift|Kubernetes|AI|platform|developer|architecture"
                    },
                    {
                      "use_case": "Event discovery",
                      "mode": "Direct",
                      "question": "What events has Adnan Drina spoken at?",
                      "expected": "HOPE Amsterdam 2025|Red Hat Summit: Connect Utrecht"
                    }
                  ],
                  "acme_corporate": [
                    {
                      "use_case": "Corporate profile",
                      "mode": "Direct",
                      "question": "What is ACME Corp?",
                      "expected": "ACME Corp|semiconductor|Amsterdam|lithography"
                    },
                    {
                      "use_case": "Equipment troubleshooting",
                      "mode": "Direct",
                      "question": "Search for known issues related to the L-900 EUV scanner",
                      "expected": "L-900|EUV|Dose Drift|Overlay Residual|Focus Map|calibration"
                    },
                    {
                      "use_case": "OpenShift operations",
                      "mode": "Agent-based",
                      "tool": "openshift-mcp",
                      "select_collection": false,
                      "question": "List all pods in the acme-corp namespace",
                      "expected": "MCP Tool Output|pods_list_in_namespace|acme-equipment|acme-corp|pod"
                    },
                    {
                      "use_case": "Asset database lookup",
                      "mode": "Agent-based",
                      "tool": "database-mcp",
                      "select_collection": false,
                      "question": "Fetch the equipment name for pod acme-equipment-0007",
                      "expected": "MCP Tool Output|execute_sql|L-900|EUV|Calibration"
                    }
                  ]
                }
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: rag-chatbot
  namespace: enterprise-rag
  labels:
    app: rag-chatbot
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  selector:
    app: rag-chatbot
  ports:
    - port: 8501
      targetPort: 8501
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rag-chatbot
  namespace: enterprise-rag
  labels:
    app: rag-chatbot
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  to:
    kind: Service
    name: rag-chatbot
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

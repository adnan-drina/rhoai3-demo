# Provides Kubeflow Pipelines v2 infrastructure backed by MinIO (step-03).
# Verification:
#   oc get dspa dspa-rag -n private-ai
#   oc get pods -n private-ai -l app=ds-pipeline-dspa-rag
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html/working_with_llama_stack/deploying-a-rag-stack-in-a-project_rag
apiVersion: datasciencepipelinesapplications.opendatahub.io/v1
kind: DataSciencePipelinesApplication
metadata:
  name: dspa-rag
  namespace: private-ai
  labels:
    app.kubernetes.io/name: dspa-rag
    app.kubernetes.io/part-of: rag
    app.kubernetes.io/component: pipeline-server
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    openshift.io/display-name: "RAG Ingestion Pipelines"
spec:
  objectStorage:
    # Use the external MinIO API route so Dashboard artifact preview
    # generates browser-accessible signed URLs. secure: false skips
    # TLS verification for the self-signed OpenShift router cert.
    externalStorage:
      bucket: pipelines
      host: minio-api-minio-storage.apps.cluster-v2zvn.v2zvn.sandbox2890.opentlc.com
      port: ""
      scheme: https
      secure: false
      s3CredentialsSecret:
        secretName: dspa-minio-credentials
        accessKey: accesskey
        secretKey: secretkey

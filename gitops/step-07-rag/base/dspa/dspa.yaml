# Provides Kubeflow Pipelines v2 infrastructure backed by MinIO (step-03).
# Verification:
#   oc get dspa dspa-rag -n enterprise-rag
#   oc get pods -n enterprise-rag -l app=ds-pipeline-dspa-rag
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.4/html/working_with_llama_stack/deploying-a-rag-stack-in-a-project_rag
apiVersion: datasciencepipelinesapplications.opendatahub.io/v1
kind: DataSciencePipelinesApplication
metadata:
  name: dspa-rag
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/name: dspa-rag
    app.kubernetes.io/part-of: rag
    app.kubernetes.io/component: pipeline-server
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    openshift.io/display-name: "RAG Ingestion Pipelines"
spec:
  objectStorage:
    # Use the stable in-cluster MinIO service name. Generated route hosts are
    # cluster-specific and must not be committed into GitOps.
    externalStorage:
      bucket: pipelines
      host: minio.minio-storage.svc.cluster.local
      port: "9000"
      scheme: http
      secure: false
      s3CredentialsSecret:
        secretName: dspa-minio-credentials
        accessKey: accesskey
        secretKey: secretkey

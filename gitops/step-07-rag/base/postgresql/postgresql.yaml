# Serves dual purpose:
#   1. LlamaStack metadata store (agent state, file references, config)
#   2. pgvector vector store (RAG embeddings, similarity search)
# Image: pgvector/pgvector:pg16 — official PostgreSQL 16 with pgvector extension
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html/working_with_llama_stack/llama-stack-adv-examples_rag#deploying-a-postgresql-instance-with-pgvector_rag
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llamastack-postgres-pvc
  namespace: private-ai
  labels:
    app: llamastack-postgres
    app.kubernetes.io/part-of: rag-pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3-csi
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamastack-postgres
  namespace: private-ai
  labels:
    app: llamastack-postgres
    app.kubernetes.io/part-of: rag-pipeline
    app.openshift.io/runtime: postgresql
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llamastack-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: llamastack-postgres
        kueue.x-k8s.io/queue-name: default
    spec:
      securityContext:
        runAsNonRoot: false
      containers:
        - name: postgresql
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: llamastack
            - name: POSTGRES_USER
              value: llamastack
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: llamastack-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    until pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" 2>/dev/null; do sleep 2; done
                    PGPASSWORD="$POSTGRES_PASSWORD" psql -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "CREATE EXTENSION IF NOT EXISTS vector;" 2>/dev/null || true
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: llamastack-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: llamastack-postgres
  namespace: private-ai
  labels:
    app: llamastack-postgres
    app.kubernetes.io/part-of: rag-pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: llamastack-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP

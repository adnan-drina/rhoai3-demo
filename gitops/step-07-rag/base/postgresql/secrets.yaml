# Secrets for LlamaStack RAG stack (RHOAI 3.3 production pattern)
# All credentials managed via Secrets — no hardcoded values in LSD spec.
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html/working_with_llama_stack/llama-stack-adv-examples_rag
apiVersion: v1
kind: Secret
metadata:
  name: llamastack-postgres-secret
  namespace: private-ai
  labels:
    app.kubernetes.io/part-of: rag
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  POSTGRES_HOST: llamastack-postgres.private-ai.svc.cluster.local
  POSTGRES_PORT: "5432"
  POSTGRES_DB: llamastack
  POSTGRES_USER: llamastack
  POSTGRES_PASSWORD: "llamastack-demo-pwd"
---
# pgvector connection — same PostgreSQL instance, same credentials
# RHOAI 3.3 Example D: separate PGVECTOR_* env vars for the vector store provider
apiVersion: v1
kind: Secret
metadata:
  name: llamastack-pgvector-secret
  namespace: private-ai
  labels:
    app.kubernetes.io/part-of: rag
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  PGVECTOR_HOST: llamastack-postgres.private-ai.svc.cluster.local
  PGVECTOR_PORT: "5432"
  PGVECTOR_DB: llamastack
  PGVECTOR_USER: llamastack
  PGVECTOR_PASSWORD: "llamastack-demo-pwd"
---
# Consolidated LLM + embedding credentials (matches RHOAI 3.3 llama-stack-secret pattern)
apiVersion: v1
kind: Secret
metadata:
  name: llamastack-vllm-secret
  namespace: private-ai
  labels:
    app.kubernetes.io/part-of: rag
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  INFERENCE_MODEL: "qwen3-8b-agent"
  VLLM_URL: "http://qwen3-8b-agent-predictor.private-ai.svc.cluster.local:8080/v1"
  VLLM_API_TOKEN: "fake"
  VLLM_TLS_VERIFY: "false"
  VLLM_MAX_TOKENS: "4096"

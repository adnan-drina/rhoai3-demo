apiVersion: v1
kind: ServiceAccount
metadata:
  name: rag-wb
  namespace: private-ai
  labels:
    app: rag-wb
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rag-wb-storage
  namespace: private-ai
  labels:
    app: rag-wb
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    openshift.io/display-name: rag-wb-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: gp3-csi
---
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: rag-wb
  namespace: private-ai
  labels:
    app: rag-wb
    opendatahub.io/dashboard: "true"
    opendatahub.io/odh-managed: "true"
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "10"
    notebooks.opendatahub.io/inject-auth: "true"
    opendatahub.io/hardware-profile-name: cpu-small
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/image-display-name: "Jupyter | Data Science | CPU | Python 3.12"
    opendatahub.io/username: ai-admin
    notebooks.opendatahub.io/last-image-selection: s2i-generic-data-science-notebook:2025.2
    notebooks.opendatahub.io/last-size-selection: Small
    openshift.io/display-name: "RAG Development"
    openshift.io/description: "Query LlamaStack RAG backend, debug vector search, run ingestion pipelines"
    notebooks.opendatahub.io/idle-culling-time: "15m"
    notebooks.opendatahub.io/idle-culling-enabled: "true"
spec:
  template:
    metadata:
      labels:
        # Required by lsd-rag-network-policy (LlamaStack operator creates it)
        app.kubernetes.io/part-of: llama-stack
    spec:
      enableServiceLinks: false
      serviceAccountName: rag-wb
      affinity: {}
      initContainers:
        - name: git-sync
          image: alpine/git:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              REPO_URL="https://github.com/adnan-drina/rhoai3-demo.git"
              WORKSPACE="/opt/app-root/src"
              NOTEBOOKS_SRC="steps/step-07-rag/notebooks"

              echo "╔══════════════════════════════════════════════════════════════╗"
              echo "║  Git-Sync: Loading RAG Demo Notebook                         ║"
              echo "╚══════════════════════════════════════════════════════════════╝"

              if [ ! -f "$WORKSPACE/rag-demo.ipynb" ]; then
                echo "→ Cloning repository..."
                git clone --depth 1 --single-branch "$REPO_URL" /tmp/repo

                echo "→ Copying notebooks to workspace..."
                cp /tmp/repo/$NOTEBOOKS_SRC/*.ipynb "$WORKSPACE/" 2>/dev/null || true

                rm -rf /tmp/repo
                echo "✓ Notebooks synced successfully!"
              else
                echo "✓ Notebooks already exist - skipping sync"
              fi

              ls -la "$WORKSPACE/"
          volumeMounts:
            - name: rag-wb-storage
              mountPath: /opt/app-root/src
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: rag-wb
          image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-generic-data-science-notebook:2025.2
          imagePullPolicy: Always
          workingDir: /opt/app-root/src
          env:
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=8888
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/private-ai/rag-wb
                --ServerApp.quit_button=False
            - name: JUPYTER_IMAGE
              value: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-generic-data-science-notebook:2025.2
            # TLS/CA certs
            - name: PIP_CERT
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: REQUESTS_CA_BUNDLE
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: SSL_CERT_FILE
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: PIPELINES_SSL_SA_CERTS
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: GIT_SSL_CAINFO
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            # LlamaStack RAG configuration
            - name: LLAMA_STACK_URL
              value: "http://lsd-rag-service.private-ai.svc.cluster.local:8321"
            - name: INFERENCE_MODEL
              value: "granite-8b-agent"
            # pgvector access (for debugging)
            - name: PGVECTOR_HOST
              value: "llamastack-postgres.private-ai.svc.cluster.local"
            - name: PGVECTOR_PORT
              value: "5432"
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /notebook/private-ai/rag-wb/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /notebook/private-ai/rag-wb/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: rag-wb-storage
              mountPath: /opt/app-root/src
            - name: shm
              mountPath: /dev/shm
            - name: trusted-ca
              mountPath: /etc/pki/tls/custom-certs/ca-bundle.crt
              subPath: ca-bundle.crt
              readOnly: true
      volumes:
        - name: rag-wb-storage
          persistentVolumeClaim:
            claimName: rag-wb-storage
        - name: shm
          emptyDir:
            medium: Memory
        - name: trusted-ca
          configMap:
            name: workbench-trusted-ca-bundle
            optional: true
            items:
              - key: ca-bundle.crt
                path: ca-bundle.crt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rag-wb-controller
  namespace: private-ai
  labels:
    app: rag-wb
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["serving.kserve.io"]
    resources: ["inferenceservices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["llamastack.io"]
    resources: ["llamastackdistributions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["kubeflow.org"]
    resources: ["pipelineruns"]
    verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rag-wb-controller
  namespace: private-ai
  labels:
    app: rag-wb
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rag-wb-controller
subjects:
  - kind: ServiceAccount
    name: rag-wb
    namespace: private-ai

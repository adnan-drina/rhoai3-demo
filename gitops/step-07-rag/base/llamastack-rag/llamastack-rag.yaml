# Aligned with RHOAI 3.3 "Example D: Remote PostgreSQL with pgvector":
#   - Pure rh-dev template — NO userConfig (enables auto-wired persistence,
#     Ragas evaluation, safety providers, and state management)
#   - pgvector for vector store (same PostgreSQL instance as metadata)
#   - Sentence-transformers for inline embeddings (no GPU needed)
#   - All credentials via Secrets
# MCP tool_groups are registered at runtime via the LlamaStack API
# (see step-10 deploy.sh) — they persist in PostgreSQL across restarts.
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html/working_with_llama_stack/llama-stack-adv-examples_rag
apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  name: lsd-rag
  namespace: private-ai
  labels:
    app.kubernetes.io/name: llamastack-rag
    app.kubernetes.io/part-of: rag-pipeline
    app.kubernetes.io/component: rag-backend
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    openshift.io/display-name: lsd-rag
spec:
  replicas: 1
  server:
    distribution:
      name: rh-dev
    containerSpec:
      name: llama-stack
      port: 8321
      env:
        - name: ENABLE_SENTENCE_TRANSFORMERS
          value: "true"
        - name: EMBEDDING_PROVIDER
          value: "sentence-transformers"
        - name: ENABLE_RAGAS
          value: "true"
        - name: INFERENCE_MODEL
          valueFrom:
            secretKeyRef:
              name: llamastack-vllm-secret
              key: INFERENCE_MODEL
        - name: VLLM_URL
          valueFrom:
            secretKeyRef:
              name: llamastack-vllm-secret
              key: VLLM_URL
        - name: VLLM_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: llamastack-vllm-secret
              key: VLLM_API_TOKEN
        - name: VLLM_TLS_VERIFY
          valueFrom:
            secretKeyRef:
              name: llamastack-vllm-secret
              key: VLLM_TLS_VERIFY
        - name: VLLM_MAX_TOKENS
          valueFrom:
            secretKeyRef:
              name: llamastack-vllm-secret
              key: VLLM_MAX_TOKENS
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres-secret
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres-secret
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres-secret
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: llamastack-postgres-secret
              key: POSTGRES_PASSWORD
        - name: ENABLE_PGVECTOR
          value: "true"
        - name: PGVECTOR_HOST
          valueFrom:
            secretKeyRef:
              name: llamastack-pgvector-secret
              key: PGVECTOR_HOST
        - name: PGVECTOR_PORT
          valueFrom:
            secretKeyRef:
              name: llamastack-pgvector-secret
              key: PGVECTOR_PORT
        - name: PGVECTOR_DB
          valueFrom:
            secretKeyRef:
              name: llamastack-pgvector-secret
              key: PGVECTOR_DB
        - name: PGVECTOR_USER
          valueFrom:
            secretKeyRef:
              name: llamastack-pgvector-secret
              key: PGVECTOR_USER
        - name: PGVECTOR_PASSWORD
          valueFrom:
            secretKeyRef:
              name: llamastack-pgvector-secret
              key: PGVECTOR_PASSWORD
        - name: FMS_ORCHESTRATOR_URL
          value: "http://guardrails-orchestrator-service.private-ai.svc:8034"

      resources:
        requests:
          cpu: 250m
          memory: 500Mi
        limits:
          cpu: "4"
          memory: 12Gi
    storage:
      size: 5Gi
    # NO userConfig — rh-dev template handles everything

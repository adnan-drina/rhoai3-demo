# Allow all pods in private-ai namespace to reach lsd-rag on port 8321.
# The LlamaStack operator creates a restrictive NetworkPolicy (lsd-rag-network-policy)
# that only allows pods with app.kubernetes.io/part-of=llama-stack label.
# This additional policy opens access for pipeline executor pods, workbenches,
# and the chatbot frontend.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lsd-rag-allow-namespace
  namespace: private-ai
  labels:
    app.kubernetes.io/part-of: rag
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  podSelector:
    matchLabels:
      app: llama-stack
      app.kubernetes.io/instance: lsd-rag
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 8321
          protocol: TCP

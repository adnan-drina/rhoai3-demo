apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Step 08: RAG Pipeline
# Deploys the full document-ingestion-and-retrieval stack:
#   1. Milvus vector database (persistent, embedded etcd)
#   2. Docling document processing service
#   3. MinIO bucket for RAG documents
#   4. DSPA (Kubeflow Pipelines v2) for pipeline orchestration
#   5. LlamaStackDistribution configured for RAG with remote Milvus

resources:
  # Infrastructure (sync-wave 1-2)
  - postgresql/          # PostgreSQL for LlamaStack metadata (RHOAI 3.3 production)
  - milvus/              # Milvus vector database
  - docling/             # PDF→Markdown document processor
  - minio-rag-bucket/    # MinIO bucket for RAG documents
  # Platform (sync-wave 3-4)
  - dspa/                # Kubeflow Pipelines v2
  - llamastack-rag/      # LlamaStack RAG backend (PostgreSQL + Milvus + granite-8b)

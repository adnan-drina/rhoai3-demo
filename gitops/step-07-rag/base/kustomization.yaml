apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Step 07: RAG Pipeline
# Deploys the full document-ingestion-and-retrieval stack:
#   1. PostgreSQL with pgvector (metadata + vector store in one instance)
#   2. Docling document processing service
#   3. MinIO bucket for RAG documents
#   4. DSPA (Kubeflow Pipelines v2) for pipeline orchestration
#   5. LlamaStackDistribution configured for RAG with pgvector (no userConfig)

resources:
  # Infrastructure (sync-wave 1-2)
  - postgresql/          # PostgreSQL with pgvector (metadata + vector store)
  - docling/             # PDF→Markdown document processor
  - minio-rag-bucket/    # MinIO bucket for RAG documents
  # Platform (sync-wave 3-4)
  - dspa/                # Kubeflow Pipelines v2
  - llamastack-rag/      # LlamaStack RAG backend (pgvector + qwen3-8b, no userConfig)
  # Ingestion (sync-wave 5)
  - ingestion-service/   # Docling-based ingestion (BuildConfig + ConfigMap)
  # Workbench & UI (sync-wave 5-10)
  - rag-wb/              # RAG development workbench (Jupyter)
  - chatbot/             # RAG Chatbot UI (Streamlit)

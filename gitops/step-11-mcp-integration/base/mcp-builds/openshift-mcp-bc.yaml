apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: openshift-mcp
  namespace: private-ai
  labels:
    app.kubernetes.io/part-of: mcp-integration
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: openshift-mcp
  namespace: private-ai
  labels:
    app.kubernetes.io/part-of: mcp-integration
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  source:
    type: Git
    git:
      uri: https://github.com/adnan-drina/rhoai3-demo.git
      ref: main
    contextDir: steps/step-11-mcp-integration/mcp-servers/openshift-mcp
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: openshift-mcp:latest
  triggers:
    - type: ConfigChange

# Connects Grafana to Thanos Querier (UWM). SA token from operator-managed grafana-sa.
# Ref: https://grafana.github.io/grafana-operator/docs/datasources/
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-uwm
  namespace: private-ai
  labels:
    app: grafana
    app.kubernetes.io/part-of: observability
    app.kubernetes.io/component: observability
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "11"
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  
  datasource:
    name: Prometheus-UWM
    uid: Prometheus-UWM
    type: prometheus
    access: proxy
    url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
    isDefault: true
    editable: false
    jsonData:
      httpHeaderName1: Authorization
      timeInterval: "5s"
      tlsSkipVerify: true
    secureJsonData:
      httpHeaderValue1: "Bearer ${token}"
  valuesFrom:
    - targetPath: "secureJsonData.httpHeaderValue1"
      valueFrom:
        secretKeyRef:
          name: grafana-sa-token
          key: token
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-sa-token
  namespace: private-ai
  labels:
    app: grafana
    app.kubernetes.io/part-of: observability
  annotations:
    kubernetes.io/service-account.name: grafana-sa
    argocd.argoproj.io/sync-wave: "10"
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-cluster-monitoring-view
  labels:
    app: grafana
    app.kubernetes.io/part-of: observability
  annotations:
    argocd.argoproj.io/sync-wave: "10"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: grafana-sa
    namespace: private-ai

# Source: https://github.com/llm-d/llm-d-deployer/blob/main/quickstart/grafana/dashboards/llm-d-dashboard.json
# Modified: namespace=private-ai, model_name=granite-8b-agent, DS_PROMETHEUS→Prometheus-UWM
# To update from upstream:
#   curl -sL https://raw.githubusercontent.com/llm-d/llm-d-deployer/main/quickstart/grafana/dashboards/llm-d-dashboard.json \
#     | sed 's/${DS_PROMETHEUS}/Prometheus-UWM/g' > llm-d-dashboard.json
#   # Then fix namespace/model_name defaults in templating.list
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: vllm-latency-throughput-cache
  namespace: private-ai
  labels:
    app: grafana
    dashboards: "grafana"
    app.kubernetes.io/part-of: observability
    app.kubernetes.io/component: observability
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "12"
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  configMapRef:
    name: vllm-latency-throughput-cache-json
    key: dashboard.json

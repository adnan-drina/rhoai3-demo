# Workspace PVC used when GuideLLM benchmark pipelines run through the
# enterprise-rag DSPA from Step 07.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: benchmark-pipeline-workspace
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/part-of: model-metrics
    app.kubernetes.io/component: pipeline-workspace
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi


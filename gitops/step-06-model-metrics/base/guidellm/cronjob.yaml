# Metrics flow through vLLM → ServiceMonitor → Prometheus → Grafana (no PVC).
# Traffic Profiles: 512→256 (Chatbot/Q&A), 1024→1024 (Content generation)
# SLO Targets: Conversational TTFT ≤150ms; Interactive TTFT ≤500ms
# Manual trigger: oc create job --from=cronjob/guidellm-daily bench-$(date +%H%M) -n private-ai
# Ref: https://github.com/vllm-project/guidellm
# Ref: https://github.com/redhat-et/neuralnav (traffic profiles + SLOs)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: guidellm-daily
  namespace: private-ai
  labels:
    app: guidellm
    app.kubernetes.io/part-of: benchmarking
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: guidellm
            job-type: dispatcher
        spec:
          serviceAccountName: guidellm-dispatcher
          restartPolicy: Never
          containers:
            - name: dispatcher
              image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
              env:
                - name: NAMESPACE
                  value: private-ai
                - name: GUIDELLM_IMAGE
                  value: ghcr.io/vllm-project/guidellm:stable
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  echo "GuideLLM Daily Benchmark — ${TIMESTAMP}"

                  # Benchmark active models only (minReplicas > 0)
                  for MODEL in granite-8b-agent mistral-3-bf16; do
                    TARGET="http://${MODEL}-predictor.private-ai.svc.cluster.local:8080/v1"
                    JOB_NAME="guidellm-${MODEL}-${TIMESTAMP}"

                    if ! curl -s --connect-timeout 10 "${TARGET}/models" >/dev/null 2>&1; then
                      echo "  SKIP ${MODEL} — not reachable"
                      continue
                    fi

                    cat <<JOBEOF | oc apply -f -
                  apiVersion: batch/v1
                  kind: Job
                  metadata:
                    name: ${JOB_NAME}
                    namespace: ${NAMESPACE}
                    labels:
                      app: guidellm
                      model: ${MODEL}
                      benchmark-run: "${TIMESTAMP}"
                  spec:
                    backoffLimit: 0
                    activeDeadlineSeconds: 900
                    ttlSecondsAfterFinished: 86400
                    template:
                      metadata:
                        labels:
                          app: guidellm
                          model: ${MODEL}

                      spec:
                        restartPolicy: Never
                        containers:
                          - name: benchmark
                            image: ${GUIDELLM_IMAGE}
                            env:
                              - name: HOME
                                value: /tmp
                              - name: HF_HOME
                                value: /tmp/.cache/huggingface
                            command:
                              - /bin/bash
                              - -c
                              - |
                                cat > /tmp/prompts.json << 'PROMPTEOF'
                                [
                                  {"prompt": "Explain the difference between containers and virtual machines in detail."},
                                  {"prompt": "What are the key benefits of using Kubernetes for microservices architecture?"},
                                  {"prompt": "Describe the CAP theorem and its implications for distributed databases."},
                                  {"prompt": "How does the KV cache work in transformer-based language models during inference?"},
                                  {"prompt": "Explain the Red Hat OpenShift AI platform architecture and its key components."}
                                ]
                                PROMPTEOF
                                guidellm benchmark run \
                                  --target "${TARGET}" \
                                  --model "${MODEL}" \
                                  --data /tmp/prompts.json \
                                  --rate "1,3,5,8,10" \
                                  --rate-type constant \
                                  --max-seconds 60 \
                                  --max-requests 50 \
                                  --output-path /tmp/results.json \
                                  --disable-console-interactive || true
                                echo "Benchmark complete for ${MODEL}"
                            resources:
                              requests:
                                cpu: 500m
                                memory: 1Gi
                              limits:
                                cpu: "2"
                                memory: 2Gi
                            volumeMounts:
                              - name: cache
                                mountPath: /tmp/.cache
                        volumes:
                          - name: cache
                            emptyDir: {}
                  JOBEOF
                    echo "  CREATED ${JOB_NAME}"
                  done
                  echo "Dispatcher complete"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi

# GuideLLM Daily Benchmark CronJob
# ============================================================================
# Dispatches parallel benchmark Jobs for each active model.
# Metrics flow through vLLM → ServiceMonitor → Prometheus → Grafana.
# No PVC needed — the value is in the Grafana dashboards, not JSON files.
#
# Traffic Profiles (aligned with NeuralNav/GuideLLM standards):
#   512→256   Chatbot/Q&A (default — matches our demo prompts)
#   1024→1024 Content generation (for BF16 capacity testing)
#
# SLO Targets (experience-driven):
#   Conversational: TTFT ≤150ms, ITL ≤25ms (granite-8b)
#   Interactive:    TTFT ≤500ms, ITL ≤35ms (mistral-bf16)
#
# Manual trigger:
#   oc create job --from=cronjob/guidellm-daily bench-$(date +%H%M) -n private-ai
#
# On-demand single model (from job-templates/):
#   oc create -f gitops/step-07-.../base/guidellm/job-templates/granite-8b-agent.yaml
#
# Ref: https://github.com/vllm-project/guidellm
# Ref: https://github.com/redhat-et/neuralnav (traffic profiles + SLOs)
# Ref: https://developers.redhat.com/articles/2025/12/24/how-deploy-and-benchmark-vllm-guidellm-kubernetes
# ============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: guidellm-daily
  namespace: private-ai
  labels:
    app: guidellm
    app.kubernetes.io/part-of: benchmarking
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: guidellm
            job-type: dispatcher
        spec:
          serviceAccountName: guidellm-dispatcher
          restartPolicy: Never
          containers:
            - name: dispatcher
              image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
              env:
                - name: NAMESPACE
                  value: private-ai
                - name: GUIDELLM_IMAGE
                  value: ghcr.io/vllm-project/guidellm:stable
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  echo "GuideLLM Daily Benchmark — ${TIMESTAMP}"

                  # Benchmark active models only (minReplicas > 0)
                  for MODEL in granite-8b-agent mistral-3-bf16; do
                    TARGET="http://${MODEL}-predictor.private-ai.svc.cluster.local:8080/v1"
                    JOB_NAME="guidellm-${MODEL}-${TIMESTAMP}"

                    if ! curl -s --connect-timeout 10 "${TARGET}/models" >/dev/null 2>&1; then
                      echo "  SKIP ${MODEL} — not reachable"
                      continue
                    fi

                    cat <<JOBEOF | oc apply -f -
                  apiVersion: batch/v1
                  kind: Job
                  metadata:
                    name: ${JOB_NAME}
                    namespace: ${NAMESPACE}
                    labels:
                      app: guidellm
                      model: ${MODEL}
                      benchmark-run: "${TIMESTAMP}"
                  spec:
                    backoffLimit: 0
                    activeDeadlineSeconds: 900
                    ttlSecondsAfterFinished: 86400
                    template:
                      metadata:
                        labels:
                          app: guidellm
                          model: ${MODEL}
                          kueue.x-k8s.io/queue-name: default
                      spec:
                        restartPolicy: Never
                        containers:
                          - name: benchmark
                            image: ${GUIDELLM_IMAGE}
                            env:
                              - name: HOME
                                value: /tmp
                              - name: HF_HOME
                                value: /tmp/.cache/huggingface
                            command:
                              - guidellm
                            args:
                              - benchmark
                              - run
                              - --target
                              - "${TARGET}"
                              - --model
                              - "${MODEL}"
                              - --rate
                              - "1,3,5,8,10"
                              - --rate-type
                              - constant
                              - --max-seconds
                              - "60"
                              - --max-requests
                              - "50"
                              - --data
                              - '{"prompt_tokens":512,"output_tokens":256}'
                              - --output-path
                              - /tmp/results.json
                              - --disable-console-interactive
                            resources:
                              requests:
                                cpu: 500m
                                memory: 1Gi
                              limits:
                                cpu: "2"
                                memory: 2Gi
                            volumeMounts:
                              - name: cache
                                mountPath: /tmp/.cache
                        volumes:
                          - name: cache
                            emptyDir: {}
                  JOBEOF
                    echo "  CREATED ${JOB_NAME}"
                  done
                  echo "Dispatcher complete"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi

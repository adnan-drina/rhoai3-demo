apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Manual trigger: oc create job --from=cronjob/guidellm-daily bench-$(date +%H%M) -n private-ai
# Ref: https://github.com/vllm-project/guidellm

resources:
  - rbac.yaml
  - cronjob.yaml
  # pvc.yaml removed — metrics flow through Prometheus/Grafana, not PVC files
  # Job templates in job-templates/ are for manual use (oc create -f)


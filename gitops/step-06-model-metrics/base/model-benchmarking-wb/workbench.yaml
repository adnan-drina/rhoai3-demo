# RHOAI 3.3: Uses notebooks.opendatahub.io/inject-auth: "true" for kube-rbac-proxy sidecar
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-benchmarking-wb
  namespace: private-ai
  labels:
    app: model-benchmarking-wb
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-benchmarking-wb-storage
  namespace: private-ai
  labels:
    app: model-benchmarking-wb
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    openshift.io/display-name: model-benchmarking-wb-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: gp3-csi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: guidellm-results
  namespace: private-ai
  labels:
    app: model-benchmarking-wb
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: gp3-csi
---
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: model-benchmarking-wb
  namespace: private-ai
  labels:
    app: model-benchmarking-wb
    opendatahub.io/dashboard: "true"
    opendatahub.io/odh-managed: "true"
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "10"
    notebooks.opendatahub.io/inject-auth: "true"
    opendatahub.io/hardware-profile-name: cpu-small
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/image-display-name: "Jupyter | Data Science | CPU | Python 3.12"
    opendatahub.io/username: ai-admin
    notebooks.opendatahub.io/last-image-selection: s2i-generic-data-science-notebook:2025.2
    notebooks.opendatahub.io/last-image-version-git-commit-selection: d3137ca
    notebooks.opendatahub.io/last-size-selection: Small
    openshift.io/display-name: "Model Benchmarking"
    openshift.io/description: "Run and analyze GuideLLM benchmarks - TTFT, TPOT, throughput analysis"
    # Idle Culling: Auto-stop after 15 min of inactivity (demo setting)
    notebooks.opendatahub.io/idle-culling-time: "15m"
    notebooks.opendatahub.io/idle-culling-enabled: "true"
spec:
  template:
    spec:
      enableServiceLinks: false
      serviceAccountName: model-benchmarking-wb
      affinity: {}
      initContainers:
        - name: git-sync
          image: alpine/git:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              REPO_URL="https://github.com/adnan-drina/rhoai3-demo.git"
              WORKSPACE="/opt/app-root/src"
              NOTEBOOKS_SRC="gitops/step-06-model-metrics/base/model-benchmarking-wb"
              
              echo "╔══════════════════════════════════════════════════════════════╗"
              echo "║  Git-Sync: Loading Model Benchmarking Notebook               ║"
              echo "╚══════════════════════════════════════════════════════════════╝"
              
              if [ ! -f "$WORKSPACE/Model-Benchmarking.ipynb" ]; then
                echo "→ Cloning repository..."
                git clone --depth 1 --single-branch "$REPO_URL" /tmp/repo
                
                echo "→ Copying notebooks to workspace..."
                cp /tmp/repo/$NOTEBOOKS_SRC/*.ipynb "$WORKSPACE/" 2>/dev/null || true
                
                rm -rf /tmp/repo
                echo "✓ Notebooks synced successfully!"
              else
                echo "✓ Notebooks already exist - skipping sync"
              fi
              
              ls -la "$WORKSPACE/"
          volumeMounts:
            - name: model-benchmarking-wb-storage
              mountPath: /opt/app-root/src
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: model-benchmarking-wb
          image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-generic-data-science-notebook:2025.2
          imagePullPolicy: Always
          workingDir: /opt/app-root/src
          env:
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=8888
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/private-ai/model-benchmarking-wb
                --ServerApp.quit_button=False
            - name: JUPYTER_IMAGE
              value: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-generic-data-science-notebook:2025.2
            - name: PIP_CERT
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: REQUESTS_CA_BUNDLE
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: SSL_CERT_FILE
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: PIPELINES_SSL_SA_CERTS
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: GIT_SSL_CAINFO
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: GUIDELLM_RESULTS_DIR
              value: /results
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /notebook/private-ai/model-benchmarking-wb/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /notebook/private-ai/model-benchmarking-wb/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: model-benchmarking-wb-storage
              mountPath: /opt/app-root/src
            - name: guidellm-results
              mountPath: /results
              readOnly: true
            - name: shm
              mountPath: /dev/shm
            - name: trusted-ca
              mountPath: /etc/pki/tls/custom-certs/ca-bundle.crt
              subPath: ca-bundle.crt
              readOnly: true
      volumes:
        - name: model-benchmarking-wb-storage
          persistentVolumeClaim:
            claimName: model-benchmarking-wb-storage
        - name: guidellm-results
          persistentVolumeClaim:
            claimName: guidellm-results
        - name: shm
          emptyDir:
            medium: Memory
        - name: trusted-ca
          configMap:
            name: workbench-trusted-ca-bundle
            optional: true
            items:
              - key: ca-bundle.crt
                path: ca-bundle.crt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: model-benchmarking-controller
  namespace: private-ai
  labels:
    app: model-benchmarking-wb
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["serving.kserve.io"]
    resources: ["inferenceservices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: model-benchmarking-controller
  namespace: private-ai
  labels:
    app: model-benchmarking-wb
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: model-benchmarking-controller
subjects:
  - kind: ServiceAccount
    name: model-benchmarking-wb
    namespace: private-ai


apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Stage 120: GPU-as-a-Service.
# cert-manager is a prerequisite for the Red Hat build of Kueue operator. It is
# already present on this cluster and OLM installs it automatically as a Kueue
# dependency, so stage-120 verifies it rather than declaring a duplicate
# OperatorGroup.
resources:
  - rhoai-dsc/base
  - kueue/operator
  - nfd/operator
  - nfd/instance/base
  - gpu-operator/operator
  - gpu-operator/instance/base
  - machineset/base
  - kueue-quota/base
  - hardware-profiles/base

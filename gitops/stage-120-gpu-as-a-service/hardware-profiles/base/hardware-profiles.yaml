    opendatahub.io/display-name: "GPU Priority - 1x NVIDIA"
    opendatahub.io/description: "Higher-priority demo path for critical jobs."
spec:
  identifiers:
    - identifier: cpu
      displayName: CPU
      resourceType: CPU
      defaultCount: 2
      minCount: 1
      maxCount: 8
    - identifier: memory
      displayName: Memory
      resourceType: Memory
      defaultCount: 8Gi
      minCount: 2Gi
      maxCount: 32Gi
    - identifier: nvidia.com/gpu
      displayName: NVIDIA GPU
      resourceType: Accelerator
      defaultCount: 1
      minCount: 1
      maxCount: 1
  scheduling:
    type: Queue
    kueue:
      localQueueName: lq-gpu-priority
---
apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  name: gpu-reserved-demo
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "5"
    opendatahub.io/display-name: "GPU Reserved - Demo Team"
    opendatahub.io/description: "Reserved/team-owned GPU quota without a booking app."
spec:
  identifiers:
    - identifier: cpu
      displayName: CPU
      resourceType: CPU
      defaultCount: 2
      minCount: 1
      maxCount: 8
    - identifier: memory
      displayName: Memory
      resourceType: Memory
      defaultCount: 8Gi
      minCount: 2Gi
      maxCount: 32Gi
    - identifier: nvidia.com/gpu
      displayName: NVIDIA GPU
      resourceType: Accelerator
      defaultCount: 1

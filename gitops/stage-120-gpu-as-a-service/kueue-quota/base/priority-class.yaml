# WorkloadPriorityClass for higher admission priority. Used by CLI/SDK jobs that
# add the label kueue.x-k8s.io/priority-class: gpu-high-priority. Workbenches are
# non-preemptive, so the GPU-priority profile demonstrates dedicated + borrowable
# quota; this class lets suspendable jobs jump the admission order.
apiVersion: kueue.x-k8s.io/v1beta1
kind: WorkloadPriorityClass
metadata:
  name: gpu-high-priority
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "4"
value: 1000
description: "Higher Kueue admission priority for critical GPU jobs."

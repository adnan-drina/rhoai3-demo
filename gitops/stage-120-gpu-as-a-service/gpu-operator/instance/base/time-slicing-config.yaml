# GPU time-slicing: advertise each physical NVIDIA L40S as 4 schedulable
# nvidia.com/gpu units so the four Kueue queues have capacity to share.
# Referenced by ClusterPolicy spec.devicePlugin.config (name + default key).
apiVersion: v1
kind: ConfigMap
metadata:
  name: time-slicing-config
  namespace: nvidia-gpu-operator
data:
  any: |-
    version: v1
    flags:
      migStrategy: none
    sharing:
      timeSlicing:
        resources:
          - name: nvidia.com/gpu
            replicas: 4

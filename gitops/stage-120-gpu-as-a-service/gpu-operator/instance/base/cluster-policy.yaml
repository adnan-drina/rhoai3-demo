# NVIDIA ClusterPolicy — normalized from the GPU operator's alm-example
# (gpu-operator-certified.v26.3.2) with two demo-specific changes:
#   1. daemonsets.tolerations: tolerate the nvidia-gpu-only taint so the operator
#      DaemonSets (driver, device-plugin, toolkit, dcgm) schedule on the tainted
#      GPU node.
#   2. devicePlugin.config: reference the time-slicing-config ConfigMap so each
#      physical GPU is advertised as 4 nvidia.com/gpu units.
# All other fields are operator defaults. Do not handwrite ClusterPolicy fields.
apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  name: gpu-cluster-policy
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "2"
spec:
  operator:
    use_ocp_driver_toolkit: true
  cdi:
    enabled: true
    nriPluginEnabled: false
  sandboxWorkloads:
    enabled: false
    defaultWorkload: container
    mode: kubevirt
  driver:
    enabled: true
    useNvidiaDriverCRD: false
    kernelModuleType: auto
    upgradePolicy:
      autoUpgrade: true
      drain:
        deleteEmptyDir: false
        enable: false
        force: false
        timeoutSeconds: 300
      maxParallelUpgrades: 1
      maxUnavailable: 25%
      podDeletion:
        deleteEmptyDir: false
        force: false
        timeoutSeconds: 300
      waitForCompletion:
        timeoutSeconds: 0
    repoConfig:
      configMapName: ''
    certConfig:
      name: ''
    licensingConfig:
      nlsEnabled: true
      secretName: ''
    virtualTopology:
      config: ''
    kernelModuleConfig:
      name: ''
  dcgmExporter:
    enabled: true
    config:
      name: ''
    serviceMonitor:
      enabled: true
  dcgm:
    enabled: true
  daemonsets:
    updateStrategy: RollingUpdate
    rollingUpdate:
      maxUnavailable: '1'
    tolerations:
      - key: nvidia-gpu-only
        operator: Exists
        effect: NoSchedule
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
  devicePlugin:
    enabled: true
    config:
      name: time-slicing-config
      default: any
    mps:
      root: /run/nvidia/mps
  gfd:
    enabled: true
  migManager:
    enabled: true
  nodeStatusExporter:
    enabled: true
  mig:
    strategy: single
  toolkit:
    enabled: true
  validator:
    plugin:
      env: []
  vgpuManager:
    enabled: false
  vgpuDeviceManager:
    enabled: true
  sandboxDevicePlugin:
    enabled: true
  kataSandboxDevicePlugin:
    enabled: true
  vfioManager:
    enabled: true
  ccManager:
    enabled: true
  gds:
    enabled: false
  gdrcopy:
    enabled: false

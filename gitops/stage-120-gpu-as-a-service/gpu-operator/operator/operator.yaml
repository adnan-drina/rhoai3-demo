# NVIDIA GPU Operator (certified). Installs drivers, container toolkit, and the
# device plugin that exposes nvidia.com/gpu. Channel verified live 2026-06-11:
# gpu-operator-certified v26.3 (CSV gpu-operator-certified.v26.3.2) from the
# certified-operators catalog, SingleNamespace install mode in nvidia-gpu-operator.
apiVersion: v1
kind: Namespace
metadata:
  name: nvidia-gpu-operator
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: nvidia-gpu-operator
  namespace: nvidia-gpu-operator
spec:
  targetNamespaces:
    - nvidia-gpu-operator
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: gpu-operator-certified
  namespace: nvidia-gpu-operator
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  channel: v26.3
  installPlanApproval: Automatic
  name: gpu-operator-certified
  source: certified-operators
  sourceNamespace: openshift-marketplace

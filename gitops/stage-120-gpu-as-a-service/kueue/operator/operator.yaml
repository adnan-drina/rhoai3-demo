# Red Hat build of Kueue operator. RHOAI integrates with it via DSC kueue: Unmanaged
# (the embedded Managed Kueue is deprecated). Channel verified live 2026-06-11:
# kueue-operator stable-v1.3 (CSV kueue-operator.v1.3.1). Install mode is
# AllNamespaces only, so the OperatorGroup has no targetNamespaces.
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-kueue-operator
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-kueue-operator
  namespace: openshift-kueue-operator
spec:
  upgradeStrategy: Default
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: kueue-operator
  namespace: openshift-kueue-operator
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  channel: stable-v1.3
  installPlanApproval: Automatic
  name: kueue-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace

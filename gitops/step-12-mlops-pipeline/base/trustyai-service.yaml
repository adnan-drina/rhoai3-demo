# TrustyAI service for monitoring face-recognition model inference.
# Tracks confidence score distribution and class balance drift.
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html/monitoring_your_ai_systems/
apiVersion: trustyai.opendatahub.io/v1
kind: TrustyAIService
metadata:
  name: trustyai-service
  namespace: private-ai
  labels:
    app.kubernetes.io/part-of: face-recognition
    app.kubernetes.io/component: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  storage:
    format: PVC
    folder: /data
    size: 5Gi
  metrics:
    schedule: "5s"
    batchSize: 50
  data:
    filename: data.csv
    format: CSV

# MLServer ServingRuntime for KServe — RHOAI 3.3 Tech Preview.
# Serves scikit-learn, XGBoost, LightGBM models natively (no ONNX conversion).
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html/deploying_models/deploying_models#deploying-models-using-mlserver-runtime_rhoai-user
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: mlserver-runtime
  namespace: private-ai
  labels:
    app.kubernetes.io/part-of: face-recognition
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    opendatahub.io/runtime-version: 1.7.1
    openshift.io/display-name: "MLServer ServingRuntime for KServe - Tech Preview"
spec:
  annotations:
    monitoring.opendatahub.io/scrape: "true"
    opendatahub.io/kserve-runtime: mlserver
    prometheus.io/path: /metrics
    prometheus.io/port: "8082"
  multiModel: false
  protocolVersions:
    - v2
  supportedModelFormats:
    - name: sklearn
      version: "0"
    - name: sklearn
      version: "1"
    - name: xgboost
      version: "1"
    - name: lightgbm
      version: "1"
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhoai/odh-mlserver-rhel9@sha256:bd44dd4fbe7b623b236232ca2c6c18e0394f23b8fdcd2cd6260c2d842345e49b
      env:
        - name: MLSERVER_MODEL_NAME
          value: "{{.Name}}"
        - name: MLSERVER_HTTP_PORT
          value: "8080"
        - name: MODELS_DIR
          value: /mnt/models
      ports:
        - containerPort: 8080
          protocol: TCP
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        privileged: false
        runAsNonRoot: true

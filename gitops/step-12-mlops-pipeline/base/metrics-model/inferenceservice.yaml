# Metrics proxy for TrustyAI monitoring of face recognition results.
# Receives tabular inference (confidence, class_id, num_detections)
# and returns quality_score. TrustyAI monitors this service's I/O.
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html/deploying_models/deploying_models#deploying-models-using-mlserver-runtime_rhoai-user
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: face-recognition-metrics
  namespace: private-ai
  labels:
    app.kubernetes.io/name: face-recognition-metrics
    app.kubernetes.io/part-of: face-recognition
    app.kubernetes.io/component: monitoring
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "25"
    openshift.io/display-name: "Face Recognition Metrics (sklearn)"
    serving.kserve.io/deploymentMode: RawDeployment
    security.opendatahub.io/enable-auth: "false"
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    model:
      runtime: mlserver-runtime
      modelFormat:
        name: sklearn
      storage:
        key: minio-connection
      storageUri: s3://models/face-recognition-metrics/
      env:
        - name: MLSERVER_MODEL_IMPLEMENTATION
          value: mlserver_sklearn.SKLearnModel
        - name: MLSERVER_MODEL_URI
          value: /mnt/models/model.joblib
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi

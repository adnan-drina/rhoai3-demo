apiVersion: v1
kind: Secret
metadata:
  name: mlflow-artifact-connection
  namespace: enterprise-mlops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    openshift.io/display-name: "MLflow Artifact Storage"
    openshift.io/description: "S3-compatible storage configuration for Enterprise MLOps MLflow artifacts"
  labels:
    app.kubernetes.io/component: mlflow
    app.kubernetes.io/part-of: mlops
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: rhoai-access-key
  AWS_SECRET_ACCESS_KEY: rhoai-secret-key-12345
  AWS_S3_BUCKET: rhoai-storage
  AWS_S3_ENDPOINT: http://minio.minio-storage.svc:9000
  AWS_DEFAULT_REGION: us-east-1

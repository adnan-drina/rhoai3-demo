apiVersion: mlflow.opendatahub.io/v1
kind: MLflow
metadata:
  name: mlflow
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app.kubernetes.io/component: mlflow
    app.kubernetes.io/part-of: mlops
spec:
  replicas: 1
  backendStoreUri: sqlite:////mlflow/mlflow.db
  registryStoreUri: sqlite:////mlflow/mlflow.db
  serveArtifacts: true
  artifactsDestination: file:///mlflow/artifacts
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 10Gi
  workspaceLabelSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values:
          - enterprise-mlops
          - enterprise-rag
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

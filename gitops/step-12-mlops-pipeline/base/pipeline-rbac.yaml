# The DSPA pipeline runner ServiceAccount needs permission to
# delete pods (restart predictor) and read/patch InferenceServices.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: face-pipeline-controller
  namespace: enterprise-mlops
  labels:
    app.kubernetes.io/part-of: face-recognition
    app.kubernetes.io/component: pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["serving.kserve.io"]
    resources: ["inferenceservices"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: face-pipeline-controller
  namespace: enterprise-mlops
  labels:
    app.kubernetes.io/part-of: face-recognition
    app.kubernetes.io/component: pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: face-pipeline-controller
subjects:
  - kind: ServiceAccount
    name: dspa-mlops
    namespace: enterprise-mlops
  - kind: ServiceAccount
    name: pipeline-runner-dspa-mlops
    namespace: enterprise-mlops
---
# Pipeline SA needs cluster view to access Model Registry route (cross-namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: face-pipeline-registry-access
  labels:
    app.kubernetes.io/part-of: face-recognition
    app.kubernetes.io/component: pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: pipeline-runner-dspa-mlops
    namespace: enterprise-mlops
---
# MLflow SDK writes use the pipeline runner's Kubernetes identity.
# The namespace edit role lets MLflow authorize experiment run creation and
# artifact logging for the enterprise-mlops workspace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: face-pipeline-mlflow-client
  namespace: enterprise-mlops
  labels:
    app.kubernetes.io/part-of: face-recognition
    app.kubernetes.io/component: pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: pipeline-runner-dspa-mlops
    namespace: enterprise-mlops

# DSPA expects field names accesskey/secretkey, not the AWS_ACCESS_KEY_ID
# convention used by the dashboard data connection secret.
apiVersion: v1
kind: Secret
metadata:
  name: dspa-minio-credentials
  namespace: enterprise-mlops
  labels:
    app.kubernetes.io/part-of: mlops
    app.kubernetes.io/component: pipeline-server
  annotations:
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
stringData:
  accesskey: rhoai-access-key
  secretkey: rhoai-secret-key-12345


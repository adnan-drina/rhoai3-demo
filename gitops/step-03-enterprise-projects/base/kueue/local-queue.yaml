# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.4/html/managing_openshift_ai/managing-distributed-workloads_managing-rhoai
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: maas-default
  namespace: maas
  labels:
    app.kubernetes.io/part-of: maas
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    kueue.x-k8s.io/default-queue: "true"
spec:
  clusterQueue: maas-gpu


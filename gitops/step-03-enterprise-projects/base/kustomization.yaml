apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Step 03: Enterprise project foundation
# Shared MinIO object storage, user authentication/RBAC, project-scoped
# dashboard connections, and Kueue queue binding for the MaaS namespace.

resources:
  - minio/
  - auth/htpasswd-secret.yaml
  - auth/oauth.yaml
  - namespace.yaml
  - kueue/
  - data-connection.yaml
  - storage-config-secret.yaml
  - rbac/project-admin.yaml
  - rbac/project-editor.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhoai-demo-alert-webhook
  namespace: openshift-monitoring
  labels:
    app.kubernetes.io/name: rhoai-demo-alert-webhook
    app.kubernetes.io/component: alert-receiver
    app.kubernetes.io/part-of: rhoai3-demo
    demo.rhoai.io/stage: "210"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rhoai-demo-alert-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rhoai-demo-alert-webhook
        app.kubernetes.io/component: alert-receiver
        app.kubernetes.io/part-of: rhoai3-demo
        demo.rhoai.io/stage: "210"
    spec:
      containers:
        - name: webhook
          image: registry.access.redhat.com/ubi9/python-311:latest
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - -c
            - |
              from http.server import BaseHTTPRequestHandler, HTTPServer
              import json

              class Handler(BaseHTTPRequestHandler):
                  def do_POST(self):
                      length = int(self.headers.get("content-length", "0") or "0")
                      body = self.rfile.read(length) if length else b""
                      try:
                          payload = json.loads(body.decode("utf-8")) if body else {}
                          alerts = payload.get("alerts", [])
                          print(f"received {len(alerts)} alert(s) on {self.path}", flush=True)
                      except Exception as exc:
                          print(f"received non-json alert payload on {self.path}: {exc}", flush=True)
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"ok\n")

                  def do_GET(self):
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"ok\n")

                  def log_message(self, fmt, *args):
                      print(fmt % args, flush=True)

              HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: rhoai-demo-guardrails-jaeger-link
  labels:
    app.kubernetes.io/name: guardrails-jaeger-link
    app.kubernetes.io/component: console-link
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  applicationMenu:
    section: RHOAI Demo
    imageURL: data:image/svg+xml;base64,
  # href carries a placeholder; the patch-jaeger-consolelink Job injects the
  # environment-specific Jaeger UI route host after the Tempo operator
  # creates it (stage-210 Grafana ConsoleLink pattern).
  href: 'https://jaeger-ui-route-pending.local'
  location: ApplicationMenu
  text: 'RHOAI Demo Guardrails Traces (Jaeger)'

apiVersion: v1
kind: Service
metadata:
  name: nemo-guardrails-internal
  namespace: ai-safety
  labels:
    app.kubernetes.io/part-of: guardrails
    app.kubernetes.io/name: nemo-guardrails-internal
    app.kubernetes.io/component: safety
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  # In-cluster consumer path for the Llama Stack remote::nvidia safety
  # provider, which cannot send an Authorization header. The operator-created
  # `nemo-guardrails` Service (443) fronts a kube-rbac-proxy sidecar that
  # requires a bearer token, so this Service targets the NeMo container port
  # directly. Demo exception recorded in PLAN.md: the external route stays
  # bearer-authenticated; this unauthenticated path is cluster-internal only.
  ports:
    - name: http
      port: 8000
      protocol: TCP
      targetPort: 8000
  selector:
    app: nemo-guardrails

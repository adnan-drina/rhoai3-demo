apiVersion: apps/v1
kind: Deployment
metadata:
  name: maas-internal-proxy
  namespace: ai-safety
  labels:
    app.kubernetes.io/part-of: guardrails
    app.kubernetes.io/name: maas-internal-proxy
    app.kubernetes.io/component: maas-egress
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  # In-cluster clients that call the MaaS gateway through its external
  # hostname hairpin through the cloud load balancer, where a large share of
  # fresh connections break mid-response (verified live in stage 230). This
  # proxy reaches the gateway's in-cluster Service directly while presenting
  # the public hostname via SNI and the Host header, so MaaS authentication
  # and rate limiting stay fully enforced. The NeMo Guardrails service uses
  # it as its OpenAI-compatible model endpoint. The server configuration
  # carrying the environment-specific hostname is generated by deploy.sh
  # (maas-internal-proxy-config). Vendored per stage so stage 240 does not
  # depend on the stage-230 namespace.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: maas-internal-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: guardrails
        app.kubernetes.io/name: maas-internal-proxy
        app.kubernetes.io/component: maas-egress
    spec:
      containers:
        - name: nginx
          image: registry.access.redhat.com/ubi9/nginx-124:latest
          command:
            - nginx
            - -g
            - daemon off;
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: proxy-config
              mountPath: /opt/app-root/etc/nginx.d
      volumes:
        - name: proxy-config
          configMap:
            name: maas-internal-proxy-config

apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: guardrails
  namespace: ai-safety
  labels:
    app.kubernetes.io/part-of: guardrails
    app.kubernetes.io/name: otel-guardrails
    app.kubernetes.io/component: tracing
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  # Receives OTLP spans from the NeMo Guardrails service and forwards them
  # through the multitenant Tempo gateway (tenant ai-safety) with the
  # collector ServiceAccount token; the gateway authorizes the write via
  # SubjectAccessReview (tempo-tenant-rbac.yaml).
  mode: deployment
  replicas: 1
  config:
    extensions:
      bearertokenauth:
        filename: /var/run/secrets/kubernetes.io/serviceaccount/token
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
    exporters:
      otlp:
        endpoint: tempo-guardrails-gateway.ai-safety.svc.cluster.local:4317
        auth:
          authenticator: bearertokenauth
        headers:
          X-Scope-OrgID: ai-safety
        tls:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt
    service:
      extensions:
        - bearertokenauth
      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - batch
          exporters:
            - otlp

apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: guardrails
  namespace: ai-safety
  labels:
    app.kubernetes.io/part-of: guardrails
    app.kubernetes.io/name: otel-guardrails
    app.kubernetes.io/component: tracing
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  # Receives OTLP spans from the NeMo Guardrails service, forwards them to
  # the multitenant Tempo gateway (tenant ai-safety) for trace storage, AND
  # derives RED metrics (rate/errors/duration) per span with the spanmetrics
  # connector so guardrail rail decisions are queryable in Prometheus and
  # Grafana, not only in traces. The collector token authorizes the Tempo
  # write via SubjectAccessReview (tempo-tenant-rbac.yaml); User Workload
  # Monitoring scrapes the Prometheus exporter (podmonitor-guardrails.yaml).
  mode: deployment
  replicas: 1
  observability:
    metrics:
      # Do not let the operator create a ServiceMonitor for the collector's
      # own telemetry; the stage owns the guardrails-metrics PodMonitor.
      enableMetrics: false
  config:
    extensions:
      bearertokenauth:
        filename: /var/run/secrets/kubernetes.io/serviceaccount/token
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    connectors:
      spanmetrics:
        # Keep the rail/action name and outcome as metric dimensions so a
        # dashboard can break blocks down by which rail fired.
        dimensions:
          - name: rail.name
          - name: action.name
        histogram:
          explicit:
            buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s]
        metrics_flush_interval: 15s
    processors:
      batch: {}
    exporters:
      otlp:
        endpoint: tempo-guardrails-gateway.ai-safety.svc.cluster.local:4317
        auth:
          authenticator: bearertokenauth
        headers:
          X-Scope-OrgID: ai-safety
        tls:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt
      prometheus:
        endpoint: 0.0.0.0:8889
        resource_to_telemetry_conversion:
          enabled: true
    service:
      extensions:
        - bearertokenauth
      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - batch
          exporters:
            - otlp
            - spanmetrics
        metrics:
          receivers:
            - spanmetrics
          exporters:
            - prometheus

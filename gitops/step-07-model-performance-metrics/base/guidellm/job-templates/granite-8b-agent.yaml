# GuideLLM Benchmark: granite-8b-agent (1-GPU FP8)
# Usage: oc create -f granite-8b-agent.yaml
# Traffic profile: 512→256 (Chatbot/Q&A)
# SLO target: Conversational — TTFT ≤150ms, ITL ≤25ms
apiVersion: batch/v1
kind: Job
metadata:
  generateName: bench-granite-
  namespace: private-ai
  labels:
    app: guidellm
    model: granite-8b-agent
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: guidellm
        model: granite-8b-agent
        kueue.x-k8s.io/queue-name: default
    spec:
      restartPolicy: Never
      containers:
        - name: benchmark
          image: ghcr.io/vllm-project/guidellm:stable
          env:
            - name: HOME
              value: /tmp
            - name: HF_HOME
              value: /tmp/.cache/huggingface
          command: ["guidellm"]
          args:
            - benchmark
            - run
            - --target
            - "http://granite-8b-agent-predictor.private-ai.svc.cluster.local:8080/v1"
            - --model
            - "granite-8b-agent"
            - --rate
            - "1,3,5,8,10"
            - --rate-type
            - constant
            - --max-seconds
            - "60"
            - --max-requests
            - "50"
            - --data
            - '{"prompt_tokens":512,"output_tokens":256}'
            - --output-path
            - /tmp/results.json
            - --disable-console-interactive
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: cache
              mountPath: /tmp/.cache
      volumes:
        - name: cache
          emptyDir: {}

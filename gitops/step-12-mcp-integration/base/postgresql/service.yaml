apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: private-ai
  labels:
    app: postgresql
    app.kubernetes.io/part-of: mcp-integration
    app.kubernetes.io/component: database
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: ClusterIP
  selector:
    app: postgresql
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP

# =============================================================================
# vLLM ServingRuntime for RHOAI 3.3 — Aligned with Platform Default
# =============================================================================
# This ServingRuntime uses the SAME image and configuration as the
# RHOAI 3.3 platform-provided vllm-cuda-runtime-template.
#
# Image: vLLM v0.13.0 (RHOAI 3.3)
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.3/html/deploying_models/
#
# To verify alignment with the platform default:
#   oc get template vllm-cuda-runtime-template -n redhat-ods-applications \
#     -o jsonpath='{.objects[0].spec.containers[0].image}'
# =============================================================================
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
  namespace: private-ai
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/runtime-version: v0.13.0
    opendatahub.io/serving-runtime-scope: namespace
    opendatahub.io/template-display-name: "vLLM NVIDIA GPU ServingRuntime for KServe"
    opendatahub.io/template-name: vllm-cuda-runtime
    openshift.io/display-name: "vLLM NVIDIA GPU ServingRuntime for KServe"
spec:
  annotations:
    opendatahub.io/kserve-runtime: vllm
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  multiModel: false
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  containers:
    - name: kserve-container
      # RHOAI 3.3 default vLLM image (v0.13.0)
      image: registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:ec799bb5eeb7e25b4b25a8917ab5161da6b6f1ab830cbba61bba371cffb0c34d
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      ports:
        - containerPort: 8080
          protocol: TCP
      volumeMounts:
        - mountPath: /dev/shm
          name: shm
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 8Gi

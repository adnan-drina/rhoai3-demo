# The PRIMARY production model in the "Resource Handover" demo.
# Model: Mistral Small 24B Instruct - Full Precision BF16
# Storage: s3://models/mistral-small-24b/ (MinIO)
# Hardware: g6.12xlarge (4x NVIDIA L4, 96GB total VRAM)
#   - Weights: ~48GB (24B × 2 bytes)
#   - System overhead: ~8GB (2GB per GPU × 4)
#   - KV Cache headroom: ~40GB (doubled with FP8 → ~80GB effective)
# Memory Optimization (Red Hat AI Field Engineering + GuideLLM tuning):
#   --kv-cache-dtype=fp8      → Doubles KV cache capacity for high concurrency
#   --enable-chunked-prefill  → Prevents prefill spikes from blocking users
#   --gpu-memory-util=0.90    → Tuned up from 0.85 (+16% KV cache: 368K→426K tokens)
#   --max-model-len=16384     → Context reduced from 32K for vLLM v0.13.0 warmup memory
#   ITL: 53ms p95 (hardware-bound on 4x L4 TP=4, ~19 tok/s per request)
#   TTFT: <128ms p95 (within 300ms enterprise chat / 500ms eval judge SLOs)
# Demo Role: This model consumes 4/5 of the cluster's GPU quota.
# When combined with mistral-3-int4 (1 GPU), the cluster is at 100% capacity.
# NOTE: Uses S3 storage because OCI ModelCar (48GB) exceeds CRI-O overlay limits.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: mistral-3-bf16
  namespace: private-ai
  labels:
    app.kubernetes.io/name: mistral-3-bf16
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: llm-serving
    app.kubernetes.io/managed-by: argocd
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"  # AI Asset Endpoint for Playground
    networking.kserve.io/visibility: exposed
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    opendatahub.io/hardware-profile-name: nvidia-l4-4gpu
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    openshift.io/display-name: "Mistral-3 BF16 (4-GPU)"
    serving.kserve.io/deploymentMode: RawDeployment
    opendatahub.io/model-type: generative
    opendatahub.io/genai-use-case: "enterprise chat assistant"
    security.opendatahub.io/enable-auth: "false"
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    # Recreate avoids GPU resource contention during updates
    deploymentStrategy:
      type: Recreate
    nodeSelector:
      node.kubernetes.io/instance-type: g6.12xlarge
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-runtime
      storageUri: s3://models/mistral-small-24b/
      storage:
        key: minio-connection
      args:
        - --served-model-name=mistral-3-bf16
        - --tensor-parallel-size=4
        - --dtype=bfloat16
        # Context length reduced for vLLM v0.13.0 (RHOAI 3.3) warmup memory
        - --max-model-len=16384
        # FP8 KV cache doubles effective capacity (40GB → 80GB)
        - --kv-cache-dtype=fp8
        # Chunked prefill prevents long prompts from blocking other users
        - --enable-chunked-prefill
        # Tuned: 0.90 reclaims 5% VRAM per GPU for KV cache (368K→426K tokens)
        - --gpu-memory-utilization=0.90
        - --max-num-seqs=128
        - --trust-remote-code
        - --tool-call-parser=mistral
        - --enable-auto-tool-choice
      env:
        # RHOAI 3.3 GA: V1 engine required
        - name: VLLM_USE_V1
          value: "1"
        - name: VLLM_NO_HW_METRICS
          value: "1"
        - name: LD_LIBRARY_PATH
          value: /usr/local/nvidia/lib64
      resources:
        requests:
          cpu: "16"
          memory: 64Gi
          nvidia.com/gpu: "4"
        limits:
          cpu: "32"
          memory: 128Gi
          nvidia.com/gpu: "4"


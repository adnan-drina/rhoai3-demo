apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 1x g6.4xlarge (1 GPU) + 1x g6.12xlarge (4 GPU) = 5/5 GPUs
# qwen3-8b-agent   (1 GPU): RAG, MCP tools, Guardrails, Eval (Steps 06-10)
# mistral-3-bf16   (4 GPU): Playground chat, Benchmarking, Eval judge (Steps 06, 08)
# Additional models (Granite 3.1, Mistral INT4, Devstral-2, GPT-OSS-20B) are

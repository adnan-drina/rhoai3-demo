apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-ensure-cert-manager
  namespace: cert-manager-operator
  labels:
    app.kubernetes.io/name: ensure-cert-manager
    app.kubernetes.io/component: certificate-management
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: job-ensure-cert-manager
  labels:
    app.kubernetes.io/name: ensure-cert-manager
    app.kubernetes.io/component: certificate-management
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups:
      - operator.openshift.io
    resources:
      - certmanagers
    verbs:
      - get
      - create
      - patch
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: job-ensure-cert-manager
  labels:
    app.kubernetes.io/name: ensure-cert-manager
    app.kubernetes.io/component: certificate-management
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: job-ensure-cert-manager
subjects:
  - kind: ServiceAccount
    name: job-ensure-cert-manager
    namespace: cert-manager-operator
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-ensure-cert-manager
  namespace: cert-manager-operator
  labels:
    app.kubernetes.io/name: ensure-cert-manager
    app.kubernetes.io/component: certificate-management
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: job-ensure-cert-manager
      restartPolicy: Never
      containers:
        - name: ensure
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              for i in $(seq 1 60); do
                if oc get crd certmanagers.operator.openshift.io >/dev/null 2>&1; then
                  break
                fi
                echo "Waiting for CertManager CRD... ($i/60)"
                sleep 10
              done

              if oc get certmanager cluster >/dev/null 2>&1; then
                echo "CertManager cluster resource already exists."
                exit 0
              fi

              cat <<'YAML' | oc apply -f -
              apiVersion: operator.openshift.io/v1alpha1
              kind: CertManager
              metadata:
                name: cluster
              spec:
                managementState: Managed
              YAML

              echo "CertManager cluster resource is present."

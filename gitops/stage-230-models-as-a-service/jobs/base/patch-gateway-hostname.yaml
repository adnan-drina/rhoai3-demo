apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-patch-maas-gateway
  namespace: openshift-ingress
  labels:
    app.kubernetes.io/name: patch-maas-gateway
    app.kubernetes.io/component: maas-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "11"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: job-patch-maas-gateway
  labels:
    app.kubernetes.io/name: patch-maas-gateway
    app.kubernetes.io/component: maas-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "11"
rules:
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways
    verbs:
      - get
      - patch
  - apiGroups:
      - operator.openshift.io
    resources:
      - ingresscontrollers
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: job-patch-maas-gateway
  labels:
    app.kubernetes.io/name: patch-maas-gateway
    app.kubernetes.io/component: maas-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "11"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: job-patch-maas-gateway
subjects:
  - kind: ServiceAccount
    name: job-patch-maas-gateway
    namespace: openshift-ingress
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-patch-maas-gateway-hostname
  namespace: openshift-ingress
  labels:
    app.kubernetes.io/name: patch-maas-gateway
    app.kubernetes.io/component: maas-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "12"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: job-patch-maas-gateway
      restartPolicy: Never
      containers:
        - name: patch
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              domain="$(oc get ingresscontroller default -n openshift-ingress-operator -o jsonpath='{.status.domain}')"
              hostname="maas.${domain}"
              cert_name="$(oc get ingresscontroller default -n openshift-ingress-operator -o jsonpath='{.spec.defaultCertificate.name}' 2>/dev/null || true)"
              if [[ -z "$cert_name" ]]; then
                cert_name="router-certs-default"
              fi

              for i in $(seq 1 60); do
                if oc get gateway maas-default-gateway -n openshift-ingress >/dev/null 2>&1; then
                  oc patch gateway maas-default-gateway -n openshift-ingress --type=json -p "
                    [
                      {\"op\":\"replace\",\"path\":\"/spec/listeners/0/hostname\",\"value\":\"${hostname}\"},
                      {\"op\":\"replace\",\"path\":\"/spec/listeners/1/hostname\",\"value\":\"${hostname}\"},
                      {\"op\":\"replace\",\"path\":\"/spec/listeners/1/tls/certificateRefs/0/name\",\"value\":\"${cert_name}\"}
                    ]"
                  echo "MaaS gateway hostname=${hostname}, tlsCertificate=${cert_name}"
                  exit 0
                fi
                echo "Waiting for MaaS gateway... ($i/60)"
                sleep 10
              done

              echo "MaaS gateway did not appear in time."
              exit 1

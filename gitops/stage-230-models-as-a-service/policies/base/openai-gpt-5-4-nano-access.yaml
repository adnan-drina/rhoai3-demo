apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSSubscription
metadata:
  name: rhoai-developers-gpt-5-4-nano
  namespace: models-as-a-service
  labels:
    app.kubernetes.io/name: rhoai-developers-gpt-5-4-nano
    app.kubernetes.io/component: maas-subscription
    demo.rhoai.io/provider: governed-models
  annotations:
    argocd.argoproj.io/sync-wave: "18"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  owner:
    groups:
      - name: rhoai-developers
      - name: rhods-admins
    users:
      - kube:admin
  modelRefs:
    - name: nemotron-3-nano-30b-a3b
      namespace: models-as-a-service
      tokenRateLimits:
        - limit: 100000
          window: 1h
    - name: gpt-5-4-nano
      namespace: models-as-a-service
      tokenRateLimits:
        - limit: 20000
          window: 1h
  priority: 100
  tokenMetadata:
    organizationId: rhoai3-demo
    costCenter: ai-platform
    labels:
      environment: demo
      provider: governed-models
      modelSet: nemotron-and-gpt-5-4-nano
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSAuthPolicy
metadata:
  name: rhoai-developers-gpt-5-4-nano
  namespace: models-as-a-service
  labels:
    app.kubernetes.io/name: rhoai-developers-gpt-5-4-nano
    app.kubernetes.io/component: maas-auth-policy
    demo.rhoai.io/provider: governed-models
  annotations:
    argocd.argoproj.io/sync-wave: "18"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  subjects:
    groups:
      - name: rhoai-developers
      - name: rhods-admins
    users:
      - kube:admin
  modelRefs:
    - name: nemotron-3-nano-30b-a3b
      namespace: models-as-a-service
    - name: gpt-5-4-nano
      namespace: models-as-a-service
  meteringMetadata:
    organizationId: rhoai3-demo
    costCenter: ai-platform
    labels:
      environment: demo
      provider: governed-models
      modelSet: nemotron-and-gpt-5-4-nano

apiVersion: v1
kind: Service
metadata:
  name: evalhub-postgres
  namespace: evalhub-system
  labels:
    app: evalhub-postgres
    app.kubernetes.io/name: evalhub-postgres
    app.kubernetes.io/instance: evalhub-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: rag-evaluation
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: evalhub-postgres
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP

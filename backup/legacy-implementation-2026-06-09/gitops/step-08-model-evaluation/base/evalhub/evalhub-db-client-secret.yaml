# DEMO VALUES ONLY - Replace for production use.
# Mirrors the EvalHub database connection into the RHOAI applications namespace
# because the RHOAI Dashboard EvalHub UI discovers EvalHub there.
apiVersion: v1
kind: Secret
metadata:
  name: evalhub-db-credentials
  namespace: redhat-ods-applications
  labels:
    app.kubernetes.io/name: evalhub
    app.kubernetes.io/instance: evalhub
    app.kubernetes.io/component: model-evaluation
    app.kubernetes.io/part-of: rag-evaluation
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  database-name: evalhub
  database-user: evalhub
  database-password: evalhub-demo-password
  db-url: postgres://evalhub:evalhub-demo-password@evalhub-postgres.evalhub-system.svc.cluster.local:5432/evalhub?sslmode=disable

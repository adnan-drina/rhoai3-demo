apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Step 05: LLM Inference with vLLM
# 2 local models: granite-8b-agent (1 GPU, OCI) + mistral-3-bf16 (4 GPU, S3)
# 1 external MaaS model: gpt-5 (OpenAI provider)
# 3 additional models registered in Model Registry for on-demand deployment.
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.4/html-single/govern_llm_access_with_models-as-a-service/index

resources:
  - model-registration/
  - serving-runtime/
  - inference/
  - maas-registration/

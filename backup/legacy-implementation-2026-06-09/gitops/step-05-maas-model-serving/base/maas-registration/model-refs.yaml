# ExternalModel is used as a bridge while the demo still serves the models as
# KServe InferenceService resources. The deploy script patches the endpoint
# fields to the cluster-generated OpenShift route hosts after ArgoCD sync.
apiVersion: maas.opendatahub.io/v1alpha1
kind: ExternalModel
metadata:
  name: gpt-5
  namespace: maas
  labels:
    app.kubernetes.io/name: gpt-5
    app.kubernetes.io/component: maas-registration
    app.kubernetes.io/part-of: llm-serving
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  provider: openai
  targetModel: gpt-5
  endpoint: api.openai.com
  credentialRef:
    name: openai-provider-api-key
---
apiVersion: maas.opendatahub.io/v1alpha1

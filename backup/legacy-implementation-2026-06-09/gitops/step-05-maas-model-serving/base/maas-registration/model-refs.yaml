    argocd.argoproj.io/sync-wave: "13"
spec:
  provider: openai
  targetModel: granite-8b-agent
  endpoint: granite-8b-agent-maas.apps.example.invalid
  credentialRef:
    name: granite-8b-agent-external-credential

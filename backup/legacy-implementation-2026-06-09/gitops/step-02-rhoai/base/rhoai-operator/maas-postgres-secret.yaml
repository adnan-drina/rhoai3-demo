# DEMO VALUES ONLY - Replace for production use
# Generate new passwords: openssl rand -base64 24
# RHOAI 3.4 MaaS requires a PostgreSQL 14+ database and a Secret named
# maas-db-config with DB_CONNECTION_URL in redhat-ods-applications.
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.4/html-single/govern_llm_access_with_models-as-a-service/govern_llm_access_with_models-as-a-service
apiVersion: v1
kind: Secret
metadata:
  name: maas-postgres-creds
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "6"
type: Opaque
stringData:
  database-name: maas
  database-user: maas
  database-password: maas-demo-password
---
# DEMO VALUES ONLY - Replace for production use
# The RHOAI MaaS API reads this exact secret/key.
apiVersion: v1
kind: Secret
metadata:
  name: maas-db-config
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "6"
type: Opaque
stringData:
  DB_CONNECTION_URL: postgresql://maas:maas-demo-password@maas-postgres.redhat-ods-applications.svc.cluster.local:5432/maas?sslmode=disable

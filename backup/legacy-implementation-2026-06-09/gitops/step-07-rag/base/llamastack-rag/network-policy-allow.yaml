# Allow all pods in enterprise-rag namespace to reach lsd-rag on port 8321.
# The LlamaStack operator creates a restrictive NetworkPolicy. This additional
# policy opens same-namespace access for pipeline executor pods, workbenches,
# and the chatbot frontend without relying on unsupported Notebook template
# metadata fields.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lsd-rag-allow-namespace
  namespace: enterprise-rag
  labels:
    app.kubernetes.io/part-of: rag
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  podSelector:
    matchLabels:
      app: llama-stack
      app.kubernetes.io/instance: lsd-rag
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 8321
          protocol: TCP

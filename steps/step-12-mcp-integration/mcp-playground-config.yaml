# MCP Server registration for the RHOAI GenAI Playground.
# Applied by deploy.sh to redhat-ods-applications namespace.
# Makes MCP servers visible in the Playground "MCP servers" panel.
#
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.0/html/experimenting_with_models_in_the_gen_ai_playground/playground-prerequisites_rhoai-user#configuring-model-context-protocol-servers_rhoai-user
kind: ConfigMap
apiVersion: v1
metadata:
  name: gen-ai-aa-mcp-servers
  namespace: redhat-ods-applications
data:
  Database-MCP-Server: |
    {
      "url": "http://database-mcp.private-ai.svc:8080/sse",
      "description": "Query ACME equipment database for calibration records, service history, and parts inventory. Tools: query_equipment, query_service_history, query_parts_inventory, query_pod_equipment."
    }
  OpenShift-MCP-Server: |
    {
      "url": "http://openshift-mcp.private-ai.svc:8000/sse",
      "description": "Inspect OpenShift cluster: list pods, get pod status and logs, check recent events for troubleshooting. Tools: list_pods_summary, get_pod_status, get_pod_logs, get_recent_events."
    }
  Slack-MCP-Server: |
    {
      "url": "http://slack-mcp.private-ai.svc:8080/sse",
      "description": "Send equipment alerts and maintenance plans to the ACME team Slack channel. Tools: send_slack_message, send_equipment_alert, send_maintenance_plan. Demo mode: messages logged only."
    }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-camera
  namespace: edge-ai
  labels:
    app.kubernetes.io/name: edge-camera
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: edge-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: edge-camera
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edge-camera
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: streamlit
          image: quay.io/adrina/edge-camera:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8501
              protocol: TCP
          env:
            - name: GRPC_ENDPOINT
              value: "face-recognition-edge-stable:8001"
            - name: MODEL_NAME
              value: "face-recognition-edge"
            - name: CONFIDENCE_THRESHOLD
              value: "0.3"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

# PIPELINE DEFINITION
# Name: face-recognition-training
# Description: Train YOLO11 face recognition, evaluate, register, deploy, and configure monitoring
# Inputs:
#    epochs: int [Default: 15.0]
#    isvc_namespace: str [Default: 'private-ai']
#    mAP_threshold: float [Default: 0.7]
#    minio_endpoint: str [Default: 'http://minio.minio-storage.svc.cluster.local:9000']
#    model_name: str [Default: 'face-recognition']
#    photos_s3_prefix: str [Default: 's3://face-training-photos/adnan/']
#    registry_url: str [Default: 'https://private-ai-registry-rest.apps.cluster-kb4dq.kb4dq.sandbox2381.opentlc.com']
#    version: str [Default: '']
components:
  comp-deploy-model:
    executorLabel: exec-deploy-model
    inputDefinitions:
      parameters:
        isvc_name:
          description: Name of the InferenceService to redeploy.
          parameterType: STRING
        namespace:
          description: OpenShift namespace where the ISVC is deployed.
          parameterType: STRING
        registry_url:
          defaultValue: ''
          description: Model Registry REST endpoint for linking (optional).
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-evaluate-model:
    executorLabel: exec-evaluate-model
    inputDefinitions:
      parameters:
        mAP_threshold:
          description: Minimum mAP50 required to pass the quality gate.
          parameterType: NUMBER_DOUBLE
        model_name:
          description: Registered model name to look up prior metrics.
          parameterType: STRING
        onnx_path:
          description: Path to the ONNX model on the shared PVC.
          parameterType: STRING
        registry_url:
          description: Model Registry REST endpoint for comparing with previous version.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: NUMBER_DOUBLE
  comp-prepare-dataset:
    executorLabel: exec-prepare-dataset
    inputDefinitions:
      parameters:
        minio_endpoint:
          description: MinIO endpoint URL (fallback if env var not set).
          parameterType: STRING
        photos_s3_prefix:
          description: S3 URI to the user's photo collection.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: NUMBER_INTEGER
  comp-register-model:
    executorLabel: exec-register-model
    inputDefinitions:
      parameters:
        minio_endpoint:
          description: MinIO endpoint URL (fallback if env var not set).
          parameterType: STRING
        model_name:
          description: Name to register under in the Model Registry.
          parameterType: STRING
        onnx_path:
          description: Path to the ONNX model on the shared PVC.
          parameterType: STRING
        registry_url:
          description: Model Registry REST endpoint.
          parameterType: STRING
        version:
          description: Version string for this model release.
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-setup-monitoring:
    executorLabel: exec-setup-monitoring
    inputDefinitions:
      parameters:
        model_name:
          description: Name of the deployed InferenceService to monitor.
          parameterType: STRING
        namespace:
          description: OpenShift namespace where TrustyAI and the model are deployed.
          parameterType: STRING
        num_baseline_samples:
          description: Number of synthetic baseline samples to generate.
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-train-model:
    executorLabel: exec-train-model
    inputDefinitions:
      parameters:
        epochs:
          description: Number of training epochs.
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        trained_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
defaultPipelineRoot: s3://pipelines/
deploymentSpec:
  executors:
    exec-deploy-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - deploy_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kubernetes>=28.0.0'\
          \ 'model-registry>=0.3.7'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef deploy_model(\n    isvc_name: str,\n    namespace: str,\n   \
          \ registry_url: str = \"\",\n) -> str:\n    \"\"\"Restart the predictor\
          \ pod and link the InferenceService to Model Registry.\n\n    Args:\n  \
          \      isvc_name: Name of the InferenceService to redeploy.\n        namespace:\
          \ OpenShift namespace where the ISVC is deployed.\n        registry_url:\
          \ Model Registry REST endpoint for linking (optional).\n\n    Returns:\n\
          \        Name of the ready predictor pod, or a status string on failure.\n\
          \    \"\"\"\n    import os, time\n    from kubernetes import client, config\n\
          \n    config.load_incluster_config()\n    v1 = client.CoreV1Api()\n    custom\
          \ = client.CustomObjectsApi()\n\n    # Link ISVC to Model Registry by querying\
          \ latest version IDs\n    if registry_url:\n        try:\n            os.environ[\"\
          KF_PIPELINES_SA_TOKEN_PATH\"] = \"/var/run/secrets/kubernetes.io/serviceaccount/token\"\
          \n            from model_registry import ModelRegistry\n            registry\
          \ = ModelRegistry(server_address=registry_url, port=443,\n             \
          \                        author=\"deploy-step\", is_secure=False)\n    \
          \        rm = registry.get_registered_model(isvc_name)\n            latest_v\
          \ = None\n            for v in registry.get_model_versions(isvc_name).order_by_id().descending():\n\
          \                latest_v = v\n                break\n\n            if rm\
          \ and latest_v:\n                reg_id = str(rm.id)\n                ver_id\
          \ = str(latest_v.id)\n                print(f\"Linking ISVC to registry:\
          \ model={reg_id}, version={ver_id}\")\n                custom.patch_namespaced_custom_object(\n\
          \                    group=\"serving.kserve.io\", version=\"v1beta1\",\n\
          \                    namespace=namespace, plural=\"inferenceservices\",\n\
          \                    name=isvc_name,\n                    body={\"metadata\"\
          : {\"labels\": {\n                        \"modelregistry.opendatahub.io/registered-model-id\"\
          : reg_id,\n                        \"modelregistry.opendatahub.io/model-version-id\"\
          : ver_id,\n                    }}},\n                )\n               \
          \ print(\"  ISVC labeled with registry IDs\")\n        except Exception\
          \ as e:\n            print(f\"  WARNING: Could not link to registry: {e}\"\
          )\n\n    # Restart predictor pod to load new model\n    label = f\"serving.kserve.io/inferenceservice={isvc_name}\"\
          \n    pods = v1.list_namespaced_pod(namespace, label_selector=label)\n\n\
          \    if not pods.items:\n        print(f\"No predictor pods found for {isvc_name}\"\
          )\n        return \"no-pods\"\n\n    for pod in pods.items:\n        print(f\"\
          Deleting pod {pod.metadata.name}...\")\n        v1.delete_namespaced_pod(pod.metadata.name,\
          \ namespace)\n\n    print(\"Waiting for new predictor pod...\")\n    for\
          \ i in range(24):\n        time.sleep(5)\n        pods = v1.list_namespaced_pod(namespace,\
          \ label_selector=label)\n        for pod in pods.items:\n            if\
          \ pod.status.phase == \"Running\":\n                ready = all(\n     \
          \               cs.ready for cs in (pod.status.container_statuses or [])\n\
          \                )\n                if ready:\n                    print(f\"\
          Predictor ready: {pod.metadata.name} (took ~{(i+1)*5}s)\")\n           \
          \         return pod.metadata.name\n\n    print(\"WARNING: Predictor not\
          \ ready after 120s\")\n    return \"timeout\"\n\n"
        image: registry.redhat.io/rhai/base-image-cpu-rhel9:3.3.0
        resources:
          cpuLimit: 0.5
          cpuRequest: 0.25
          memoryLimit: 0.536870912
          memoryRequest: 0.268435456
          resourceCpuLimit: 500m
          resourceCpuRequest: 250m
          resourceMemoryLimit: 512Mi
          resourceMemoryRequest: 256Mi
    exec-evaluate-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'ultralytics>=8.3.0'\
          \ 'opencv-python-headless>=4.10.0' 'model-registry>=0.3.7'  &&  python3\
          \ -m pip install --quiet --no-warn-script-location 'kfp==2.16.0' '--no-deps'\
          \ 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"$0\" \"$@\"\
          \n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_model(\n    onnx_path: str,\n    mAP_threshold: float,\n\
          \    registry_url: str,\n    model_name: str,\n    metrics: Output[Metrics],\n\
          ) -> float:\n    \"\"\"Evaluate the ONNX model, compute mAP50, and enforce\
          \ quality gate.\n\n    Args:\n        onnx_path: Path to the ONNX model\
          \ on the shared PVC.\n        mAP_threshold: Minimum mAP50 required to pass\
          \ the quality gate.\n        registry_url: Model Registry REST endpoint\
          \ for comparing with previous version.\n        model_name: Registered model\
          \ name to look up prior metrics.\n        metrics: KFP Metrics artifact\
          \ for Dashboard visibility.\n\n    Returns:\n        The mAP50 score. Raises\
          \ RuntimeError if below threshold.\n    \"\"\"\n    import subprocess\n\
          \    from pathlib import Path\n\n    subprocess.run([\"pip\", \"install\"\
          , \"--force-reinstall\", \"--no-deps\", \"opencv-python-headless>=4.10.0\"\
          ], check=True, capture_output=True)\n\n    from ultralytics import YOLO\n\
          \n    SHARED = Path(\"/shared-data\")\n    DATASET_DIR = SHARED / \"dataset\"\
          \n    METRICS_DIR = SHARED / \"metrics\"\n    METRICS_DIR.mkdir(parents=True,\
          \ exist_ok=True)\n\n    # Validate on the val set\n    print(f\"Evaluating\
          \ {onnx_path}...\")\n    model = YOLO(onnx_path, task=\"detect\")\n    results\
          \ = model.val(\n        data=str(DATASET_DIR / \"data.yaml\"), imgsz=640,\
          \ batch=4,\n        project=str(SHARED / \"eval-runs\"), name=\"val\", exist_ok=True,\n\
          \    )\n\n    mAP50 = float(results.box.map50)\n    mAP50_95 = float(results.box.map)\n\
          \n    per_class = results.box.maps\n    class_names = model.names\n    print(f\"\
          \\nOverall: mAP50={mAP50:.3f}, mAP50-95={mAP50_95:.3f}\")\n    for i, m\
          \ in enumerate(per_class):\n        print(f\"  {class_names[i]}: mAP50={float(m):.3f}\"\
          )\n\n    adnan_map = float(per_class[0]) if len(per_class) > 0 else 0.0\n\
          \n    metrics.log_metric(\"mAP50\", mAP50)\n    metrics.log_metric(\"mAP50_95\"\
          , mAP50_95)\n    metrics.log_metric(\"adnan_mAP50\", adnan_map)\n\n    #\
          \ Save metrics for register step\n    import json\n    (METRICS_DIR / \"\
          results.json\").write_text(json.dumps({\n        \"mAP50\": mAP50, \"mAP50_95\"\
          : mAP50_95,\n        \"adnan_mAP50\": adnan_map,\n    }))\n\n    # Query\
          \ previous model from registry (pattern from rhoai-mlops/jukebox)\n    prev_mAP50\
          \ = 0.0\n    try:\n        import os\n        from model_registry import\
          \ ModelRegistry\n        from model_registry.exceptions import StoreError\n\
          \n        os.environ[\"KF_PIPELINES_SA_TOKEN_PATH\"] = \"/var/run/secrets/kubernetes.io/serviceaccount/token\"\
          \n        registry = ModelRegistry(\n            server_address=registry_url,\
          \ port=443,\n            author=\"eval-pipeline\", is_secure=False,\n  \
          \      )\n        for v in registry.get_model_versions(model_name).order_by_id().descending():\n\
          \            props = v.custom_properties\n            if \"mAP50\" in props:\n\
          \                prev_mAP50 = float(props[\"mAP50\"])\n                print(f\"\
          Previous model mAP50: {prev_mAP50:.3f}\")\n                break\n    except\
          \ Exception as e:\n        print(f\"Could not query registry (first run?):\
          \ {e}\")\n\n    metrics.log_metric(\"prev_mAP50\", prev_mAP50)\n\n    #\
          \ Quality gate\n    if mAP50 < mAP_threshold:\n        raise RuntimeError(\n\
          \            f\"Model quality below threshold: mAP50={mAP50:.3f} < {mAP_threshold}.\
          \ \"\n            f\"Pipeline stopped -- model will NOT be deployed.\"\n\
          \        )\n\n    print(f\"Quality gate PASSED: mAP50={mAP50:.3f} >= {mAP_threshold}\"\
          )\n    return mAP50\n\n"
        image: registry.redhat.io/rhai/base-image-cpu-rhel9:3.3.0
        resources:
          cpuLimit: 2.0
          cpuRequest: 1.0
          memoryLimit: 4.294967296
          memoryRequest: 2.147483648
          resourceCpuLimit: '2'
          resourceCpuRequest: '1'
          resourceMemoryLimit: 4Gi
          resourceMemoryRequest: 2Gi
    exec-prepare-dataset:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - prepare_dataset
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location --index-url https://pypi.org/simple\
          \ --trusted-host https://pypi.org/simple 'ultralytics>=8.3.0' 'huggingface_hub>=0.20.0'\
          \ 'boto3>=1.34.0' 'opencv-python-headless>=4.10.0' 'lapx>=0.5.2'  &&  python3\
          \ -m pip install --quiet --no-warn-script-location --index-url https://pypi.org/simple\
          \ --trusted-host https://pypi.org/simple 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef prepare_dataset(\n    photos_s3_prefix: str,\n    minio_endpoint:\
          \ str,\n    dataset: Output[Dataset],\n    metrics: Output[Metrics],\n)\
          \ -> int:\n    \"\"\"Download photos from MinIO and WIDER Face, auto-annotate,\
          \ and split train/val.\n\n    Args:\n        photos_s3_prefix: S3 URI to\
          \ the user's photo collection.\n        minio_endpoint: MinIO endpoint URL\
          \ (fallback if env var not set).\n        metrics: KFP Metrics artifact\
          \ for Dashboard visibility.\n\n    Returns:\n        Total number of annotated\
          \ images (train + val).\n    \"\"\"\n    import subprocess, os, shutil,\
          \ random, zipfile\n    from pathlib import Path\n\n    # Force headless\
          \ OpenCV (ultralytics pulls opencv-python which needs libGL)\n    subprocess.run([\"\
          pip\", \"install\", \"--force-reinstall\", \"--no-deps\", \"opencv-python-headless>=4.10.0\"\
          ], check=True, capture_output=True)\n\n    from ultralytics import YOLO\n\
          \    from huggingface_hub import hf_hub_download, snapshot_download\n  \
          \  import boto3\n    from botocore.config import Config\n\n    SHARED =\
          \ Path(\"/shared-data\")\n    DATASET_DIR = SHARED / \"dataset\"\n    PHOTOS_DIR\
          \ = SHARED / \"photos\"\n    UNKNOWN_DIR = SHARED / \"unknown_faces\"\n\n\
          \    for d in [DATASET_DIR, PHOTOS_DIR, UNKNOWN_DIR]:\n        if d.exists():\n\
          \            shutil.rmtree(d)\n        d.mkdir(parents=True)\n\n    for\
          \ split in [\"train\", \"val\"]:\n        (DATASET_DIR / \"images\" / split).mkdir(parents=True)\n\
          \        (DATASET_DIR / \"labels\" / split).mkdir(parents=True)\n\n    #\
          \ --- Download user photos from MinIO ---\n    s3 = boto3.client(\"s3\"\
          ,\n        endpoint_url=os.environ.get(\"AWS_S3_ENDPOINT\", minio_endpoint),\n\
          \        aws_access_key_id=os.environ[\"AWS_ACCESS_KEY_ID\"],\n        aws_secret_access_key=os.environ[\"\
          AWS_SECRET_ACCESS_KEY\"],\n        config=Config(signature_version=\"s3v4\"\
          ))\n\n    parts = photos_s3_prefix.replace(\"s3://\", \"\").split(\"/\"\
          , 1)\n    bucket = parts[0]\n    prefix = parts[1] if len(parts) > 1 else\
          \ \"\"\n\n    resp = s3.list_objects_v2(Bucket=bucket, Prefix=prefix)\n\
          \    for obj in resp.get(\"Contents\", []):\n        key = obj[\"Key\"]\n\
          \        if key.lower().endswith((\".jpg\", \".jpeg\", \".png\")):\n   \
          \         local = PHOTOS_DIR / key.replace(\"/\", \"_\")\n            s3.download_file(bucket,\
          \ key, str(local))\n\n    user_photos = sorted(PHOTOS_DIR.glob(\"*\"))\n\
          \    print(f\"Downloaded {len(user_photos)} user photos from s3://{bucket}/{prefix}\"\
          )\n\n    # --- Download WIDER Face for unknown class ---\n    print(\"Downloading\
          \ WIDER Face subset from HuggingFace...\")\n    local_repo = snapshot_download(\n\
          \        repo_id=\"wider_face\", repo_type=\"dataset\",\n        allow_patterns=[\"\
          data/WIDER_val.zip\"], cache_dir=\"/tmp/hf_wider\")\n    wider_zip = list(Path(local_repo).rglob(\"\
          WIDER_val.zip\"))[0]\n\n    with zipfile.ZipFile(wider_zip, \"r\") as z:\n\
          \        z.extractall(\"/tmp/wider_extracted\")\n\n    all_wider = list(Path(\"\
          /tmp/wider_extracted/WIDER_val/images\").rglob(\"*.jpg\"))\n    selected\
          \ = random.sample(all_wider, min(100, len(all_wider)))\n    for i, p in\
          \ enumerate(selected):\n        shutil.copy2(p, UNKNOWN_DIR / f\"unknown_{i:04d}.jpg\"\
          )\n    print(f\"Prepared {len(selected)} unknown faces\")\n\n    # --- Auto-annotate\
          \ ---\n    print(\"Auto-annotating with YOLO11-face detector...\")\n   \
          \ det_path = hf_hub_download(repo_id=\"AdamCodd/YOLOv11n-face-detection\"\
          , filename=\"model.pt\")\n    detector = YOLO(det_path)\n\n    def annotate(image_path,\
          \ class_id, img_dir, lbl_dir, prefix):\n        results = detector.predict(str(image_path),\
          \ verbose=False, conf=0.3)\n        if len(results[0].boxes) == 0:\n   \
          \         return False\n        img_name = f\"{prefix}_{image_path.stem}.jpg\"\
          \n        lbl_name = f\"{prefix}_{image_path.stem}.txt\"\n        shutil.copy2(image_path,\
          \ img_dir / img_name)\n        img_h, img_w = results[0].orig_shape\n  \
          \      with open(lbl_dir / lbl_name, \"w\") as f:\n            for box in\
          \ results[0].boxes:\n                x1, y1, x2, y2 = box.xyxy[0].tolist()\n\
          \                cx = ((x1 + x2) / 2) / img_w\n                cy = ((y1\
          \ + y2) / 2) / img_h\n                w = (x2 - x1) / img_w\n          \
          \      h = (y2 - y1) / img_h\n                f.write(f\"{class_id} {cx:.6f}\
          \ {cy:.6f} {w:.6f} {h:.6f}\\n\")\n        return True\n\n    unknown_photos\
          \ = sorted(UNKNOWN_DIR.glob(\"*.jpg\"))\n    random.shuffle(list(user_photos))\n\
          \    random.shuffle(unknown_photos)\n\n    total = {\"train\": 0, \"val\"\
          : 0}\n    for photos, cid, pfx in [(user_photos, 0, \"adnan\"), (unknown_photos,\
          \ 1, \"unknown\")]:\n        split_idx = int(len(photos) * 0.8)\n      \
          \  for split, photo_list in [(\"train\", photos[:split_idx]), (\"val\",\
          \ photos[split_idx:])]:\n            for p in photo_list:\n            \
          \    if annotate(p, cid, DATASET_DIR / \"images\" / split, DATASET_DIR /\
          \ \"labels\" / split, pfx):\n                    total[split] += 1\n\n \
          \   # --- Write data.yaml ---\n    (DATASET_DIR / \"data.yaml\").write_text(\n\
          \        f\"path: {DATASET_DIR}\\ntrain: images/train\\nval: images/val\\\
          n\\nnc: 2\\nnames:\\n  0: adnan\\n  1: unknown_face\\n\"\n    )\n\n    #\
          \ Download YOLO11n base model \u2014 try MinIO first, fall back to HuggingFace\n\
          \    base_model_path = SHARED / \"yolo11n.pt\"\n    if not base_model_path.exists():\n\
          \        try:\n            s3.download_file(\"models\", \"yolo11n.pt\",\
          \ str(base_model_path))\n            print(f\"Downloaded base model from\
          \ MinIO\")\n        except Exception:\n            print(\"yolo11n.pt not\
          \ in MinIO \u2014 downloading from ultralytics...\")\n            import\
          \ urllib.request\n            urllib.request.urlretrieve(\n            \
          \    \"https://github.com/ultralytics/assets/releases/download/v8.4.0/yolo11n.pt\"\
          ,\n                str(base_model_path))\n            print(f\"Downloaded\
          \ base model from ultralytics\")\n\n    print(f\"Dataset: {total['train']}\
          \ train, {total['val']} val\")\n    metrics.log_metric(\"train_images\"\
          , total[\"train\"])\n    metrics.log_metric(\"val_images\", total[\"val\"\
          ])\n    metrics.log_metric(\"user_photos\", len(user_photos))\n    metrics.log_metric(\"\
          unknown_photos\", len(selected))\n\n    # Record dataset artifact for ML\
          \ lineage tracking\n    dataset.uri = str(DATASET_DIR / \"data.yaml\")\n\
          \    dataset.metadata[\"train_images\"] = total[\"train\"]\n    dataset.metadata[\"\
          val_images\"] = total[\"val\"]\n    dataset.metadata[\"classes\"] = [\"\
          adnan\", \"unknown_face\"]\n\n    return total[\"train\"] + total[\"val\"\
          ]\n\n"
        image: registry.redhat.io/rhai/base-image-cpu-rhel9:3.3.0
        resources:
          cpuLimit: 2.0
          cpuRequest: 1.0

pipelineInfo:
  description: Train YOLO11 face recognition, evaluate, register, deploy, and configure
    monitoring
  name: face-recognition-training
root:
  dag:
    tasks:
      deploy-model:
        cachingOptions: {}
        componentRef:
          name: comp-deploy-model
        dependentTasks:
        - register-model
        inputs:
          parameters:
            isvc_name:
              componentInputParameter: model_name
            namespace:
              componentInputParameter: isvc_namespace
            registry_url:
              componentInputParameter: registry_url
        retryPolicy:
          backoffDuration: 10s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: deploy-model
      evaluate-model:
        cachingOptions: {}
        componentRef:
          name: comp-evaluate-model
        dependentTasks:
        - train-model
        inputs:
          parameters:
            mAP_threshold:
              componentInputParameter: mAP_threshold
            model_name:
              componentInputParameter: model_name
            onnx_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: train-model
            registry_url:
              componentInputParameter: registry_url
        taskInfo:
          name: evaluate-model
      prepare-dataset:
        cachingOptions: {}
        componentRef:
          name: comp-prepare-dataset
        inputs:
          parameters:
            minio_endpoint:
              componentInputParameter: minio_endpoint
            photos_s3_prefix:
              componentInputParameter: photos_s3_prefix
        retryPolicy:
          backoffDuration: 30s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: prepare-dataset
      register-model:
        cachingOptions: {}
        componentRef:
          name: comp-register-model
        dependentTasks:
        - evaluate-model
        - train-model
        inputs:
          parameters:
            minio_endpoint:
              componentInputParameter: minio_endpoint
            model_name:
              componentInputParameter: model_name
            onnx_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: train-model
            registry_url:
              componentInputParameter: registry_url
            version:
              componentInputParameter: version
        retryPolicy:
          backoffDuration: 10s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: register-model
      setup-monitoring:
        cachingOptions: {}
        componentRef:
          name: comp-setup-monitoring
        dependentTasks:
        - deploy-model
        inputs:
          parameters:
            model_name:
              componentInputParameter: model_name
            namespace:
              componentInputParameter: isvc_namespace
            num_baseline_samples:
              runtimeValue:
                constant: 500.0
        retryPolicy:
          backoffDuration: 10s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: setup-monitoring
      train-model:
        cachingOptions: {}
        componentRef:
          name: comp-train-model
        dependentTasks:
        - prepare-dataset
        inputs:
          parameters:
            epochs:
              componentInputParameter: epochs
        taskInfo:
          name: train-model
  inputDefinitions:
    parameters:
      epochs:
        defaultValue: 15.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      isvc_namespace:
        defaultValue: private-ai
        isOptional: true
        parameterType: STRING
      mAP_threshold:
        defaultValue: 0.7
        isOptional: true
        parameterType: NUMBER_DOUBLE
      minio_endpoint:
        defaultValue: http://minio.minio-storage.svc.cluster.local:9000
        isOptional: true
        parameterType: STRING
      model_name:
        defaultValue: face-recognition
        isOptional: true
        parameterType: STRING
      photos_s3_prefix:
        defaultValue: s3://face-training-photos/adnan/
        isOptional: true
        parameterType: STRING
      registry_url:
        defaultValue: https://private-ai-registry-rest.apps.cluster-kb4dq.kb4dq.sandbox2381.opentlc.com
        isOptional: true
        parameterType: STRING
      version:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0

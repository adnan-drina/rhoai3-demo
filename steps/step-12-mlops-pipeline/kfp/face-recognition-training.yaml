    exec-setup-monitoring:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - setup_monitoring
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'requests>=2.31.0'\
          \ 'numpy>=1.26.0'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef setup_monitoring(\n    model_name: str,\n    namespace: str,\n\
          \    num_baseline_samples: int,\n) -> str:\n    \"\"\"Configure TrustyAI\
          \ monitoring with baseline data and fairness metrics.\n\n    Args:\n   \
          \     model_name: Name of the deployed InferenceService to monitor.\n  \
          \      namespace: OpenShift namespace where TrustyAI and the model are deployed.\n\
          \        num_baseline_samples: Number of synthetic baseline samples to generate.\n\
          \n    Returns:\n        Monitoring status string (e.g. monitoring-configured,\
          \ trustyai-not-ready).\n    \"\"\"\n    import json, time\n    import requests\n\
          \    import numpy as np\n\n    TRUSTYAI_URL = f\"http://trustyai-service.{namespace}.svc.cluster.local\"\
          \n    headers = {\"Content-Type\": \"application/json\"}\n\n    # Wait for\
          \ TrustyAI to be ready\n    print(\"Waiting for TrustyAI service...\")\n\
          \    for i in range(12):\n        try:\n            r = requests.get(f\"\
          {TRUSTYAI_URL}/info\", timeout=5)\n            if r.status_code == 200:\n\
          \                print(f\"TrustyAI ready (took ~{(i+1)*5}s)\")\n       \
          \         break\n        except Exception:\n            pass\n        time.sleep(5)\n\
          \    else:\n        print(\"WARNING: TrustyAI not reachable. Skipping monitoring\
          \ setup.\")\n        return \"trustyai-not-ready\"\n\n    # Generate baseline\
          \ data representing normal face recognition results\n    # Features: confidence\
          \ (0-1), class_id (0=adnan, 1=unknown), num_detections\n    print(f\"Generating\
          \ {num_baseline_samples} baseline samples...\")\n    np.random.seed(42)\n\
          \    n = num_baseline_samples\n    confidence = np.random.normal(loc=0.85,\
          \ scale=0.08, size=n).clip(0.3, 1.0)\n    class_id = np.random.choice([0.0,\
          \ 1.0], size=n, p=[0.4, 0.6])\n    num_detections = np.random.poisson(lam=2.0,\
          \ size=n).astype(float)\n    quality = ((confidence > 0.6) & (num_detections\
          \ >= 1)).astype(float)\n\n    # Upload training baseline to TrustyAI\n \
          \   training_data = {\n        \"model_name\": model_name,\n        \"data_tag\"\
          : \"TRAINING\",\n        \"request\": {\n            \"inputs\": [{\n  \
          \              \"name\": \"predict\",\n                \"shape\": [n, 3],\n\
          \                \"datatype\": \"FP32\",\n                \"data\": [[float(confidence[i]),\
          \ float(class_id[i]), float(num_detections[i])] for i in range(n)]\n   \
          \         }]\n        },\n        \"response\": {\n            \"model_name\"\
          : model_name,\n            \"model_version\": \"1\",\n            \"outputs\"\
          : [{\n                \"name\": \"predict\",\n                \"datatype\"\
          : \"INT64\",\n                \"shape\": [n, 1],\n                \"data\"\
          : [[int(quality[i])] for i in range(n)]\n            }]\n        }\n   \
          \ }\n\n    print(\"Uploading baseline data...\")\n    r = requests.post(f\"\
          {TRUSTYAI_URL}/data/upload\", headers=headers, json=training_data, timeout=30)\n\
          \    print(f\"  Upload: {r.status_code} - {r.text[:200]}\")\n\n    if r.status_code\
          \ != 200:\n        print(\"WARNING: Baseline upload failed.\")\n       \
          \ return \"upload-failed\"\n\n    # Configure SPD fairness metric\n    #\
          \ Measures: does quality differ between adnan (class 0) and unknown (class\
          \ 1)?\n    print(\"Configuring SPD fairness metric...\")\n    spd_payload\
          \ = {\n        \"modelId\": model_name,\n        \"requestName\": \"Face\
          \ Recognition Fairness\",\n        \"protectedAttribute\": \"predict-1\"\
          ,\n        \"privilegedAttribute\": {\"type\": \"DOUBLE\", \"value\": 0.0},\n\
          \        \"unprivilegedAttribute\": {\"type\": \"DOUBLE\", \"value\": 1.0},\n\
          \        \"outcomeName\": \"predict-0-0\",\n        \"favorableOutcome\"\
          : {\"type\": \"INT64\", \"value\": 1},\n        \"batchSize\": 50,\n   \
          \ }\n    r = requests.post(f\"{TRUSTYAI_URL}/metrics/spd/request\", headers=headers,\
          \ json=spd_payload, timeout=10)\n    print(f\"  SPD: {r.status_code} - {r.text[:200]}\"\
          )\n\n    # Subscribe to meanshift drift on training baseline\n    print(\"\
          Subscribing to drift detection...\")\n    r = requests.post(f\"{TRUSTYAI_URL}/metrics/drift/meanshift/request\"\
          , headers=headers,\n                      json={\"modelId\": model_name,\
          \ \"referenceTag\": \"TRAINING\"}, timeout=10)\n    print(f\"  Drift: {r.status_code}\
          \ - {r.text[:200]}\")\n\n    # Verify\n    r = requests.get(f\"{TRUSTYAI_URL}/info\"\
          , headers=headers, timeout=10)\n    info = r.json() if r.text else {}\n\
          \    model_info = info.get(model_name, {})\n    obs = model_info.get(\"\
          data\", {}).get(\"observations\", 0)\n    metrics = model_info.get(\"metrics\"\
          , {}).get(\"scheduledMetadata\", {}).get(\"metricCounts\", {})\n    print(f\"\
          \\nMonitoring configured:\")\n    print(f\"  Model: {model_name}\")\n  \
          \  print(f\"  Observations: {obs}\")\n    print(f\"  Metrics: {metrics}\"\
          )\n    print(f\"  Dashboard: RHOAI > Deployments > {model_name} > Model\
          \ bias\")\n\n    return \"monitoring-configured\"\n\n"
        image: registry.redhat.io/rhai/base-image-cpu-rhel9:3.3.0
        resources:
          cpuLimit: 0.5
          cpuRequest: 0.25
          memoryLimit: 0.536870912
          memoryRequest: 0.268435456
          resourceCpuLimit: 500m
          resourceCpuRequest: 250m
          resourceMemoryLimit: 512Mi
          resourceMemoryRequest: 256Mi
    exec-train-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'ultralytics>=8.3.0'\
          \ 'opencv-python-headless>=4.10.0' 'onnx>=1.12.0' 'onnxslim>=0.1.71' 'onnxruntime>=1.17.0'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_model(\n    epochs: int,\n    metrics: Output[Metrics],\n\
          \    trained_model: Output[Model],\n) -> str:\n    \"\"\"Train YOLO11n on\
          \ the prepared dataset and export to ONNX.\n\n    Args:\n        epochs:\
          \ Number of training epochs.\n        metrics: KFP Metrics artifact for\
          \ Dashboard visibility.\n        trained_model: KFP Model artifact for Dashboard\
          \ lineage tracking.\n\n    Returns:\n        Path to the exported ONNX model\
          \ file on the shared PVC.\n    \"\"\"\n    import subprocess\n    from pathlib\
          \ import Path\n\n    subprocess.run([\"pip\", \"install\", \"--force-reinstall\"\
          , \"--no-deps\", \"opencv-python-headless>=4.10.0\"], check=True, capture_output=True)\n\
          \n    from ultralytics import YOLO\n\n    SHARED = Path(\"/shared-data\"\
          )\n    DATASET_DIR = SHARED / \"dataset\"\n    MODEL_DIR = SHARED / \"model\"\
          \n    MODEL_DIR.mkdir(parents=True, exist_ok=True)\n\n    data_yaml = str(DATASET_DIR\
          \ / \"data.yaml\")\n    print(f\"Training YOLO11n for {epochs} epochs on\
          \ CPU...\")\n    print(f\"Dataset: {data_yaml}\")\n\n    # Use pre-downloaded\
          \ base model from shared PVC (downloaded by prepare_dataset)\n    base_model\
          \ = str(SHARED / \"yolo11n.pt\") if (SHARED / \"yolo11n.pt\").exists() else\
          \ \"yolo11n.pt\"\n    print(f\"Base model: {base_model}\")\n    model =\
          \ YOLO(base_model)\n    results = model.train(\n        data=data_yaml,\n\
          \        epochs=epochs,\n        imgsz=640,\n        batch=4,\n        device=\"\
          cpu\",\n        mosaic=1.0,\n        mixup=0.3,\n        fliplr=0.5,\n \
          \       degrees=15.0,\n        patience=5,\n        project=str(MODEL_DIR\
          \ / \"runs\"),\n        name=\"train\",\n        exist_ok=True,\n    )\n\
          \n    best_pt = list(MODEL_DIR.rglob(\"train/weights/best.pt\"))\n    if\
          \ not best_pt:\n        raise RuntimeError(\"Training failed -- no best.pt\
          \ found\")\n\n    best = best_pt[0]\n    print(f\"Best model: {best}\")\n\
          \n    # Export to ONNX\n    trained = YOLO(str(best))\n    onnx_path = trained.export(format=\"\
          onnx\")\n    print(f\"ONNX exported: {onnx_path}\")\n\n    # Log final metrics\
          \ from training\n    metrics.log_metric(\"epochs_completed\", epochs)\n\
          \    metrics.log_metric(\"onnx_path\", onnx_path)\n\n    # Write ONNX to\
          \ KFP Model artifact for Dashboard lineage tracking\n    import shutil\n\
          \    shutil.copy2(onnx_path, trained_model.path)\n    trained_model.metadata[\"\
          framework\"] = \"ultralytics-yolo11n\"\n    trained_model.metadata[\"format\"\
          ] = \"onnx\"\n    trained_model.metadata[\"epochs\"] = epochs\n\n    return\
          \ onnx_path\n\n"
        image: registry.redhat.io/rhai/base-image-cpu-rhel9:3.3.0

        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'boto3>=1.34.0'\
          \ 'model-registry>=0.3.7'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef register_model(\n    onnx_path: str,\n    model_name: str,\n\
          \    version: str,\n    registry_url: str,\n    minio_endpoint: str,\n)\
          \ -> str:\n    \"\"\"Upload ONNX model to MinIO and register the version\
          \ in Model Registry.\n\n    Args:\n        onnx_path: Path to the ONNX model\
          \ on the shared PVC.\n        model_name: Name to register under in the\
          \ Model Registry.\n        version: Version string for this model release.\n\
          \        registry_url: Model Registry REST endpoint.\n        minio_endpoint:\
          \ MinIO endpoint URL (fallback if env var not set).\n\n    Returns:\n  \
          \      The version string that was registered.\n    \"\"\"\n    import os,\
          \ json\n    from pathlib import Path\n    import boto3\n    from botocore.config\
          \ import Config\n    from model_registry import ModelRegistry, utils\n\n\
          \    SHARED = Path(\"/shared-data\")\n    METRICS_DIR = SHARED / \"metrics\"\
          \n\n    metrics_data = json.loads((METRICS_DIR / \"results.json\").read_text())\n\
          \n    # Upload ONNX to MinIO\n    BUCKET = \"models\"\n    KEY = \"face-recognition/1/model.onnx\"\
          \n\n    s3 = boto3.client(\"s3\",\n        endpoint_url=os.environ.get(\"\
          AWS_S3_ENDPOINT\", minio_endpoint),\n        aws_access_key_id=os.environ[\"\
          AWS_ACCESS_KEY_ID\"],\n        aws_secret_access_key=os.environ[\"AWS_SECRET_ACCESS_KEY\"\
          ],\n        config=Config(signature_version=\"s3v4\"))\n\n    print(f\"\
          Uploading {onnx_path} -> s3://{BUCKET}/{KEY}...\")\n    s3.upload_file(onnx_path,\
          \ BUCKET, KEY)\n\n    obj = s3.head_object(Bucket=BUCKET, Key=KEY)\n   \
          \ print(f\"Uploaded: {obj['ContentLength'] / (1024*1024):.1f} MB\")\n\n\
          \    # Register in Model Registry (pattern from rhoai-mlops/jukebox)\n \
          \   s3_endpoint = os.environ.get(\"AWS_S3_ENDPOINT\", minio_endpoint)\n\
          \    s3_bucket = os.environ.get(\"AWS_S3_BUCKET\", BUCKET)\n\n    metadata\
          \ = {k: str(v) for k, v in metrics_data.items()}\n\n    try:\n        #\
          \ The model-registry SDK reads this env var for SA token auth\n        os.environ[\"\
          KF_PIPELINES_SA_TOKEN_PATH\"] = \"/var/run/secrets/kubernetes.io/serviceaccount/token\"\
          \n\n        registry = ModelRegistry(\n            server_address=registry_url,\n\
          \            port=443,\n            author=\"face-recognition-pipeline\"\
          ,\n            is_secure=False,\n        )\n\n        s3_uri = utils.s3_uri_from(\n\
          \            f\"/models/{model_name}/1/model.onnx\",\n            bucket=s3_bucket,\n\
          \            endpoint=s3_endpoint,\n        )\n\n        registry.register_model(\n\
          \            model_name, s3_uri,\n            model_format_name=\"onnx\"\
          , model_format_version=\"1\",\n            version=version,\n          \
          \  version_description=f\"YOLO11n face recognition. mAP50={metrics_data['mAP50']:.3f}\"\
          ,\n            metadata=metadata,\n        )\n        print(f\"Registered\
          \ {model_name} v{version} in Model Registry\")\n    except Exception as\
          \ e:\n        print(f\"WARNING: Model Registry registration failed: {e}\"\
          )\n        print(\"The model is deployed to MinIO and serving -- registration\
          \ can be done manually.\")\n\n    return version\n\n"
        image: registry.redhat.io/rhai/base-image-cpu-rhel9:3.3.0

name: "EU AI Act — Pre-RAG Baseline"
description: "Baseline WITHOUT document retrieval. The LLM may have general EU AI Act knowledge from training but not the specific document language."
vector_db_id: null
model_id: granite-8b-agent
mode: pre-rag

scoring_params:
  "llm-as-judge::base":
    type: llm_as_judge
    judge_model: granite-8b-agent
    prompt_template: scoring-templates/judge_prompt.txt
    judge_score_regexes:
      - "Answer: (A|B|C|D|E)"
  "basic::subset_of": null

tests:
  - prompt: "How does the EU AI Act classify AI systems as high-risk?"
    expected_result: "AI systems classify as high-risk in two cases: when embedded as a safety component in products covered by existing product legislation (Annex I), or when intended for a high-risk use case listed in Annex III covering areas such as education, employment, law enforcement, or migration."
    expected_tools: []

  - prompt: "What risk management obligations does the EU AI Act impose on providers?"
    expected_result: "Providers must establish a risk management system that identifies and mitigates risks through development or design of the AI system or provision of technical information. Measures must consider effects and interactions of combined requirements to minimise risks effectively."
    expected_tools: []

  - prompt: "What are the main risk categories defined by the EU AI Act?"
    expected_result: "The EU AI Act defines four risk categories: unacceptable risk (prohibited practices), high risk (strict regulatory requirements including conformity assessment), limited risk (transparency obligations), and minimal risk (voluntary codes of conduct)."
    expected_tools: []

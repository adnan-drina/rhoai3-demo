name: "ACME Corporate RAG Quality"
description: "Evaluate RAG answers against ACME lithography documentation"
vector_db_id: acme_corporate
model_id: granite-8b-agent
llamastack_url: http://lsd-rag.private-ai.svc:8321

scoring_params:
  llm-as-judge::answer-correctness:
    judge_model: granite-8b-agent
    prompt_template: scoring-templates/answer_correctness.txt
  llm-as-judge::answer-groundedness:
    judge_model: granite-8b-agent
    prompt_template: scoring-templates/answer_groundedness.txt
  basic::tool_choice: null

tests:
  - prompt: "What are the key lithography calibration procedures?"
    expected_result: "Lithography calibration involves alignment verification, dose calibration, focus optimization, and overlay measurement to ensure pattern accuracy on the wafer."
    expected_tools:
      - builtin::rag/knowledge_search

  - prompt: "What is the maintenance schedule for the UV exposure system?"
    expected_result: "UV exposure systems require quarterly lamp replacement, monthly intensity measurements, and weekly uniformity checks to maintain consistent exposure quality."
    expected_tools:
      - builtin::rag/knowledge_search

  - prompt: "How should resist coating thickness be controlled?"
    expected_result: "Resist coating thickness is controlled by spin speed, resist viscosity, and exhaust settings. Target thickness uniformity should be within 2% across the wafer."
    expected_tools:
      - builtin::rag/knowledge_search

  - prompt: "What are the safety protocols for chemical handling in the lithography bay?"
    expected_result: "Chemical handling requires PPE including chemical-resistant gloves and goggles, use of fume hoods, spill containment procedures, and MSDS documentation for all solvents and developers."
    expected_tools:
      - builtin::rag/knowledge_search

  - prompt: "Describe the wafer alignment process before exposure."
    expected_result: "Wafer alignment uses fiducial marks on the wafer and reticle to achieve sub-micron overlay accuracy. The process includes coarse alignment, fine alignment, and global alignment corrections."
    expected_tools:
      - builtin::rag/knowledge_search

  - prompt: "What defect inspection methods are used after lithography?"
    expected_result: "Post-lithography inspection includes optical microscopy for macro defects, SEM review for critical dimension measurement, and automated defect inspection systems for pattern integrity verification."
    expected_tools:
      - builtin::rag/knowledge_search

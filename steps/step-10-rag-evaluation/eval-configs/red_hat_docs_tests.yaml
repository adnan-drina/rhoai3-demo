name: "Red Hat RHOAI RAG Quality"
description: "Evaluate RAG answers against Red Hat OpenShift AI documentation"
vector_db_id: red_hat_docs
model_id: granite-8b-agent
llamastack_url: http://lsd-rag.private-ai.svc:8321

scoring_params:
  llm-as-judge::answer-correctness:
    judge_model: granite-8b-agent
    prompt_template: scoring-templates/answer_correctness.txt
  llm-as-judge::answer-groundedness:
    judge_model: granite-8b-agent
    prompt_template: scoring-templates/answer_groundedness.txt
  basic::tool_choice: null

tests:
  - prompt: "How do I configure a LlamaStackDistribution for RAG?"
    expected_result: "Create a LlamaStackDistribution CR with vector_io provider set to remote::milvus, configure the embedding model, register vector databases, and enable the rag-runtime tool provider."
    expected_tools:
      - builtin::rag/knowledge_search

  - prompt: "What is the role of Milvus in the RHOAI RAG stack?"
    expected_result: "Milvus serves as the vector database for storing document embeddings. It supports similarity search using ANN algorithms and provides persistent storage for vectors used in retrieval-augmented generation."
    expected_tools:
      - builtin::rag/knowledge_search

  - prompt: "How does Docling process PDF documents for RAG?"
    expected_result: "Docling converts PDF documents to Markdown, preserving document structure including tables, formulas, and figures. The output is then chunked and embedded for vector storage."
    expected_tools:
      - builtin::rag/knowledge_search

  - prompt: "What embedding model is recommended for RHOAI RAG deployments?"
    expected_result: "The granite-embedding-125m-english model from IBM is recommended, providing 768-dimensional embeddings via the inline sentence-transformers provider in LlamaStack."
    expected_tools:
      - builtin::rag/knowledge_search

  - prompt: "How do I verify that RAG ingestion was successful?"
    expected_result: "Query the vector store using the Llama Stack client vector_io.query API with a relevant question. Check that chunks are returned and contain content from the ingested documents."
    expected_tools:
      - builtin::rag/knowledge_search

  - prompt: "What are the prerequisites for deploying a RAG stack in OpenShift AI?"
    expected_result: "Prerequisites include OpenShift 4.19 or newer, GPU support enabled, LlamaStack Operator activated, an inference model deployed, and a pipeline server configured within the project."
    expected_tools:
      - builtin::rag/knowledge_search
